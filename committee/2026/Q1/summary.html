<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Q1 本季摘要 | 安全衛生委員會</title>
<style>
:root {
  --navy: #1e3a5f; --bg: #f1f5f9; --card: #ffffff;
  --border: #e2e8f0; --text: #1e293b; --sub: #64748b;
  --blue: #2563eb; --blue-light: #dbeafe;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #0c1840 0%, #1e3a8a 50%, #2563eb 100%);
  color: #fff; padding: 12px 20px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
header h1 { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer;
  transition: background .15s; font-family: inherit; flex-shrink: 0;
}
.hdr-btn:hover { background: rgba(255,255,255,.2); }
.hdr-brand { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.hdr-brand img  { height: 24px; object-fit: contain; }
.hdr-brand span { font-size: 12px; color: #94a3b8; font-weight: 600; white-space: nowrap; }

/* ── Main ── */
main { flex: 1; max-width: 820px; margin: 0 auto; width: 100%; padding: 36px 24px 60px; }

/* ── Meta Card ── */
.meta-card {
  background: var(--card); border-radius: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  padding: 22px 24px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 20px;
  flex-wrap: wrap;
}
.meta-icon { font-size: 40px; flex-shrink: 0; }
.meta-info { flex: 1; min-width: 200px; }
.meta-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.meta-sub   { font-size: 13px; color: var(--sub); }
.meta-tag   {
  display: inline-block; margin-top: 8px; margin-right: 6px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  background: var(--blue-light); color: var(--blue);
}

/* ── Generate Button ── */
.gen-section { text-align: center; margin-bottom: 28px; }
.gen-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 36px; border-radius: 12px;
  background: var(--blue); color: #fff;
  font-size: 15px; font-weight: 700;
  border: none; cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 16px rgba(37,99,235,.35);
  transition: background .15s, transform .1s, box-shadow .15s;
}
.gen-btn:hover  { background: #1d4ed8; box-shadow: 0 6px 22px rgba(37,99,235,.45); }
.gen-btn:active { transform: scale(.97); }
.gen-btn:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
.gen-note { font-size: 12px; color: var(--sub); margin-top: 10px; }

/* ── Spinner ── */
.spinner {
  display: none; justify-content: center; align-items: center; gap: 14px;
  padding: 28px 0; color: var(--sub); font-size: 14px;
}
.spinner.show { display: flex; }
.spin-ring {
  width: 26px; height: 26px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result Area ── */
.result-area { display: none; }
.result-area.show { display: block; }

.result-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.result-header h2 { font-size: 15px; font-weight: 700; color: var(--navy); }

.copy-btn {
  padding: 7px 18px; border-radius: 8px;
  background: #f1f5f9; border: 1px solid var(--border);
  color: var(--text); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.copy-btn:hover { background: var(--border); }

.result-card {
  background: var(--card); border-radius: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  padding: 24px 26px;
  font-size: 14px; line-height: 1.8; color: var(--text);
}

/* ── Markdown render styles ── */
.result-card .md-h2 {
  font-size: 15px; font-weight: 700;
  color: var(--blue); margin: 20px 0 8px;
  padding-bottom: 5px; border-bottom: 2px solid var(--blue-light);
}
.result-card .md-h2:first-child { margin-top: 0; }
.result-card .md-ul {
  padding-left: 20px; margin: 6px 0 12px;
}
.result-card .md-ul li { margin-bottom: 4px; }
.result-card p { margin-bottom: 8px; }
.result-card strong { font-weight: 700; }
.result-card code {
  background: #f1f5f9; padding: 1px 5px;
  border-radius: 4px; font-size: 12px; font-family: monospace;
}

/* ── Error ── */
.err-card {
  display: none; background: #fff5f5; border-radius: 14px;
  border-left: 4px solid #ef4444;
  padding: 18px 22px; font-size: 13px; color: #991b1b;
}
.err-card.show { display: block; }

/* ── Footer ── */
footer {
  text-align: center; padding: 18px 24px;
  font-size: 12px; color: var(--sub);
  border-top: 1px solid var(--border); background: var(--card);
}

/* ── Dark Mode ── */
#dark-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 50%;
  width: 44px; height: 44px; font-size: 20px;
  cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: center;
}

body.dark {
  --bg:     #0f172a;
  --card:   #1e293b;
  --border: #334155;
  --text:   #f1f5f9;
  --sub:    #94a3b8;
  --blue-light: #1e3a6e;
}
body.dark .result-card .md-h2 { color: #93c5fd; }
body.dark .copy-btn { background: #334155; border-color: #475569; }
body.dark .copy-btn:hover { background: #475569; }
</style>
</head>
<body>

<button id="dark-toggle" onclick="toggleDark()" title="切換深色／淺色模式">🌙</button>

<header>
  <button class="hdr-btn" onclick="location.href='../../'" title="回到委員會首頁">← 委員會首頁</button>
  <h1>📋 本季會議摘要</h1>
  <div class="hdr-brand">
    <img src="../../../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<main>

  <div class="meta-card">
    <div class="meta-icon">📊</div>
    <div class="meta-info">
      <div class="meta-title">2026 年第一季 安全衛生委員會報告摘要</div>
      <div class="meta-sub">由 AI 自動讀取本季完整報告並生成重點摘要</div>
      <span class="meta-tag">Q1 2026</span>
      <span class="meta-tag">Gemini 2.5 Flash</span>
      <span class="meta-tag">即時生成</span>
    </div>
  </div>

  <div class="gen-section">
    <button class="gen-btn" id="gen-btn" onclick="generateSummary()">
      ✨ 一鍵生成 AI 摘要
    </button>
    <div class="gen-note">AI 將自動讀取本季報告頁面並整理重點，約需 15～30 秒</div>
  </div>

  <div class="spinner" id="spinner">
    <div class="spin-ring"></div>
    AI 正在讀取報告並整理摘要，請稍候…
  </div>

  <div class="err-card" id="err-card"></div>

  <div class="result-area" id="result-area">
    <div class="result-header">
      <h2>🤖 AI 生成摘要</h2>
      <button class="copy-btn" onclick="copyResult()">📋 複製全文</button>
    </div>
    <div class="result-card" id="result-card"></div>
  </div>

</main>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統</footer>

<script>
const WORKER_URL = 'https://ohs-law-chatbot.df-hr-openai.workers.dev';
const REPORT_URL = 'https://df-ehs.github.io/OHS-Portal/committee/2026/Q1/';

const AI_PROMPT =
  '你是大豐環保科技股份有限公司的職業安全衛生管理師。\n' +
  '請使用網路搜尋功能讀取以下安全衛生委員會報告頁面，整理成正式的本季會議摘要：\n\n' +
  REPORT_URL + '\n\n' +
  '請依照以下格式輸出（使用繁體中文）：\n\n' +
  '## 本季重點決議\n' +
  '（列出 3～5 條本季重要決議，每條以「-」開頭）\n\n' +
  '## 各章節主要事項\n' +
  '（依章節順序列出各章節主要事項與關鍵數據，每條以「-」開頭）\n\n' +
  '## 待追蹤事項\n' +
  '（列出下季需持續追蹤的待辦項目，每條以「-」開頭）';

function mdToHtml(md) {
  const lines = md.split('\n');
  let html = '';
  let inList = false;

  for (const raw of lines) {
    const line = raw
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/`(.+?)`/g,'<code>$1</code>');

    if (/^##\s+/.test(raw)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<div class="md-h2">${line.replace(/^##\s+/,'')}</div>`;
    } else if (/^[-•*]\s+/.test(raw)) {
      if (!inList) { html += '<ul class="md-ul">'; inList = true; }
      html += `<li>${line.replace(/^[-•*]\s+/,'')}</li>`;
    } else if (raw.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${line}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

// 從報告 HTML 萃取重點文字（避免傳送整份 HTML）
async function fetchReportText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('無法讀取報告頁面（HTTP ' + r.status + '）');
  const html = await r.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script, style, svg').forEach(el => el.remove());

  const parts = [];

  // 封面標題
  const h1 = doc.querySelector('h1, .cover-card h1');
  if (h1) parts.push('# ' + h1.textContent.trim());

  // KPI 卡片
  doc.querySelectorAll('.kpi-card, .kpi').forEach(el => {
    parts.push('[KPI] ' + el.textContent.trim().replace(/\s+/g, ' '));
  });

  // 各章節
  doc.querySelectorAll('.chapter').forEach(ch => {
    const title = ch.querySelector('.chapter-title')?.textContent.trim() || '';
    const sub   = ch.querySelector('.chapter-subtitle')?.textContent.trim() || '';
    if (title) parts.push('\n## ' + title);
    if (sub)   parts.push(sub);

    // 重點卡片與提案
    ch.querySelectorAll('.highlight-card, .warning-card, .danger-card, .proposal-card, .policy-item').forEach(card => {
      const t = card.textContent.trim().replace(/\s+/g, ' ');
      if (t) parts.push('- ' + t.slice(0, 180));
    });

    // 表格第一行（狀態）
    ch.querySelectorAll('table tr').forEach((row, i) => {
      if (i < 8) parts.push(row.textContent.trim().replace(/\s+/g, '\t'));
    });
  });

  return parts.join('\n').slice(0, 7000); // 限制 token 用量
}

async function generateSummary() {
  const btn     = document.getElementById('gen-btn');
  const spinner = document.getElementById('spinner');
  const errCard = document.getElementById('err-card');
  const resArea = document.getElementById('result-area');
  const resCard = document.getElementById('result-card');

  btn.disabled = true;
  spinner.classList.add('show');
  errCard.classList.remove('show');
  resArea.classList.remove('show');

  try {
    // Step 1: 瀏覽器直接 fetch 報告頁面並萃取文字
    const reportText = await fetchReportText(REPORT_URL);

    // Step 2: 組裝完整 prompt
    const prompt = AI_PROMPT + '\n\n【報告內容節錄】\n' + reportText;

    // Step 3: 送給 AI Worker
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: prompt }),
    });

    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      throw new Error(body?.error?.message || body?.message || 'API 錯誤 ' + resp.status);
    }

    const data = await resp.json();
    const aiText = data?.data
                || data?.choices?.[0]?.message?.content
                || data?.text
                || '';

    if (!aiText) throw new Error('AI 回應為空，請稍後再試');

    resCard.innerHTML = mdToHtml(aiText);
    resArea.classList.add('show');

  } catch (err) {
    errCard.textContent = '❌ 生成失敗：' + err.message;
    errCard.classList.add('show');
  } finally {
    spinner.classList.remove('show');
    btn.disabled = false;
  }
}

function copyResult() {
  const card = document.getElementById('result-card');
  const text = card ? card.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ 已複製';
    setTimeout(() => { btn.textContent = '📋 複製全文'; }, 2000);
  });
}

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('portal-dark', isDark ? '1' : '0');
  document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
if (localStorage.getItem('portal-dark') === '1') {
  document.body.classList.add('dark');
  document.getElementById('dark-toggle').textContent = '☀️';
}
</script>
<script>window.OHS_SIDEBAR_BASE = '../../../';</script>
<script src="../../../shared/sidebar.js"></script>
</body>
</html>
