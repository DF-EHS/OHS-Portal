<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>委員名單 Q1 2026 | 安全衛生委員會</title>
<style>
:root {
  --navy: #1e3a5f; --bg: #f1f5f9; --card: #ffffff;
  --border: #e2e8f0; --text: #1e293b; --sub: #64748b;
  --purple: #7c3aed; --purple-light: #f3e8ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #0c1840 0%, #1e3a8a 50%, #2563eb 100%);
  color: #fff; padding: 12px 20px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
header h1 { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer;
  transition: background .15s; font-family: inherit; flex-shrink: 0;
}
.hdr-btn:hover { background: rgba(255,255,255,.2); }
.hdr-brand { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.hdr-brand img  { height: 24px; object-fit: contain; }
.hdr-brand span { font-size: 12px; color: #94a3b8; font-weight: 600; white-space: nowrap; }

/* ── Main ── */
main { flex: 1; max-width: 860px; margin: 0 auto; width: 100%; padding: 36px 24px 60px; }

/* ── Meta Card ── */
.meta-card {
  background: var(--card); border-radius: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  padding: 20px 24px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap; justify-content: space-between;
}
.meta-left { display: flex; align-items: center; gap: 14px; }
.meta-icon { font-size: 36px; }
.meta-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
.meta-sub   { font-size: 12px; color: var(--sub); }

.dl-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 22px; border-radius: 10px;
  background: var(--purple); color: #fff;
  font-size: 13px; font-weight: 700;
  text-decoration: none; font-family: inherit;
  box-shadow: 0 3px 12px rgba(124,58,237,.3);
  transition: background .15s, transform .1s;
  white-space: nowrap;
}
.dl-btn:hover  { background: #6d28d9; }
.dl-btn:active { transform: scale(.97); }

/* ── Section Label ── */
.section-label {
  font-size: 11px; font-weight: 700; color: var(--sub);
  letter-spacing: 3px; text-transform: uppercase;
  margin: 28px 0 14px; display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Members Table ── */
.members-card {
  background: var(--card); border-radius: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  overflow: hidden; margin-bottom: 20px;
}
table { width: 100%; border-collapse: collapse; }
th {
  padding: 11px 14px; text-align: left;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: #fff; background: var(--navy);
}
td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }

.role-badge {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.role-chair    { background: #fef9c3; color: #854d0e; }
.role-mgmt     { background: #dbeafe; color: #1d4ed8; }
.role-ohs      { background: #dcfce7; color: #15803d; }
.role-labor    { background: var(--purple-light); color: var(--purple); }

.labor-mark {
  display: inline-block; margin-left: 6px;
  font-size: 10px; color: var(--purple);
  font-weight: 700;
}

/* ── Stats ── */
.stats-row {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px;
}
.stat-chip {
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: var(--card); border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

/* ── Readonly Notice ── */
.readonly-notice {
  background: #fffbeb; border-left: 4px solid #d97706;
  border-radius: 8px; padding: 12px 16px;
  font-size: 12px; color: #92400e; margin-top: 24px;
}

/* ── Footer ── */
footer {
  text-align: center; padding: 18px 24px;
  font-size: 12px; color: var(--sub);
  border-top: 1px solid var(--border); background: var(--card);
}

/* ── Dark Mode ── */
#dark-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 50%;
  width: 44px; height: 44px; font-size: 20px;
  cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: center;
}

body.dark {
  --bg:     #0f172a;
  --card:   #1e293b;
  --border: #334155;
  --text:   #f1f5f9;
  --sub:    #94a3b8;
  --purple-light: #2e1065;
}
body.dark th             { background: #1e3a5f; }
body.dark tr:hover td    { background: #263349; }
body.dark .role-chair    { background: #422006; color: #fde68a; }
body.dark .role-mgmt     { background: #1e3a6e; color: #93c5fd; }
body.dark .role-ohs      { background: #052e16; color: #86efac; }
body.dark .role-labor    { background: #2e1065; color: #d8b4fe; }
body.dark .readonly-notice { background: #431407; color: #fdba74; border-color: #d97706; }
</style>
</head>
<body>

<button id="dark-toggle" onclick="toggleDark()" title="切換深色／淺色模式">🌙</button>

<header>
  <button class="hdr-btn" onclick="location.href='../../'" title="回到委員會首頁">← 委員會首頁</button>
  <h1>👥 委員名單</h1>
  <div class="hdr-brand">
    <img src="../../../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<main id="main-content">
  <!-- 由 JS 動態渲染 -->
</main>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統</footer>

<script>
// ════════════════════════════════════════════════════
//  委員名單資料 — 若需修改請直接編輯此 JS 陣列（僅限 VS Code）
//  欄位說明：
//   role     : 職稱（主任委員 / 委員）
//   name     : 姓名
//   title    : 現任職務（職稱/頭銜）
//   dept     : 所屬單位 / 部門
//   category : 委員身分類別（chair / mgmt / ohs / labor）
//   isLabor  : 是否為勞工推舉代表（true = 顯示 ✓ 勞工代表標記）
// ════════════════════════════════════════════════════
const MEMBERS = [
  { role: "主任委員", name: "林盟洲", title: "總經理",  dept: "總經理室",              category: "chair",  isLabor: false },
  { role: "委員",     name: "洪健翔", title: "",         dept: "再生處理部",             category: "mgmt",   isLabor: false },
  { role: "委員",     name: "劉譯文", title: "協理",     dept: "",                       category: "mgmt",   isLabor: false },
  { role: "委員",     name: "阮常新", title: "",         dept: "營運管理部・業務開發部",  category: "mgmt",   isLabor: false },
  { role: "委員",     name: "王婕誼", title: "",         dept: "人資部",                  category: "mgmt",   isLabor: false },
  { role: "委員",     name: "賴佑毓", title: "",         dept: "法務環安課",              category: "ohs",    isLabor: false },
  { role: "委員",     name: "蕭欣萍", title: "",         dept: "營運部",                  category: "labor",  isLabor: true  },
  { role: "委員",     name: "柯明來", title: "",         dept: "再生處",                  category: "labor",  isLabor: true  },
  { role: "委員",     name: "蔡銘哲", title: "",         dept: "業務部",                  category: "labor",  isLabor: true  },
  { role: "委員",     name: "孫詩紜", title: "",         dept: "人資部",                  category: "labor",  isLabor: true  },
  { role: "委員",     name: "張旻瑋", title: "",         dept: "行銷部",                  category: "mgmt",   isLabor: false },
];

const QUARTER_LABEL = "2026 年第一季";
const ATTENDANCE_URL = "https://dfrecyclecom.sharepoint.com/:w:/g/HR/IQA56tX_lqE6TJC_JBeid3ekAfurv94GMCa49s4cuWZ_APY?e=abC5g1";

// ────────────────────────────────────────────────────
const CATEGORY_LABELS = {
  chair: "主任委員",
  mgmt:  "各部門主管代表",
  ohs:   "職業安全衛生人員",
  labor: "勞工代表",
};
const CATEGORY_ORDER = ["chair", "mgmt", "ohs", "labor"];

function buildPage() {
  const main = document.getElementById('main-content');

  const laborCount = MEMBERS.filter(m => m.isLabor).length;
  const totalCount = MEMBERS.length;
  const laborPct   = Math.round(laborCount / totalCount * 100);

  // Meta card
  main.innerHTML = `
    <div class="meta-card">
      <div class="meta-left">
        <div class="meta-icon">👥</div>
        <div>
          <div class="meta-title">職業安全衛生委員會名冊</div>
          <div class="meta-sub">${QUARTER_LABEL}・共 ${totalCount} 位委員・民國 115 年（2026）</div>
        </div>
      </div>
      <a class="dl-btn" href="${ATTENDANCE_URL}" target="_blank">⬇ 下載簽到表</a>
    </div>
    <div class="stats-row">
      <span class="stat-chip">👥 委員總數：${totalCount} 人</span>
      <span class="stat-chip">🏷 勞工代表：${laborCount} 人（${laborPct}%，法定 ≥ 1/3）</span>
    </div>
  `;

  // Group by category
  CATEGORY_ORDER.forEach(cat => {
    const group = MEMBERS.filter(m => m.category === cat);
    if (!group.length) return;

    main.innerHTML += `<div class="section-label">${CATEGORY_LABELS[cat]}</div>`;

    const badgeClass = {
      chair: 'role-chair', mgmt: 'role-mgmt', ohs: 'role-ohs', labor: 'role-labor'
    }[cat];

    const rows = group.map((m, i) => {
      const laborMark = m.isLabor ? '<span class="labor-mark">✓ 勞工代表</span>' : '';
      return `
        <tr>
          <td style="font-weight:600;text-align:center;width:36px">${i + 1}</td>
          <td><span class="role-badge ${badgeClass}">${m.role}</span></td>
          <td style="font-weight:700">${m.name}${laborMark}</td>
          <td>${m.title || '—'}</td>
          <td>${m.dept || '—'}</td>
        </tr>`;
    }).join('');

    main.innerHTML += `
      <div class="members-card">
        <table>
          <thead>
            <tr>
              <th style="width:36px;text-align:center">#</th>
              <th style="width:90px">職稱</th>
              <th>姓名</th>
              <th>現任職務</th>
              <th>所屬單位</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });

  main.innerHTML += `
    <div class="readonly-notice">
      ⚠️ 此頁面為唯讀檢視。若需修改委員資料，請透過 VS Code 編輯本頁面頂部的 <code>MEMBERS</code> 陣列。
    </div>`;
}

buildPage();

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('portal-dark', isDark ? '1' : '0');
  document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
if (localStorage.getItem('portal-dark') === '1') {
  document.body.classList.add('dark');
  document.getElementById('dark-toggle').textContent = '☀️';
}
</script>
<script src="../../../shared/sidebar.js"></script>
</body>
</html>
