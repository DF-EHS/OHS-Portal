<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下班前電器使用安全海報 | 大豐環保科技</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  background: #f1f5f9; min-height: 100vh;
  display: flex; flex-direction: column;
}
header {
  background: #1e3a5f; color: #fff;
  padding: 14px 24px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
header h1 { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1); color: #fff;
  font-size: 12px; cursor: pointer; transition: background .15s;
}
.hdr-btn:hover { background: rgba(255,255,255,.2); }
.print-btn {
  padding: 6px 16px; border-radius: 6px;
  border: none; background: #d97706; color: #fff;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: background .15s;
}
.print-btn:hover { background: #b45309; }
.hdr-brand { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.hdr-brand img  { height: 24px; object-fit: contain; }
.hdr-brand span { font-size: 12px; color: #94a3b8; font-weight: 600; white-space: nowrap; }

main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 32px 24px 48px;
}
.poster-wrap {
  width: 100%; max-width: 1100px;
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10);
  overflow: hidden;
}
.poster-wrap img, .poster-wrap object {
  width: 100%; height: auto; display: block;
}

footer {
  text-align: center; padding: 16px 24px;
  font-size: 12px; color: #64748b;
  border-top: 1px solid #e2e8f0; background: #fff;
}

@media print {
  header, footer { display: none; }
  body { background: none; }
  main { padding: 0; }
  .poster-wrap { box-shadow: none; border-radius: 0; max-width: none; }
}
</style>
</head>
<body>

<header>
  <button class="hdr-btn" onclick="location.href='../../'">← 系統入口</button>
  <button class="hdr-btn" onclick="location.href='../'">← 教材庫</button>
  <h1>🖼️ 下班前電器使用安全海報</h1>
  <button class="print-btn" onclick="window.print()">🖨️ 列印 / 另存PDF</button>
  <div class="hdr-brand">
    <img src="../../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<main>
  <div class="poster-wrap">
    <img src="./電器使用_圖示版.svg" alt="下班前電器使用安全提示：關電源、拔插頭、看異常">
  </div>
</main>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統</footer>

</body>
</html>
