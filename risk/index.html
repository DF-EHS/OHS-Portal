<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>危害鑑別及風險評估查詢系統</title>
<style>
  :root {
    --navy:#1e3a5f; --bg:#f1f5f9; --card:#fff; --border:#e2e8f0;
    --text:#1e293b; --sub:#64748b; --blue:#2563eb;
    --green:#16a34a; --teal:#0891b2; --orange:#d97706; --red:#dc2626; --gray:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

  /* header */
  header{background:linear-gradient(135deg,#1a0a3c 0%,#3b1d7e 50%,#7c3aed 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.35);}
  header h1{font-size:17px;font-weight:700;}
  .subtitle{font-size:11px;color:#94a3b8;margin-left:auto;}
  .hdr-btn{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);
           color:#fff;font-size:12px;cursor:pointer;transition:background .15s;}
  .hdr-btn:hover{background:rgba(255,255,255,.2);}
  .hdr-btn.danger:hover{background:var(--red);border-color:var(--red);}
  .hdr-brand{display:flex;align-items:center;gap:7px;margin-left:auto;flex-shrink:0;}
  .hdr-brand img{height:24px;object-fit:contain;}
  .hdr-brand span{font-size:12px;color:#94a3b8;font-weight:600;white-space:nowrap;}

  /* breadcrumb */
  #breadcrumb{padding:7px 20px;background:#fff;border-bottom:1px solid var(--border);
              font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .bc-btn{display:inline-flex;align-items:center;padding:3px 10px;border-radius:16px;
          font-size:12px;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
  #bc-home{background:var(--navy);color:#fff;}
  #bc-home:hover{background:#16305a;}
  #bc-dept{background:#4c1d95;color:#fff;cursor:pointer;border:none;padding:3px 10px;
           border-radius:16px;font-size:12px;font-weight:600;}
  #bc-dept:hover{background:#3b0764;}
  #bc-sheet{background:#f1f5f9;color:var(--sub);padding:3px 10px;border-radius:16px;font-size:12px;font-weight:600;}
  .sep{color:#cbd5e1;}

  /* toolbar */
  #toolbar{padding:10px 20px;background:#fff;border-bottom:1px solid var(--border);
           display:none;flex-wrap:wrap;gap:8px;align-items:center;}
  #toolbar input,#toolbar select{border:1px solid var(--border);border-radius:6px;
    padding:5px 9px;font-size:13px;outline:none;background:var(--bg);}
  #toolbar input:focus,#toolbar select:focus{border-color:var(--blue);}
  #search{min-width:200px;}

  /* stats */
  #stats-bar{display:none;gap:14px;padding:8px 20px;background:#fff;
             border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  /* main */
  #main{padding:18px 20px;}

  /* Layer 0 */
  #view-home{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;padding:28px 0;}
  .dept-group{background:var(--card);border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.09);
              overflow:hidden;min-width:300px;max-width:480px;flex:1;}
  .dept-group-sep{width:100%;height:1px;background:var(--border);margin:4px 0;}
  .dept-hdr{background:var(--navy);color:#fff;padding:24px 26px 18px;}
  .dept-hdr .big-icon{font-size:40px;margin-bottom:6px;display:block;}
  .dept-hdr h2{font-size:20px;font-weight:700;}
  .dept-hdr p{font-size:12px;color:#94a3b8;margin-top:3px;}
  .sheet-row{padding:16px 26px;display:flex;align-items:center;gap:14px;cursor:pointer;
             border-top:1px solid var(--border);transition:background .15s;}
  .sheet-row:hover{background:#eff6ff;}
  .sheet-ico{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;
             justify-content:center;font-size:24px;flex-shrink:0;}
  .ic-blue{background:#dbeafe;} .ic-purple{background:#ede9fe;} .ic-orange{background:#ffedd5;}
  .sheet-info h3{font-size:15px;font-weight:700;margin-bottom:3px;}
  .sheet-info p{font-size:12px;color:var(--sub);}
  .sheet-arr{margin-left:auto;color:var(--sub);font-size:20px;}

  /* Layer 1 table */
  .table-wrap{overflow-x:auto;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  table{width:100%;border-collapse:collapse;background:var(--card);}
  thead th{background:var(--navy);color:#fff;padding:9px 11px;text-align:left;font-size:13px;white-space:nowrap;}
  thead th.sort{cursor:pointer;user-select:none;}
  thead th.sort:hover{background:#16305a;}
  .si{font-size:9px;margin-left:3px;}
  tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
  tbody tr:hover{background:#eff6ff;}
  td{padding:8px 11px;font-size:13px;vertical-align:middle;}
  td.nm{font-weight:600;color:var(--blue);}
  .bar-wrap{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--border);}
  .bg-green{background:var(--green);} .bg-orange{background:var(--orange);}
  .bg-red{background:var(--red);} .bg-gray{background:#cbd5e1;}

  /* Layer 2 detail */
  #view-detail{display:none;}
  .dtool{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .sheet-meta{background:#fff;border-radius:8px;padding:14px 18px;
              box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;}
  .sheet-meta h2{font-size:16px;margin-bottom:5px;color:var(--navy);}
  .pills{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
  .pill{padding:3px 12px;border-radius:16px;font-size:12px;font-weight:600;}
  .p-total{background:#dbeafe;color:var(--blue);} .p-green{background:#dcfce7;color:var(--green);}
  .p-orange{background:#fef9c3;color:var(--orange);} .p-red{background:#fee2e2;color:var(--red);}
  .p-gray{background:#f1f5f9;color:var(--gray);}
  .sev-legend{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;padding:7px 11px;
              background:#f8fafc;border-radius:6px;border:1px solid var(--border);font-size:11px;align-items:center;}
  .sl-lbl{color:var(--sub);margin-right:3px;}

  /* item cards */
  .item-list{display:flex;flex-direction:column;gap:9px;}
  .item-card{background:var(--card);border-radius:8px;overflow:hidden;
             box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--border);}
  .item-card.lv-1{border-left-color:var(--green);}
  .item-card.lv-2{border-left-color:var(--teal);}
  .item-card.lv-3{border-left-color:var(--orange);}
  .item-card.lv-4{border-left-color:var(--red);}
  .item-card.lv-na{border-left-color:#cbd5e1;}
  .card-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;
            user-select:none;flex-wrap:wrap;}
  .card-hdr-click{cursor:pointer;flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;}
  .card-hdr-click:hover .item-hazard{text-decoration:underline;}
  .item-id{font-weight:700;color:var(--navy);font-size:11px;font-family:monospace;white-space:nowrap;}
  .item-hazard{font-weight:600;font-size:14px;min-width:0;}
  .item-path{font-size:11px;color:var(--sub);background:#f1f5f9;padding:2px 7px;border-radius:8px;white-space:nowrap;}
  .lv-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;}
  .lb-1{background:#dcfce7;color:#15803d;} .lb-2{background:#cffafe;color:#0e7490;}
  .lb-3{background:#fef9c3;color:#a16207;} .lb-4{background:#fee2e2;color:#b91c1c;}
  .lb-na{background:#f1f5f9;color:var(--gray);}
  .chev{color:var(--sub);font-size:10px;transition:transform .2s;margin-left:2px;}
  .chev.open{transform:rotate(180deg);}
  /* card action buttons */
  .card-actions{display:flex;gap:4px;flex-shrink:0;}
  .act-btn{padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:#fff;
           cursor:pointer;font-size:11px;color:var(--sub);transition:all .15s;}
  .act-btn:hover{background:var(--bg);}
  .act-btn.edit:hover{color:var(--blue);border-color:var(--blue);background:#eff6ff;}
  .act-btn.del:hover{color:var(--red);border-color:var(--red);background:#fee2e2;}
  /* card body */
  .card-body{display:none;padding:0 14px 14px;}
  .card-body.open{display:block;}
  .body-path{font-size:11px;color:var(--sub);margin-bottom:10px;padding-top:2px;}
  .ig{display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;margin-bottom:10px;}
  @media(max-width:560px){.ig{grid-template-columns:1fr;}}
  .il .il-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
  .il .il-val{font-size:13px;line-height:1.5;}
  .risk-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:#f8fafc;
            border:1px solid var(--border);border-radius:6px;padding:7px 12px;margin-bottom:10px;font-size:13px;}
  .rc{display:flex;flex-direction:column;align-items:center;gap:1px;}
  .rc-l{font-size:10px;color:var(--sub);}
  .rc-v{font-weight:700;font-size:15px;}
  .op{color:var(--sub);font-size:16px;}
  .sev-chip{display:inline-flex;align-items:center;justify-content:center;
            width:26px;height:26px;border-radius:5px;font-weight:700;font-size:13px;}
  .sA{background:#7f1d1d;color:#fff;} .sB{background:#dc2626;color:#fff;}
  .sC{background:#f97316;color:#fff;} .sD{background:#fbbf24;color:#1e293b;}
  .sE{background:#86efac;color:#1e293b;} .sF{background:#d1fae5;color:#064e3b;}
  .risk-na{font-size:13px;color:var(--gray);font-style:italic;}
  .sec-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
  .ctrl-box{background:#f8fafc;border-radius:6px;padding:9px 11px;font-size:13px;
            line-height:1.7;border:1px solid var(--border);margin-bottom:9px;white-space:pre-wrap;}
  .plan-box{background:#f0fdf4;border-radius:6px;padding:9px 11px;font-size:13px;
            line-height:1.7;border:1px solid #bbf7d0;white-space:pre-wrap;}
  .code-tag{display:inline-block;background:#e0f2fe;color:#075985;border-radius:3px;
            padding:1px 6px;font-size:11px;font-family:monospace;margin:1px;}
  .warn-box{background:#fef9c3;border:1px solid #fde047;border-radius:5px;
            padding:7px 11px;font-size:12px;color:#854d0e;margin-bottom:10px;}

  /* ── MODAL ── */
  .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
            z-index:1000;align-items:center;justify-content:center;padding:16px;}
  .modal-ov.open{display:flex;}
  .modal{background:#fff;border-radius:12px;width:100%;max-width:700px;
         max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .mhd{padding:14px 18px;border-bottom:1px solid var(--border);
       display:flex;align-items:center;justify-content:space-between;}
  .mhd h3{font-size:15px;color:var(--navy);font-weight:700;}
  .m-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);
           line-height:1;padding:2px 6px;border-radius:4px;}
  .m-close:hover{background:var(--bg);}
  .mbody{padding:18px;overflow-y:auto;flex:1;}
  .mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
  .fg{margin-bottom:13px;}
  .fg label{font-size:11px;color:var(--sub);display:block;margin-bottom:4px;
            text-transform:uppercase;letter-spacing:.04em;}
  .fg label.req::after{content:' *';color:var(--red);}
  .fi,.fs,.fta{width:100%;border:1px solid var(--border);border-radius:6px;
    padding:7px 9px;font-size:13px;outline:none;font-family:inherit;background:#fff;}
  .fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);}
  .fta{resize:vertical;min-height:56px;}
  .frow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .frow2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(max-width:500px){.frow,.frow2{grid-template-columns:1fr;}}
  .f4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  @media(max-width:560px){.f4{grid-template-columns:1fr 1fr;}}
  .suggest-btn{padding:5px 10px;border:1px solid var(--blue);border-radius:6px;
               background:#eff6ff;color:var(--blue);cursor:pointer;font-size:12px;white-space:nowrap;align-self:flex-end;}
  .suggest-btn:hover{background:var(--blue);color:#fff;}
  .risk-assess-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .risk-assess-row .fg{flex:1;min-width:70px;margin-bottom:0;}
  .sev-ref{margin-top:6px;font-size:11px;color:var(--sub);line-height:1.6;}

  /* confirm dialog */
  .confirm-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;
              align-items:center;justify-content:center;padding:16px;}
  .confirm-ov.open{display:flex;}
  .confirm-box{background:#fff;border-radius:10px;padding:24px;max-width:380px;width:100%;
               box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .confirm-box h4{font-size:15px;margin-bottom:8px;color:var(--navy);}
  .confirm-box p{font-size:13px;color:var(--sub);margin-bottom:18px;line-height:1.6;}
  .confirm-btns{display:flex;justify-content:flex-end;gap:8px;}

  /* toast */
  .toast{position:fixed;bottom:76px;right:20px;background:#1e293b;color:#fff;
         padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;
         transform:translateY(8px);transition:opacity .2s,transform .2s;z-index:1200;
         box-shadow:0 4px 12px rgba(0,0,0,.3);pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.err{background:var(--red);}

  /* utilities */
  mark{background:#fde68a;border-radius:2px;padding:0 1px;}
  .empty{padding:36px;text-align:center;color:var(--sub);font-size:14px;}
  .btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);
       background:#fff;cursor:pointer;font-size:13px;color:var(--text);}
  .btn:hover{background:var(--bg);}
  .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
  .btn-primary:hover{background:#16305a;}
  .btn-success{background:var(--green);color:#fff;border-color:var(--green);}
  .btn-success:hover{background:#15803d;}
  .btn-danger{background:var(--red);color:#fff;border-color:var(--red);}
  .btn-danger:hover{background:#b91c1c;}

  /* scroll top */
  #scroll-top{position:fixed;bottom:20px;right:20px;width:42px;height:42px;border-radius:50%;
              background:var(--navy);color:#fff;border:none;font-size:18px;cursor:pointer;
              box-shadow:0 2px 8px rgba(0,0,0,.25);display:none;align-items:center;
              justify-content:center;transition:background .15s;z-index:999;}
  #scroll-top.visible{display:flex;}
  #scroll-top:hover{background:#16305a;}

  /* ── 風險評估機器人 ─────────────────────────────────────── */
  #risk-fab{position:fixed;bottom:76px;right:24px;background:#d97706;color:#fff;border:none;
    border-radius:28px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:1000;display:flex;align-items:center;
    gap:8px;transition:background .15s;}
  #risk-fab:hover{background:#b45309;}
  #risk-panel{position:fixed;bottom:136px;right:24px;width:min(420px,calc(100vw - 32px));
    background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:1001;
    display:none;flex-direction:column;overflow:hidden;max-height:600px;}
  #risk-hdr{background:#92400e;color:#fff;padding:12px 18px;display:flex;align-items:center;
    justify-content:space-between;font-weight:700;font-size:15px;flex-shrink:0;}
  #risk-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:18px;cursor:pointer;line-height:1;}
  #risk-close:hover{color:#fff;}
  #risk-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:200px;}
  .rmsg-user{align-self:flex-end;background:#92400e;color:#fff;padding:8px 14px;
    border-radius:18px 18px 4px 18px;max-width:85%;font-size:13px;word-break:break-word;}
  .rmsg-bot{align-self:flex-start;max-width:100%;font-size:13px;width:100%;}
  .risk-ai-bubble{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;
    padding:10px 14px;font-size:13px;line-height:1.8;word-break:break-word;}
  .risk-ai-bubble strong{color:#92400e;}
  .risk-ai-bubble code{background:#fef3c7;padding:1px 5px;border-radius:3px;font-size:12px;}
  .risk-photo-preview{max-width:100%;max-height:160px;border-radius:8px;
    border:1px solid var(--border);display:block;margin-bottom:4px;}
  #risk-input-area{border-top:1px solid var(--border);flex-shrink:0;}
  #risk-photo-bar{padding:8px 14px 0;display:flex;align-items:center;gap:8px;}
  #risk-preview-wrap{display:none;padding:6px 14px 0;align-items:center;gap:6px;}
  #risk-preview-wrap img{max-height:72px;border-radius:6px;border:1px solid var(--border);}
  #risk-photo-clear{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;line-height:1;}
  #risk-photo-clear:hover{color:var(--red);}
  #risk-text-row{display:flex;gap:8px;padding:8px 14px 10px;}
  #risk-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:7px 14px;
    font-size:13px;outline:none;font-family:inherit;}
  #risk-input:focus{border-color:#d97706;}
  #risk-send{background:#d97706;color:#fff;border:none;border-radius:20px;padding:7px 16px;
    font-size:13px;cursor:pointer;font-family:inherit;}
  #risk-send:hover{background:#b45309;}
  .risk-upload-btn{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:5px 10px;
    font-size:12px;color:#c2410c;cursor:pointer;display:inline-flex;align-items:center;
    gap:4px;font-weight:600;}
  .risk-upload-btn:hover{background:#ffedd5;}
  .risk-typing{display:flex;gap:5px;align-items:center;padding:8px 2px;}
  .risk-typing span{width:8px;height:8px;border-radius:50%;background:#d97706;
    animation:risk-bounce 1.2s ease-in-out infinite;}
  .risk-typing span:nth-child(2){animation-delay:.2s;}
  .risk-typing span:nth-child(3){animation-delay:.4s;}
  @keyframes risk-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
  .risk-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .risk-chip{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:16px;
    padding:4px 12px;font-size:12px;cursor:pointer;}
  .risk-chip:hover{background:#ffedd5;}
</style>
</head>
<body>
<div id="api-loader" style="display:flex;position:fixed;inset:0;background:rgba(255,255,255,.88);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div style="width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:api-spin 1s linear infinite;"></div>
  <div style="font-size:14px;color:#64748b;font-family:'Microsoft JhengHei',sans-serif;">從 Google Sheets 載入資料中…</div>
</div>
<style>@keyframes api-spin{to{transform:rotate(360deg);}
</style>

<header>
  <button class="hdr-btn" onclick="location.href='../'" title="回到職安管理系統入口">← 系統入口</button>
  <h1>⚠️ 危害鑑別及風險評估查詢系統</h1>
  <button class="hdr-btn" onclick="exportHtml()" title="匯出目前資料為 HTML 檔">↓ 匯出 HTML</button>
  <button class="hdr-btn danger" onclick="confirmReset()" title="清除所有變更，還原至預設資料">↺ 重置資料</button>
  <div class="hdr-brand">
    <img src="../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<div id="breadcrumb">
  <button id="bc-home" class="bc-btn" onclick="showHome()">🏠 首頁</button>
  <span id="bc-sep1" class="sep" style="display:none">›</span>
  <button id="bc-dept" style="display:none" onclick="onBcDeptClick()"></button>
  <span id="bc-sep-cat" class="sep" style="display:none">›</span>
  <button id="bc-cat" style="display:none;background:#4c1d95;color:#fff;cursor:pointer;border:none;padding:3px 10px;border-radius:16px;font-size:12px;font-weight:600;" onclick="curCategory&&selectCategory(curCategory.id,false)"></button>
  <span id="bc-sep2" class="sep" style="display:none">›</span>

// ════════════════════════════════════════════════════════
// 工具
// ════════════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function stats(items) {
  const s = { total: items.length, l1:0, l2:0, l3:0, l4:0, na:0 };
  items.forEach(i => {
    if      (i.level===1) s.l1++;
    else if (i.level===2) s.l2++;
    else if (i.level===3) s.l3++;
    else if (i.level===4) s.l4++;
    else                  s.na++;
  });
  return s;
}

function lvBadge(n) {
  if (n==null) return `<span class="lv-badge lb-na">未評估</span>`;
  const lbl = ['','等級1 可接受','等級2 低度','等級3 需改善','等級4 高風險'];
  const cls = ['','lb-1','lb-2','lb-3','lb-4'];
  return `<span class="lv-badge ${cls[n]}">${lbl[n]}</span>`;
}
function sevChip(s) {
  if (!s) return '<span style="color:var(--gray)">—</span>';
  return `<span class="sev-chip s${s}" title="嚴重度${s}">${s}</span>`;
}
function autoId(sheet) {
  const nums = sheet.items.map(i => parseInt(i.id.slice(-2)) || 0);
  const max = nums.length ? Math.max(...nums) : 0;
  return `${sheet.id}NC${String(max+1).padStart(2,'0')}`;
}
function autoSheetId(dept) {
  const nums = dept.sheets.map(s => parseInt(s.id.slice(2)) || 0);
  const max = nums.length ? Math.max(...nums) : -1;
  return `AD${String(max+1).padStart(2,'0')}`;
}
function suggestLevel(freq, prob, severity) {
  if (!freq || !prob || !severity) return null;
  const score = freq * prob;
  switch (severity) {
    case 'A': return 4;
    case 'B': return score >= 10 ? 4 : 3;
    case 'C': return score >= 40 ? 4 : 3;
    case 'D': return score >= 40 ? 4 : score >= 6 ? 3 : 2;
    case 'E': return score >= 30 ? 2 : 1;
    case 'F': return 1;
    default:  return null;
  }
}
function findSheet(dept, sheetId) {
  return dept.sheets.find(s => s.id === sheetId);
}

function showHome(noPush) {

  document.getElementById('bc-dept').style.display = 'none';

function initHome() {
  const wrap = document.getElementById('view-home');
  wrap.innerHTML = '';
  // 顯示順序：null 代表換行分隔
  const ORDER = [
    'hq','qx', null,
    'n1','n2','z1','s1','s2', null,
    'sg','hm','yl','dl', null,
    'jm','ct'
  ];
  const deptMap = Object.fromEntries(ALL_DATA.map(d => [d.dept_id, d]));
  // 依 ORDER 建立序列（跳過不存在的站點）
  const seq = [];
  ORDER.forEach(id => {
    if (id === null) {
      if (seq.length && seq[seq.length-1] !== null) seq.push(null);
    } else if (deptMap[id]) {
      seq.push(deptMap[id]);
    }
  });
  // 未列在 ORDER 的站點追加到最後
  const listed = new Set(ORDER.filter(Boolean));
  ALL_DATA.filter(d => !listed.has(d.dept_id)).forEach(d => {
    if (!seq.length || seq[seq.length-1] !== null) seq.push(null);
    seq.push(d);
  });
  while (seq.length && seq[seq.length-1] === null) seq.pop();

  seq.forEach(item => {
    if (item === null) {
      const sep = document.createElement('div');
      sep.className = 'dept-group-sep';
      wrap.appendChild(sep);
      return;
    }
    const dept = item;
    const allItems = dept.sheets.flatMap(s => s.items);
    const hi = allItems.filter(i => i.level===4).length;
    const group = document.createElement('div');
    group.className = 'dept-group';
    group.innerHTML = `
      <div class="dept-hdr">
        <span class="big-icon">${dept.dept_icon}</span>
        <h2>${esc(dept.dept_name)}</h2>
        <p>${dept.year}年度 ｜ 填表 ${esc(dept.fill_date)} ｜ 共 ${allItems.length} 項危害${hi>0?' ｜ ⚠ 高風險 '+hi+' 項':''}</p>
      </div>`;
    dept.sheets.forEach(sheet => {
      const s = stats(sheet.items);
      const card = document.createElement('div');
      card.className = 'sheet-row';
      card.innerHTML = `
        <div class="sheet-ico ${sheet.ic||'ic-blue'}">${sheet.icon||'📄'}</div>
        <div class="sheet-info">
          <h3>${esc(sheet.name)}</h3>
          <p>項目 ${s.total}　需改善 <b style="color:${s.l3+s.l4>0?'var(--red)':'var(--green)'}">${s.l3+s.l4}</b>　可接受 ${s.l1+s.l2}${s.na>0?' ｜ 未評估 '+s.na:''}</p>
        </div>
        <span class="sheet-arr">›</span>`;
      card.onclick = () => { curDept = dept; selectSheet(sheet); };
      group.appendChild(card);
    });
    wrap.appendChild(group);
  });
}

function showSummary(noPush) {

  document.getElementById('bc-dept').style.display  = 'inline';

  document.getElementById('bc-sep2').style.display  = 'none';
  document.getElementById('bc-sheet').style.display = 'none';
  document.getElementById('filter-process').style.display = 'none';
  document.getElementById('filter-level').style.display = 'none';

  document.getElementById('search').placeholder = '🔍 搜尋作業表…';
  renderSummary();
  renderStatsBar('summary');
  if (!noPush) history.pushState(null,'',`#dept/${curDept.dept_id}`);
}

function renderSummary() {
  const tbody = document.getElementById('sheet-tbody');
  const q = document.getElementById('search').value.trim().toLowerCase();
  let sheets = curDept.sheets.filter(sh =>
    !q || sh.name.includes(q) || sh.items.some(i => i.hazard.includes(q)||i.process.includes(q))
  );
  if (sortState.col) {
    sheets = [...sheets].sort((a,b) => {
      const sa=stats(a.items), sb=stats(b.items);
      const m = { total:[sa.total,sb.total], high:[sa.l3+sa.l4,sb.l3+sb.l4], ok:[sa.l1+sa.l2,sb.l1+sb.l2] };
      const [av,bv] = m[sortState.col]||[0,0];
      return sortState.dir==='asc' ? av-bv : bv-av;
    });
  }
  tbody.innerHTML = '';
  if (!sheets.length) { tbody.innerHTML='<tr><td colspan="9" class="empty">無符合條件的作業表</td></tr>'; return; }
  sheets.forEach((sheet, idx) => {
    const s = stats(sheet.items);
    const ok=s.l1+s.l2, hi=s.l3+s.l4;
    const pOk=s.total?Math.round(ok/s.total*100):0;
    const pL3=s.total?Math.round(s.l3/s.total*100):0;
    const pL4=s.total?Math.round(s.l4/s.total*100):0;
    const pNa=s.total?Math.round(s.na/s.total*100):0;
    const procs=[...new Set(sheet.items.map(i=>i.process))].join('、');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td class="nm">${sheet.icon||'📄'} ${esc(sheet.name)}${sheet.incomplete?'<span style="font-size:11px;color:var(--orange);font-weight:400"> ⚠未完成</span>':''}</td>
      <td style="font-size:11px;color:var(--sub);max-width:160px;white-space:normal">${esc(procs)}</td>
      <td><b>${s.total}</b></td>
      <td><div class="bar-wrap" style="width:100px">
        <div class="bg-green" style="width:${pOk}%"></div>
        <div class="bg-orange" style="width:${pL3}%"></div>
        <div class="bg-red" style="width:${pL4}%"></div>
        <div class="bg-gray" style="width:${pNa}%"></div>
      </div></td>
      <td><b style="color:${hi>0?'var(--red)':'var(--gray)'}">${hi}</b></td>
      <td>${ok}</td>
      <td style="color:${s.na>0?'var(--orange)':'var(--gray)'}">${s.na}</td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:4px">
          <button class="act-btn edit" onclick="openEditSheetModal('${sheet.id}')">✎</button>
          <button class="act-btn del" onclick="confirmDeleteSheet('${sheet.id}')">✕</button>
        </div>
      </td>`;
    tr.onclick = () => selectSheet(sheet);
    tbody.appendChild(tr);
  });
  updateSortIcons();
}

function sortBy(col) {
  sortState.dir = (sortState.col===col && sortState.dir==='desc') ? 'asc' : 'desc';
  sortState.col = col;
  renderSummary();
}
function updateSortIcons() {
  ['total','high','ok'].forEach(c => {
    const el = document.getElementById(`si-${c}`);
    if (el) el.textContent = sortState.col===c ? (sortState.dir==='asc'?'▲':'▼') : '';
  });
}

function renderItems() {
  const list  = document.getElementById('item-list');
  const noRes = document.getElementById('no-items');
  const q       = document.getElementById('search').value.trim().toLowerCase();
  const process = document.getElementById('filter-process').value;
  const level   = document.getElementById('filter-level').value;
  const items = curSheet.items.filter(i => {
    if (process && i.process!==process) return false;
    if (level==='null' && i.level!==null) return false;
    if (level!==''&&level!=='null'&&String(i.level)!==level) return false;
    if (q && ![i.hazard,i.cause,i.consequence,i.control,i.plan,i.process,i.step].join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
  list.innerHTML = ''; noRes.style.display = items.length?'none':'block';
  const hl = t => q ? esc(t).replace(new RegExp(escRe(q),'gi'), m=>`<mark>${m}</mark>`) : esc(t);
  items.forEach(item => {
    const lk = item.level==null?'na':item.level;
    const open = item.level>=3||item.level==null;
    const codes = item.code ? item.code.split('/').map(c=>`<span class="code-tag">${esc(c.trim())}</span>`).join('') : '<span style="color:var(--gray)">—</span>';
    const riskHtml = item.freq!=null
      ? `<div class="risk-row">
           <div class="rc"><span class="rc-l">頻率</span><span class="rc-v">${item.freq}</span></div>
           <span class="op">×</span>
           <div class="rc"><span class="rc-l">機率</span><span class="rc-v">${item.prob}</span></div>
           <span class="op">→</span>
           <div class="rc"><span class="rc-l">嚴重度</span>${sevChip(item.severity)}</div>
           <span class="op">→</span>
           <div class="rc"><span class="rc-l">等級</span>${lvBadge(item.level)}</div>
         </div>`
      : `<div class="warn-box">⚠ 尚未完成風險評估（頻率、機率、嚴重度待填）</div>`;
    const card = document.createElement('div');
    card.className = `item-card lv-${lk}`;
    card.id = `card-${item.id}`;
    card.innerHTML = `
      <div class="card-hdr">
        <div class="card-hdr-click" onclick="toggleCard('${item.id}')">
          <span class="item-id">${esc(item.id)}</span>
          <span class="item-hazard">${hl(item.hazard)}</span>
          <span class="item-path">${esc(item.process)} › ${esc(item.step)}</span>
          ${lvBadge(item.level)}
          <span class="chev ${open?'open':''}" id="chev-${item.id}">▼</span>
        </div>
        <div class="card-actions">
          <button class="act-btn edit" onclick="openEditItemModal('${item.id}')">✎ 編輯</button>
          <button class="act-btn del" onclick="confirmDeleteItem('${item.id}')">✕ 刪除</button>
        </div>
      </div>
      <div class="card-body ${open?'open':''}" id="body-${item.id}">
        <div class="ig">
          <div class="il"><div class="il-lbl">可能發生原因</div><div class="il-val">${hl(item.cause)}</div></div>
          <div class="il"><div class="il-lbl">後果影響</div><div class="il-val">${hl(item.consequence)}</div></div>
          <div class="il"><div class="il-lbl">事故代碼</div><div class="il-val">${codes}</div></div>
        </div>
        ${riskHtml}
        <div class="sec-lbl">現有控制方法</div>
        <div class="ctrl-box">${hl(item.control)}</div>
        <div class="sec-lbl">風險控制規劃</div>
        <div class="plan-box">${item.plan?hl(item.plan):'<span style="color:var(--gray);font-style:italic">（待補）</span>'}</div>
      </div>`;
    list.appendChild(card);
  });
}

function autoSuggest(force) {
  const freq = parseFloat(document.getElementById('f-freq').value);
  const prob = parseFloat(document.getElementById('f-prob').value);
  const sev  = document.getElementById('f-severity').value;
  const lvl  = suggestLevel(freq, prob, sev);
  if (lvl && (force || !document.getElementById('f-level').value)) {
    document.getElementById('f-level').value = String(lvl);
    if (force) toast(`建議等級：${lvl}`);
  }
}
function saveItem() {
  const process = document.getElementById('f-process').value.trim();
  const step    = document.getElementById('f-step').value.trim();
  const hazard  = document.getElementById('f-hazard').value.trim();
  const cause   = document.getElementById('f-cause').value.trim();
  const consequence = document.getElementById('f-consequence').value.trim();
  const control = document.getElementById('f-control').value.trim();
  if (!process||!step||!hazard||!cause||!consequence||!control) {
    toast('請填寫所有必填欄位（標 * 者）', 'err'); return;
  }
  const freqVal = document.getElementById('f-freq').value;
  const probVal = document.getElementById('f-prob').value;
  const levVal  = document.getElementById('f-level').value;
  const item = {
    id:          document.getElementById('f-id').value,
    process, step, hazard, cause, consequence,
    code:        document.getElementById('f-code').value.trim(),
    control,
    freq:        freqVal ? parseFloat(freqVal) : null,
    prob:        probVal ? parseFloat(probVal) : null,
    severity:    document.getElementById('f-severity').value || null,
    level:       levVal ? parseInt(levVal) : null,
    plan:        document.getElementById('f-plan').value.trim()
  };
  const dept  = ALL_DATA.find(d=>d.dept_id===curDept.dept_id);
  const sheet = findSheet(dept, modalSheetId);
  if (modalMode==='add') {
    sheet.items.push(item);
    toast('已新增危害項目');
  } else {
    const idx = sheet.items.findIndex(i=>i.id===modalItemId);
    if (idx!==-1) sheet.items[idx]=item;
    toast('已更新危害項目');
  }
  saveData();
  curSheet = sheet;
  closeItemModal();
  renderMetaBox();
  renderItems();
  renderStatsBar('detail');
  populateProcessFilter();
}

function exportHtml() {
  const raw = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const startMark = '// EXPORT_DATA_START';
  const endMark   = '// EXPORT_DATA_END';
  const si = raw.indexOf(startMark);
  const ei = raw.indexOf(endMark) + endMark.length;
  if (si===-1||ei===endMark.length-1) { toast('匯出失敗：找不到資料標記','err'); return; }
  const dataJs = `// EXPORT_DATA_START\nconst DEFAULT_DATA = ${JSON.stringify(ALL_DATA, null, 2)};\n// EXPORT_DATA_END`;
  const newHtml = raw.slice(0,si) + dataJs + raw.slice(ei);
  const blob = new Blob([newHtml], { type:'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `危害鑑別及風險評估查詢系統_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  toast('已下載最新版 HTML');
}

// Toast

function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast' + (type?' '+type:'');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.classList.add('show'); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2200);
}

function onHashChange() {
  const hash = location.hash;
  if (!hash||hash==='#') { showHome(true); return; }
  const p = hash.slice(1).split('/');
  if (p[0]==='dept'&&p[1]) {
    const dept = ALL_DATA.find(d=>d.dept_id===p[1]);
    if (dept) { curDept=dept; showSummary(true); return; }
  }
  if (p[0]==='sheet'&&p[1]&&p[2]) {
    const dept  = ALL_DATA.find(d=>d.dept_id===p[1]);
    const sheet = dept&&dept.sheets.find(s=>s.id===p[2]);
    if (dept&&sheet) { curDept=dept; curSheet=sheet; showDetail(true); return; }
  }
  showHome(true);
}

var curCategory = null;

function _setCatCrumb() {
  var bcSepCat = document.getElementById('bc-sep-cat');

  if (curCategory) {
    bcSepCat.style.display = 'inline';

  } else {
    bcSepCat.style.display = 'none';

  }
}

function initHome() {
  var wrap = document.getElementById('view-home');
  wrap.innerHTML = '';
  // 顯示順序：null 代表換行分隔
  var ORDER = [
    'hq','qx', null,
    'n1','n2','z1','s1','s2', null,
    'sg','hm','yl','dl', null,
    'jm','ct'
  ];
  var deptMap = {};
  ALL_DATA.forEach(function(d) { deptMap[d.dept_id] = d; });
  // 依 ORDER 建立序列（跳過不存在的站點）
  var seq = [];
  ORDER.forEach(function(id) {
    if (id === null) {
      if (seq.length && seq[seq.length-1] !== null) seq.push(null);
    } else if (deptMap[id]) {
      seq.push(deptMap[id]);
    }
  });
  // 未列在 ORDER 的站點追加到最後
  var listed = {};
  ORDER.forEach(function(id) { if (id) listed[id] = true; });
  ALL_DATA.forEach(function(d) {
    if (!listed[d.dept_id]) {
      if (!seq.length || seq[seq.length-1] !== null) seq.push(null);
      seq.push(d);
    }
  });
  while (seq.length && seq[seq.length-1] === null) seq.pop();

  seq.forEach(function(item) {
    if (item === null) {
      var sep = document.createElement('div');
      sep.className = 'dept-group-sep';
      wrap.appendChild(sep);
      return;
    }
    var dept = item;
    var allItems = dept.sheets.reduce(function(a,s){return a.concat(s.items);}, []);
    var hi = allItems.filter(function(i){return i.level===4;}).length;
    var group = document.createElement('div');
    group.className = 'dept-group';
    group.innerHTML =
      '<div class="dept-hdr">' +
      '<span class="big-icon">' + dept.dept_icon + '</span>' +
      '<h2>' + esc(dept.dept_name) + '</h2>' +
      '<p>' + dept.year + '年度 ｜ 填表 ' + esc(dept.fill_date) +
      ' ｜ 共 ' + allItems.length + ' 項危害' +
      (hi > 0 ? ' ｜ <span style="color:#fca5a5">⚠ 高風險 ' + hi + ' 項</span>' : '') +
      '</p></div>';

    if (dept.use_categories && dept.categories) {
      dept.categories.forEach(function(cat) {
        var catSheets = dept.sheets.filter(function(s){return s.category===cat.id;});
        var catItems  = catSheets.reduce(function(a,s){return a.concat(s.items);}, []);
        var s2 = stats(catItems);
        var hi2 = s2.l3 + s2.l4;
        var card = document.createElement('div');
        card.className = 'sheet-row';
        card.innerHTML =
          '<div class="sheet-ico ' + (cat.ic||'ic-blue') + '">' + (cat.icon||'📋') + '</div>' +
          '<div class="sheet-info"><h3>' + esc(cat.name) + '</h3>' +
          '<p>' + catSheets.length + ' 個作業表 ｜ ' + catItems.length + ' 項危害' +
          (hi2 > 0 ? ' ｜ <b style="color:var(--red)">⚠ 高風險 ' + hi2 + '</b>' : '') +
          '</p></div><span class="sheet-arr">›</span>';
        card.onclick = (function(d, cid){ return function(){
          curDept = d; curCategory = null; selectCategory(cid);
        };})(dept, cat.id);
        group.appendChild(card);
      });
    } else {
      dept.sheets.forEach(function(sheet) {
        var s = stats(sheet.items);
        var card = document.createElement('div');
        card.className = 'sheet-row';
        card.innerHTML =
          '<div class="sheet-ico ' + (sheet.ic||'ic-blue') + '">' + (sheet.icon||'📄') + '</div>' +
          '<div class="sheet-info"><h3>' + esc(sheet.name) + '</h3>' +
          '<p>項目 ' + s.total + '　需改善 <b style="color:' +
          (s.l3+s.l4>0?'var(--red)':'var(--green)') + '">' + (s.l3+s.l4) + '</b>' +
          '　可接受 ' + (s.l1+s.l2) +
          (s.na>0?' ｜ 未評估 '+s.na:'') + '</p></div>' +
          '<span class="sheet-arr">›</span>';
        card.onclick = (function(d, sh){ return function(){
          curDept = d; selectSheet(sh);
        };})(dept, sheet);
        group.appendChild(card);
      });
    }
    wrap.appendChild(group);
  });
}

function renderSummary() {
  var tbody = document.getElementById('sheet-tbody');
  var q = document.getElementById('search').value.trim().toLowerCase();
  var sheets = curDept.sheets.filter(function(sh) {
    if (curCategory && sh.category !== curCategory.id) return false;
    if (q && !sh.name.includes(q) && !sh.items.some(function(i){
      return i.hazard.includes(q) || i.process.includes(q);
    })) return false;
    return true;
  });
  if (sortState.col) {
    sheets = sheets.slice().sort(function(a,b) {
      var sa=stats(a.items), sb=stats(b.items);
      var m={total:[sa.total,sb.total],high:[sa.l3+sa.l4,sb.l3+sb.l4],ok:[sa.l1+sa.l2,sb.l1+sb.l2]};
      var vals=m[sortState.col]||[0,0];
      return sortState.dir==='asc' ? vals[0]-vals[1] : vals[1]-vals[0];
    });
  }
  tbody.innerHTML = '';
  if (!sheets.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">無符合條件的作業表</td></tr>';
    return;
  }
  sheets.forEach(function(sheet, idx) {
    var s = stats(sheet.items);
    var ok=s.l1+s.l2, hi=s.l3+s.l4;
    var pOk=s.total?Math.round(ok/s.total*100):0;
    var pL3=s.total?Math.round(s.l3/s.total*100):0;
    var pL4=s.total?Math.round(s.l4/s.total*100):0;
    var pNa=s.total?Math.round(s.na/s.total*100):0;
    var procs=[...new Set(sheet.items.map(function(i){return i.process;}))].join('、');
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>'+(idx+1)+'</td>' +
      '<td class="nm">'+(sheet.icon||'📄')+' '+esc(sheet.name)+
      (sheet.incomplete?'<span style="font-size:11px;color:var(--orange);font-weight:400"> ⚠未完成</span>':'')+
      '</td>' +
      '<td style="font-size:11px;color:var(--sub);max-width:160px;white-space:normal">'+esc(procs)+'</td>' +
      '<td><b>'+s.total+'</b></td>' +
      '<td><div class="bar-wrap" style="width:100px">' +
      '<div class="bg-green" style="width:'+pOk+'%"></div>' +
      '<div class="bg-orange" style="width:'+pL3+'%"></div>' +
      '<div class="bg-red" style="width:'+pL4+'%"></div>' +
      '<div class="bg-gray" style="width:'+pNa+'%"></div>' +
      '</div></td>' +
      '<td><b style="color:'+(hi>0?'var(--red)':'var(--gray)')+'">'+hi+'</b></td>' +
      '<td>'+ok+'</td>' +
      '<td style="color:'+(s.na>0?'var(--orange)':'var(--gray)')+'">'+s.na+'</td>' +
      '<td onclick="event.stopPropagation()"><div style="display:flex;gap:4px">' +
      '<button class="act-btn edit" onclick="openEditSheetModal(\''+sheet.id+'\')">✎</button>' +
      '<button class="act-btn del" onclick="confirmDeleteSheet(\''+sheet.id+'\')">✕</button>' +
      '</div></td>';
    tr.onclick = function(){ selectSheet(sheet); };
    tbody.appendChild(tr);
  });
  updateSortIcons();
}

function renderStatsBar(view) {
  var bar = document.getElementById('stats-bar');
  var items, lbl;
  if (view === 'summary') {
    var sheets = curCategory
      ? curDept.sheets.filter(function(s){return s.category===curCategory.id;})
      : curDept.sheets;
    items = sheets.reduce(function(a,s){return a.concat(s.items);}, []);
    lbl = curCategory ? (curCategory.icon + ' ' + curCategory.name) : curDept.dept_name;
  } else {
    items = curSheet.items;
    lbl = curSheet.name;
  }
  var s = stats(items);
  bar.innerHTML =
    '<span><span class="dot" style="background:var(--blue)"></span> '+esc(lbl)+' <b>'+s.total+'</b> 項</span>' +
    '<span><span class="dot" style="background:var(--green)"></span> 可接受 <b>'+(s.l1+s.l2)+'</b></span>' +
    '<span><span class="dot" style="background:var(--orange)"></span> 需改善 <b>'+s.l3+'</b></span>' +
    (s.l4>0?'<span><span class="dot" style="background:var(--red)"></span> 高風險 <b>'+s.l4+'</b></span>':'') +
    (s.na>0?'<span><span class="dot" style="background:var(--gray)"></span> 未評估 <b>'+s.na+'</b></span>':'');
}

function onHashChange() {
  var hash = location.hash;
  if (!hash || hash==='#') { showHome(true); return; }
  var p = hash.slice(1).split('/');
  if (p[0]==='cat' && p[1] && p[2]) {
    var dept = ALL_DATA.find(function(d){return d.dept_id===p[1];});
    if (dept) { curDept=dept; curCategory=null; selectCategory(p[2], true); return; }
  }
  if (p[0]==='dept' && p[1]) {
    var dept = ALL_DATA.find(function(d){return d.dept_id===p[1];});
    if (dept) { curDept=dept; curCategory=null; showSummary(true); return; }
  }
  if (p[0]==='sheet' && p[1] && p[2]) {
    var dept  = ALL_DATA.find(function(d){return d.dept_id===p[1];});
    var sheet = dept && dept.sheets.find(function(s){return s.id===p[2];});
    if (dept && sheet) {
      curDept=dept; curSheet=sheet;
      curCategory = (dept.use_categories && sheet.category && dept.categories)
        ? (dept.categories.find(function(c){return c.id===sheet.category;}) || null)
        : null;
      showDetail(true); return;
    }
  }
  showHome(true);
}

}

async function loadFromCloud() {
  showLoader(true);
  try {
    const res  = await fetch(GS_API + '?action=getAll', { redirect: 'follow' });
    const data = await res.json();
    if (Array.isArray(data) && data.length) {
      ALL_DATA = data;
      // 修正 Apps Script DEPT_META 裡被寫死的舊年度
      const hq = ALL_DATA.find(d => d.dept_id === 'hq');
      if (hq) { hq.year = '115'; hq.fill_date = '115.03.11'; hq.author = '王婕誼'; }
      const qx = ALL_DATA.find(d => d.dept_id === 'qx');
      if (qx) { qx.year = '115'; qx.fill_date = '115.05.26'; qx.author = '洪健翔'; }
      // 合併 DEFAULT_DATA 中雲端沒有的站點（外站資料）
      const cloudIds = new Set(ALL_DATA.map(d => d.dept_id));
      for (const dept of DEFAULT_DATA) {
        if (!cloudIds.has(dept.dept_id)) ALL_DATA.push(dept);
      }
    }
    initHome();
    onHashChange();
  } catch(e) {
    console.error('雲端載入失敗:', e);
    toast('無法連線雲端，請重新整理頁面', 'err');
  } finally {
    showLoader(false);
  }
}

// 覆寫 loadData / saveData（雲端為主，localStorage 棄用）
function loadData() { if (!ALL_DATA || !ALL_DATA.length) ALL_DATA = []; }
function saveData() {}

// 覆寫 saveItem：更新記憶體後非同步同步雲端
function saveItem() {
  const process     = document.getElementById('f-process').value.trim();
  const step        = document.getElementById('f-step').value.trim();
  const hazard      = document.getElementById('f-hazard').value.trim();
  const cause       = document.getElementById('f-cause').value.trim();
  const consequence = document.getElementById('f-consequence').value.trim();
  const control     = document.getElementById('f-control').value.trim();
  if (!process||!step||!hazard||!cause||!consequence||!control) {
    toast('請填寫所有必填欄位（標 * 者）', 'err'); return;
  }
  const freqVal = document.getElementById('f-freq').value;
  const probVal = document.getElementById('f-prob').value;
  const levVal  = document.getElementById('f-level').value;
  const item = {
    id:          document.getElementById('f-id').value,
    process, step, hazard, cause, consequence,
    code:        document.getElementById('f-code').value.trim(),
    control,
    freq:        freqVal ? parseFloat(freqVal) : null,
    prob:        probVal ? parseFloat(probVal) : null,
    severity:    document.getElementById('f-severity').value || null,
    level:       levVal ? parseInt(levVal) : null,
    plan:        document.getElementById('f-plan').value.trim()
  };
  const dept   = ALL_DATA.find(d => d.dept_id === curDept.dept_id);
  const sheet  = findSheet(dept, modalSheetId);
  const action = modalMode === 'add' ? 'add' : 'update';
  const deptId = curDept.dept_id, sheetId = modalSheetId;
  if (modalMode === 'add') {
    sheet.items.push(item);
  } else {
    const idx = sheet.items.findIndex(i => i.id === modalItemId);
    if (idx !== -1) sheet.items[idx] = item;
  }
  curSheet = sheet;
  closeItemModal();
  renderMetaBox();
  renderItems();
  renderStatsBar('detail');
  populateProcessFilter();
  toast(action === 'add' ? '新增中，同步雲端…' : '更新中，同步雲端…');
  apiPost({ action, dept_id: deptId, sheet_id: sheetId, item })
    .then(() => toast(action === 'add' ? '已新增並同步至雲端 ✓' : '已更新並同步至雲端 ✓'))
    .catch(() => toast('本機已更新，但雲端同步失敗，請重新整理', 'err'));
}

// 覆寫 confirmDeleteItem：更新記憶體後非同步同步雲端
function confirmDeleteItem(itemId) {
  const item = curSheet.items.find(i => i.id === itemId);
  if (!item) return;
  openConfirm('刪除危害項目', `確定要刪除「${item.hazard}」（${item.id}）？此動作無法復原。`, () => {
    const dept   = ALL_DATA.find(d => d.dept_id === curDept.dept_id);
    const sheet  = findSheet(dept, curSheet.id);
    const deptId = dept.dept_id, sheetId = sheet.id;
    sheet.items  = sheet.items.filter(i => i.id !== itemId);
    curSheet = sheet;
    toast('刪除中，同步雲端…');
    renderMetaBox();
    renderItems();
    renderStatsBar('detail');
    initHome();
    apiPost({ action: 'delete', dept_id: deptId, sheet_id: sheetId, item_id: itemId })
      .then(() => toast('已刪除並同步至雲端 ✓'))
      .catch(() => toast('本機已刪除，但雲端同步失敗，請重新整理', 'err'));
  });
}

// 覆寫 confirmReset：從雲端重新載入
function confirmReset() {
  openConfirm('確認重新載入', '將重新從 Google Sheets 載入最新資料。確定繼續？', () => {
    loadFromCloud().then(() => { showHome(); toast('已從雲端重新載入 ✓'); });
  });
}

// ════════════════════════════════════════════════════════
// 風險評估機器人
// ════════════════════════════════════════════════════════
const RISK_WORKER = 'https://ohs-law-chatbot.df-hr-openai.workers.dev';
let riskOpen = false;
let riskB64 = null;
let riskMime = 'image/jpeg';

function toggleRiskChat() {
  riskOpen = !riskOpen;
  document.getElementById('risk-panel').style.display = riskOpen ? 'flex' : 'none';
  if (riskOpen) document.getElementById('risk-input').focus();
}

function appendRiskMsg(html, isUser) {
  const msgs = document.getElementById('risk-messages');
  const d = document.createElement('div');
  d.className = isUser ? 'rmsg-user' : 'rmsg-bot';
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showRiskTyping() {
  const msgs = document.getElementById('risk-messages');
  const d = document.createElement('div');
  d.className = 'rmsg-bot'; d.id = 'risk-typing-ind';
  d.innerHTML = '<div class="risk-typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function rMd(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

function rEsc(s) {
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

function onRiskPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const MAX = 1024;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
      else        { w = Math.round(w * MAX / h); h = MAX; }
    }
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = cv.toDataURL('image/jpeg', 0.85);
    riskB64 = dataUrl.split(',')[1];
    riskMime = 'image/jpeg';
    document.getElementById('risk-thumb').src = dataUrl;
    const pw = document.getElementById('risk-preview-wrap');
    pw.style.display = 'flex';
    document.getElementById('risk-input').placeholder = '可補充說明現場狀況（可選）…';
  };
  img.src = URL.createObjectURL(file);
}

function clearRiskPhoto() {
  riskB64 = null;
  document.getElementById('risk-preview-wrap').style.display = 'none';
  document.getElementById('risk-thumb').src = '';
  document.getElementById('risk-file-input').value = '';
  document.getElementById('risk-input').placeholder = '描述現場狀況，或上傳照片後補充說明…';
}

function askRiskChip(el) {
  document.getElementById('risk-input').value = el.textContent;
  sendRiskChat();
}

async function sendRiskChat() {
  const inp = document.getElementById('risk-input');
  const btn = document.getElementById('risk-send');
  const text = inp.value.trim();
  const hasPhoto = !!riskB64;
  if (!text && !hasPhoto) return;

  // 在清除 UI 前儲存資料
  const savedB64 = riskB64;
  const savedMime = riskMime;

  inp.value = ''; inp.disabled = true; btn.disabled = true;

  // 顯示使用者訊息
  let userHtml = hasPhoto
    ? '<img src="data:' + savedMime + ';base64,' + savedB64 + '" class="risk-photo-preview">' + (text ? '<br>' + rEsc(text) : '')
    : rEsc(text);
  appendRiskMsg(userHtml, true);
  clearRiskPhoto();

  const typingEl = showRiskTyping();

  const sysMsg = '你是大豐環保科技的職安現場風險評估助理，公司業務為環保廢棄物回收處理。\n\n請依下列固定格式回答，不得增減區塊：\n\n---\n🔴高／🟡中／🟢低 ＋ 危害名稱（5字內）→ 立即行動（10字內）\n（重複 1～5 項，只列最重要的，不要全部列出）\n\n📝 **改善說明**\n每項危害一行，說明為什麼有此風險、後果是什麼（每條 15～25 字）\n\n📋 **相關法規**\n列出 1～3 條最直接相關的法規條文名稱（只寫名稱，不要解釋）\n\n💬 **風險小結**\n2～3 句話：整體現場風險程度、主要問題集中在哪、給主管的一句建議\n\n⚡ **最優先**：整場最緊急的一件事（一句話）\n---\n\n若照片不清楚，直接說「請補充：＿＿」即可，不要假設內容。';


  const userText = text || '請分析現場狀況，辨識危害並評估風險等級。';
  const prompt = sysMsg + '\n\n使用者問題：' + userText;

  const reqBody = { text: prompt };
  if (hasPhoto) reqBody.images = ['data:' + savedMime + ';base64,' + savedB64];

  try {
    const resp = await fetch(RISK_WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reqBody),
    });

    if (!resp.ok) throw new Error('服務暫時無法使用，請稍後再試（' + resp.status + '）');

    const data = await resp.json();
    const aiText = data?.data
                || data?.choices?.[0]?.message?.content
                || data?.text
                || '';

    if (!aiText) throw new Error('AI 回應為空，請稍後再試');

    typingEl.remove();

    const msgs = document.getElementById('risk-messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'rmsg-bot';
    const bubble = document.createElement('div');
    bubble.className = 'risk-ai-bubble';
    bubble.innerHTML = rMd(aiText);
    msgDiv.appendChild(bubble);
    msgs.appendChild(msgDiv);
    msgs.scrollTop = msgs.scrollHeight;

  } catch(err) {
    typingEl.remove();
    appendRiskMsg('⚠️ ' + rEsc(err.message), false);
  } finally {
    inp.disabled = false; btn.disabled = false; inp.focus();
  }
}
