<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防火避難設施自行檢查紀錄表</title>
<style>
:root {
  --fire: #dc2626; --fire-dark: #991b1b;
  --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
  --text: #1e293b; --sub: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); }

/* ── Screen-only UI ── */
.no-print header {
  background: linear-gradient(135deg, #450a0a 0%, #991b1b 45%, #ea580c 100%);
  color: #fff; padding: 11px 20px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.no-print header h1 { font-size: 16px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer; font-family: inherit; text-decoration: none;
}
.hdr-btn:hover { background: rgba(255,255,255,.2); }
.action-bar {
  display: flex; gap: 10px; align-items: center;
  padding: 14px 24px; background: var(--card);
  border-bottom: 1px solid var(--border);
}
.btn-print {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 22px; border-radius: 8px;
  background: var(--fire); color: #fff;
  font-size: 13px; font-weight: 700; border: none;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 3px 10px rgba(220,38,38,.3);
}
.btn-print:hover { background: var(--fire-dark); }
.btn-clear {
  padding: 9px 18px; border-radius: 8px;
  background: #f1f5f9; border: 1px solid var(--border);
  color: var(--sub); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-clear:hover { background: var(--border); }
.action-hint { font-size: 12px; color: var(--sub); }

/* ── Form Page ── */
.form-page {
  max-width: 820px; margin: 24px auto; padding: 32px 36px;
  background: var(--card); border-radius: 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,.08);
}

.form-title {
  text-align: center; font-size: 20px; font-weight: 800;
  letter-spacing: 4px; margin-bottom: 16px; color: var(--text);
}

.form-header {
  display: flex; flex-wrap: wrap; gap: 0;
  border: 1px solid #333; margin-bottom: 0;
}
.header-field {
  flex: 1; min-width: 180px; padding: 7px 12px;
  border-right: 1px solid #333; font-size: 13px;
  display: flex; align-items: center; gap: 6px;
}
.header-field:last-child { border-right: none; }
.header-field label { white-space: nowrap; font-weight: 600; }
.header-field input {
  flex: 1; border: none; border-bottom: 1px solid #888;
  font-size: 13px; font-family: inherit; background: transparent;
  outline: none; min-width: 60px;
}
.header-field input:focus { border-bottom-color: var(--fire); }

/* ── Check Table ── */
.check-table {
  width: 100%; border-collapse: collapse;
  border: 2px solid #333; margin-top: 0;
}
.check-table th {
  background: #333; color: #fff; font-size: 12px; font-weight: 700;
  padding: 8px 10px; text-align: center; letter-spacing: 1px;
  border: 1px solid #555;
}
.check-table td {
  font-size: 13px; padding: 8px 10px;
  border: 1px solid #ccc; vertical-align: middle;
}
.item-col { width: 60%; line-height: 1.6; }
.check-cell {
  width: 20%; text-align: center; cursor: pointer;
  user-select: none; font-size: 13px; font-weight: 600;
  transition: background .15s;
}
.check-cell:hover { background: #f8fafc; }
.check-empty { color: #aaa; }
.check-pass { background: #f0fdf4; color: #16a34a; }
.check-fail { background: #fef2f2; color: #dc2626; }

/* ── Signature Area ── */
.sig-row {
  display: flex; border: 1px solid #333; border-top: 2px solid #333;
  margin-top: -1px;
}
.sig-cell {
  flex: 1; padding: 10px 14px; min-height: 64px;
  border-right: 1px solid #333; font-size: 12px; font-weight: 700;
}
.sig-cell:last-child { border-right: none; }
.sig-input {
  width: 100%; border: none; border-bottom: 1px solid #ccc;
  margin-top: 8px; font-size: 12px; font-family: inherit;
  background: transparent; outline: none;
}
.sig-input:focus { border-bottom-color: var(--fire); }

/* ── Notes ── */
.notes { font-size: 11px; color: #555; margin-top: 10px; line-height: 1.8; }
.notes strong { color: var(--text); }

/* ── Dark Mode ── */
body.dark { background: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9; --sub: #94a3b8; }
body.dark .form-page { background: #1e293b; }
body.dark .form-title { color: #f1f5f9; }
body.dark .check-table th { background: #1e3a5f; }
body.dark .check-table td { border-color: #334155; color: #f1f5f9; }
body.dark .check-cell:hover { background: #263349; }
body.dark .check-pass { background: #052e16; }
body.dark .check-fail { background: #450a0a; }
body.dark .notes { color: #94a3b8; }
body.dark .action-bar { background: #1e293b; }

/* ── Print ── */
@media print {
  .no-print { display: none !important; }
  body { background: white; font-size: 10pt; }
  .form-page {
    margin: 0; padding: 12mm 14mm;
    box-shadow: none; border-radius: 0; max-width: 100%;
  }
  .form-title { font-size: 16pt; margin-bottom: 10px; }
  .header-field input { border-bottom: 1px solid #000; }
  .check-table td { padding: 5px 8px; font-size: 9pt; }
  .check-table th { font-size: 9pt; padding: 5px 8px; }
  .check-cell { font-size: 10pt; }
  .check-empty { color: #999; }
  .sig-input { border-bottom: 1px solid #000; }
  .notes { font-size: 8pt; }
  .check-table { border-color: #000; }
  .check-table th { background: #e0e0e0 !important; color: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-pass { background: #e8f5e9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-fail { background: #ffebee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div class="no-print">
  <header>
    <a class="hdr-btn" href="../">← 消防管理</a>
    <h1>🔥 防火避難設施自行檢查紀錄表</h1>
  </header>
  <div class="action-bar">
    <button class="btn-print" onclick="window.print()">🖨️ 列印 / 匯出 PDF</button>
    <button class="btn-clear" onclick="clearAll()">↺ 清除全部</button>
    <span class="action-hint">點擊儲存格切換狀態：□ 未填 → ■ 符合 → ■ 不符合</span>
  </div>
</div>

<div class="form-page" id="form-page">

  <h2 class="form-title">防火避難設施自行檢查紀錄表</h2>

  <div class="form-header">
    <div class="header-field">
      <label>實施人員：</label>
      <input type="text" id="inspector" placeholder="姓名">
    </div>
    <div class="header-field">
      <label>負責區域：</label>
      <input type="text" id="area" placeholder="區域">
    </div>
    <div class="header-field" style="flex:1.4">
      <label>實施日時：</label>
      <input type="text" id="datetime" placeholder="民國　年　月　日">
    </div>
  </div>

  <table class="check-table">
    <thead>
      <tr>
        <th style="width:4%">#</th>
        <th class="item-col" style="text-align:left">檢　查　重　點</th>
        <th style="width:18%">第一次<br>檢查結果</th>
        <th style="width:18%">第二次<br>檢查結果</th>
      </tr>
    </thead>
    <tbody id="check-body"></tbody>
  </table>

  <div class="sig-row">
    <div class="sig-cell">
      防火管理人處置情形暨簽章<br>
      <input class="sig-input" type="text" placeholder="">
    </div>
    <div class="sig-cell">
      管理權人處置情形暨簽章<br>
      <input class="sig-input" type="text" placeholder="">
    </div>
  </div>

  <div class="notes">
    <strong>備考：</strong>如有異常現象，應立即報告防火管理人。<br>
    <strong>符號說明：</strong>「■符合」→堪用、符合安全規定等；「■不符合」→無法使用、損壞或未依安全規定且無法立即排除者。
  </div>

</div>

<script>
const ITEMS = [
  '安全門(防火門)之自動關閉器動作正常。',
  '防火鐵捲門下之空間無障礙物。',
  '樓梯不得以易燃材料裝修。',
  '安全門、樓梯、走廊、通道無堆積妨礙避難逃生之物品。',
  '安全門無障礙物並保持關閉。',
  '安全門未上鎖。',
  '樓梯間未堆積雜物。',
  '避難通道有確保必要之寬度。',
  '避難逃生路線圖應規定裝設。',
  '其它：',
];

const STATES = [
  { text: '□', cls: 'check-cell check-empty' },
  { text: '■ 符合', cls: 'check-cell check-pass' },
  { text: '■ 不符合', cls: 'check-cell check-fail' },
];

function buildTable() {
  const tbody = document.getElementById('check-body');
  tbody.innerHTML = ITEMS.map((item, i) => `
    <tr>
      <td style="text-align:center;font-weight:700">${i + 1}</td>
      <td class="item-col">${i < 9 ? '　' : ''}${item}</td>
      <td class="${STATES[0].cls}" data-state="0" onclick="toggleCheck(this)">${STATES[0].text}</td>
      <td class="${STATES[0].cls}" data-state="0" onclick="toggleCheck(this)">${STATES[0].text}</td>
    </tr>`).join('');
}

function toggleCheck(cell) {
  let s = (parseInt(cell.dataset.state) + 1) % STATES.length;
  cell.dataset.state = s;
  cell.textContent = STATES[s].text;
  cell.className = STATES[s].cls;
}

function clearAll() {
  document.querySelectorAll('.check-cell').forEach(c => {
    c.dataset.state = 0; c.textContent = STATES[0].text; c.className = STATES[0].cls;
  });
  document.querySelectorAll('input[type="text"]').forEach(i => i.value = '');
}

buildTable();

if (localStorage.getItem('portal-dark') === '1') document.body.classList.add('dark');
</script>
</body>
</html>
