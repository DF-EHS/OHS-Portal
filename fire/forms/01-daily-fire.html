<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常火源自行檢查表</title>
<style>
:root {
  --fire: #dc2626; --fire-dark: #991b1b;
  --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
  --text: #1e293b; --sub: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); }

.no-print header {
  background: linear-gradient(135deg, #450a0a 0%, #991b1b 45%, #ea580c 100%);
  color: #fff; padding: 11px 20px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.no-print header h1 { font-size: 16px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer; font-family: inherit; text-decoration: none;
}
.hdr-btn:hover { background: rgba(255,255,255,.2); }
.action-bar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 10px 24px; background: var(--card);
  border-bottom: 1px solid var(--border);
}
.action-label { font-size: 13px; color: var(--sub); font-weight: 600; }
.sel-group { display: flex; align-items: center; gap: 6px; }
.sel-group select {
  padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
  font-size: 13px; font-family: inherit; background: var(--card); color: var(--text); cursor: pointer;
}
.btn-rebuild {
  padding: 6px 14px; border-radius: 6px;
  background: #334155; color: #fff;
  font-size: 13px; font-weight: 600; border: none;
  cursor: pointer; font-family: inherit;
}
.btn-rebuild:hover { background: #1e293b; }
.btn-print {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 20px; border-radius: 8px;
  background: var(--fire); color: #fff;
  font-size: 13px; font-weight: 700; border: none;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 3px 10px rgba(220,38,38,.3);
}
.btn-print:hover { background: var(--fire-dark); }
.btn-clear {
  padding: 8px 16px; border-radius: 8px;
  background: #f1f5f9; border: 1px solid var(--border);
  color: var(--sub); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.btn-clear:hover { background: var(--border); }
.action-sep { width: 1px; height: 26px; background: var(--border); margin: 0 2px; }
.legend { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.legend-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.lc-weekend { background: #f1f5f9; color: #64748b; }
.lc-holiday { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
.lc-workday { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.lc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lc-weekend .lc-dot { background: #94a3b8; }
.lc-holiday .lc-dot { background: #f59e0b; }
.lc-workday .lc-dot { background: #22c55e; }

.form-page {
  max-width: 900px; margin: 20px auto; padding: 28px 32px;
  background: var(--card); border-radius: 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,.08);
}
.form-title {
  text-align: center; font-size: 19px; font-weight: 800;
  letter-spacing: 4px; margin-bottom: 14px;
}
.form-header {
  display: flex; flex-wrap: wrap; border: 1px solid #333; margin-bottom: 0;
}
.header-field {
  flex: 1; min-width: 160px; padding: 7px 12px;
  border-right: 1px solid #333; font-size: 13px;
  display: flex; align-items: center; gap: 6px;
}
.header-field:last-child { border-right: none; }
.header-field label { white-space: nowrap; font-weight: 600; }
.header-field input {
  flex: 1; border: none; border-bottom: 1px solid #888;
  font-size: 13px; font-family: inherit; background: transparent; outline: none;
}
.header-field input:focus { border-bottom-color: var(--fire); }
.month-display { font-weight: 700; font-size: 13px; color: var(--fire-dark); }

.check-table { width: 100%; border-collapse: collapse; border: 2px solid #333; }
.check-table th {
  background: #333; color: #fff; font-size: 11px; font-weight: 700;
  padding: 7px 6px; text-align: center; border: 1px solid #555; line-height: 1.4;
}
.check-table td {
  font-size: 13px; padding: 5px 7px;
  border: 1px solid #ccc; vertical-align: middle;
}
.check-cell {
  text-align: center; cursor: pointer;
  user-select: none; font-size: 14px; font-weight: 700;
  transition: background .12s; white-space: nowrap;
}
.check-cell:hover { filter: brightness(.93); }
.check-empty { color: #ccc; background: #fafafa; }
.check-na    { color: #555; background: #f1f5f9; font-size: 12px; font-weight: 700; }
.check-pass  { background: #f0fdf4; color: #15803d; font-size: 15px; }
.check-warn  { background: #fffbeb; color: #b45309; font-size: 14px; }
.check-fail  { background: #fef2f2; color: #dc2626; font-size: 14px; }
.weekend-cell { background: #f8fafc !important; cursor: default; }
.weekend-cell:hover { filter: none; }

/* ── 列顏色 ── */
tr.weekend-row td  { background: #f8fafc; color: #94a3b8; }
tr.weekend-row td:first-child,
tr.weekend-row td:nth-child(2) { color: #64748b; }
tr.holiday-row td  { background: #fffdf0; }  /* 國定假日（平日）：淡黃 */
tr.holiday-row td:nth-child(2) { color: #b45309; font-weight: 700; }
tr.workday-row td  { background: #f0fdf8; }  /* 補班日：淡綠 */
tr.workday-row td:nth-child(2) { color: #15803d; font-weight: 700; }

.workday-badge {
  display: inline-block; font-size: 9px; padding: 0 4px;
  background: #dcfce7; color: #15803d; border-radius: 4px;
  font-weight: 700; margin-left: 3px; vertical-align: middle;
  border: 1px solid #bbf7d0;
}

.remark-cell { min-width: 120px; }
.remark-input {
  width: 100%; border: none; border-bottom: 1px dotted #ccc;
  font-size: 12px; font-family: inherit; background: transparent; outline: none;
}
.remark-input:focus { border-bottom-color: var(--fire); }
.off-remark { font-size: 12px; color: #94a3b8; font-style: italic; }
.holiday-remark { font-size: 11px; color: #b45309; font-weight: 600; }

.sig-row { display: flex; border: 2px solid #333; border-top: none; }
.sig-cell {
  flex: 1; padding: 10px 14px; min-height: 56px;
  border-right: 1px solid #333; font-size: 12px; font-weight: 700;
}
.sig-cell:last-child { border-right: none; }
.sig-input {
  width: 100%; border: none; border-bottom: 1px solid #ccc;
  margin-top: 8px; font-size: 12px; font-family: inherit;
  background: transparent; outline: none;
}
.sig-input:focus { border-bottom-color: var(--fire); }
.notes { font-size: 11px; color: #555; margin-top: 10px; line-height: 1.9; }
.notes strong { color: var(--text); }

/* ── Dark Mode ── */
body.dark { background: #0f172a; }
body.dark .form-page { background: #1e293b; color: #f1f5f9; }
body.dark .form-title { color: #f1f5f9; }
body.dark .check-table td { border-color: #334155; color: #f1f5f9; }
body.dark .check-cell:hover { filter: brightness(1.2); }
body.dark .check-empty { background: #0f172a; }
body.dark .check-na { background: #263349; color: #94a3b8; }
body.dark .check-pass { background: #052e16; color: #4ade80; }
body.dark .check-warn { background: #422006; color: #fcd34d; }
body.dark .check-fail { background: #450a0a; color: #f87171; }
body.dark tr.weekend-row td { background: #1a2235; color: #475569; }
body.dark tr.holiday-row td  { background: #2d2000; }
body.dark tr.holiday-row td:nth-child(2) { color: #fbbf24; }
body.dark tr.workday-row td  { background: #052e16; }
body.dark tr.workday-row td:nth-child(2) { color: #4ade80; }
body.dark .action-bar { background: #1e293b; border-color: #334155; }
body.dark .sel-group select { background: #0f172a; border-color: #334155; color: #f1f5f9; }
body.dark .notes { color: #94a3b8; }
body.dark .lc-weekend { background: #263349; color: #94a3b8; }
body.dark .lc-holiday { background: #422006; color: #fbbf24; border-color: #78350f; }
body.dark .lc-workday { background: #052e16; color: #4ade80; border-color: #166534; }

/* ── Print ── */
@media print {
  @page { size: A4 portrait; margin: 10mm 12mm; }
  .no-print { display: none !important; }
  body { background: white; font-size: 8pt; }
  .form-page { margin: 0; padding: 0; box-shadow: none; border-radius: 0; max-width: 100%; }
  .form-title { font-size: 13pt; margin-bottom: 6px; letter-spacing: 3px; }
  .check-table th { font-size: 7pt; padding: 4px 3px; }
  .check-table td { padding: 3px 4px; font-size: 8pt; }
  .check-cell { font-size: 9pt; }
  .remark-cell { font-size: 7pt; }
  .remark-input { font-size: 7pt; border-bottom: 1px solid #000; }
  tr.weekend-row td { background: #f4f4f4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.holiday-row td  { background: #fffde7 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.workday-row td  { background: #f1fff5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-pass { background: #e8f5e9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-warn { background: #fffde7 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-fail { background: #ffebee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-na   { background: #f5f5f5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .check-table th { background: #e0e0e0 !important; color: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .notes { font-size: 7pt; }
  .workday-badge { display: none; }
}
</style>
</head>
<body>

<div class="no-print">
  <header>
    <a class="hdr-btn" href="../">← 消防管理</a>
    <h1>🔥 日常火源自行檢查表</h1>
  </header>
  <div class="action-bar">
    <span class="action-label">月份：</span>
    <div class="sel-group">
      <select id="sel-year"></select>
      <span style="font-size:13px">年</span>
      <select id="sel-month">
        <option value="1">1</option><option value="2">2</option>
        <option value="3">3</option><option value="4">4</option>
        <option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option>
        <option value="9">9</option><option value="10">10</option>
        <option value="11">11</option><option value="12">12</option>
      </select>
      <span style="font-size:13px">月</span>
      <button class="btn-rebuild" onclick="rebuildTable()">更新表格</button>
    </div>
    <div class="action-sep"></div>
    <button class="btn-print" onclick="window.print()">🖨️ 列印 / 匯出 PDF</button>
    <button class="btn-clear" onclick="resetToDefaults()">↺ 重設</button>
    <div class="action-sep"></div>
    <div class="legend">
      <span class="legend-chip lc-weekend"><span class="lc-dot"></span>週末</span>
      <span class="legend-chip lc-holiday"><span class="lc-dot"></span>國定假日</span>
      <span class="legend-chip lc-workday"><span class="lc-dot"></span>補班</span>
    </div>
  </div>
</div>

<div class="form-page">

  <h2 class="form-title">日　常　火　源　自　行　檢　查　表</h2>

  <div class="form-header">
    <div class="header-field">
      <label>填表員：</label>
      <input type="text" id="inspector" placeholder="姓名">
    </div>
    <div class="header-field">
      <label>區域：</label>
      <input type="text" id="area" placeholder="區域">
    </div>
    <div class="header-field">
      <label>月份：</label>
      <span class="month-display" id="month-display">— 年 — 月</span>
    </div>
  </div>

  <table class="check-table" id="daily-table">
    <thead>
      <tr>
        <th style="width:5%">日<br>期</th>
        <th style="width:5%">週</th>
        <th style="width:12%">用火設備<br>使用情形</th>
        <th style="width:12%">電器設備<br>關閉檢查</th>
        <th style="width:10%">煙蒂<br>處理</th>
        <th style="width:12%">下班時<br>火源管理</th>
        <th style="width:16%">其它<br><span style="font-size:9px;font-weight:400">（共有設備（施）<br>之可燃物管理）</span></th>
        <th>附記</th>
      </tr>
    </thead>
    <tbody id="daily-body"></tbody>
  </table>

  <div class="sig-row">
    <div class="sig-cell">
      防火管理人處置情形及簽章<br>
      <input class="sig-input" type="text">
    </div>
  </div>

  <div class="notes">
    <strong>備考：</strong>如有異常現象，應立即報告防火管理人。<br>
    <strong>符號說明：</strong>
    「○」→ 符合規定；「Ｖ」→ 立即改善後符合規定；「Ｘ」→ 無法使用、損壞或未符規定且無法立即改善；「無」→ 無此作業項目（不適用）。
  </div>

</div>

<script>
const WEEK_NAMES = ['日','一','二','三','四','五','六'];

// States: 0=blank, 1=無, 2=○, 3=Ｖ, 4=Ｘ
const STATES = [
  { text: '',   cls: 'check-cell check-empty' },
  { text: '無',  cls: 'check-cell check-na'    },
  { text: '○',  cls: 'check-cell check-pass'  },
  { text: 'Ｖ', cls: 'check-cell check-warn'  },
  { text: 'Ｘ', cls: 'check-cell check-fail'  },
];

// Weekday default: [用火設備, 電器設備, 煙蒂, 下班火源, 其它]  無=1  ○=2
const WEEKDAY_DEFAULTS = [1, 2, 2, 1, 1];

//  資料來源：行政院人事行政總處
//    https://www.dgpa.gov.tw/informationlist?uid=127
//  ⚠️  標記「需確認」的項目每年年底請對照官方公告更新
// ══════════════════════════════════════════════════════════════════
const HOLIDAYS = {

  '2026-02-22': ['H', '春節 初六'],    // 週日
  '2026-02-28': ['H', '和平紀念日'],   // 週六
  '2026-03-02': ['H', '和平紀念日 補假'],  // 需確認

  '2028-01-31': ['H', '春節 初四 補假'],  // 需確認

function initYearSelector() {
  const sel = document.getElementById('sel-year');
  const curRoc = new Date().getFullYear() - 1911;
  for (let y = curRoc - 2; y <= curRoc + 3; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if (y === curRoc) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('sel-month').value = new Date().getMonth() + 1;
}

function rebuildTable() {
  const rocYear = parseInt(document.getElementById('sel-year').value);
  const month   = parseInt(document.getElementById('sel-month').value);
  const adYear  = rocYear + 1911;

  document.getElementById('month-display').textContent = `${rocYear} 年 ${month} 月`;

  const daysInMonth = new Date(adYear, month, 0).getDate();
  const tbody = document.getElementById('daily-body');
  let html = '';

  for (let day = 1; day <= daysInMonth; day++) {
    const wd      = new Date(adYear, month - 1, day).getDay();
    const dateStr = `${adYear}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const hdata   = HOLIDAYS[dateStr];           // ['H'|'W', '名稱'] or undefined
    const isWeekend = wd === 0 || wd === 6;

    // 判斷當日性質
    const isWorkday  = isWeekend && hdata?.[0] === 'W';                        // 補班（週末改工作）
    const isHoliday  = hdata?.[0] === 'H' || (isWeekend && !isWorkday);       // 放假
    const isNatHol   = hdata?.[0] === 'H' && !isWeekend;                      // 平日國定假日（染色）

    // 列樣式
    let rowClass = 'weekend-row';
    if (isWorkday)   rowClass = 'workday-row';
    else if (isNatHol) rowClass = 'holiday-row';

    // 週 欄顏色（放假日不套用紅/橙，補班不套用）
    let wdColor = '';
    if (!isHoliday && !isWorkday) {
      if (wd === 6) wdColor = 'color:#b45309;';
      if (wd === 0) wdColor = 'color:#dc2626;';
    }
    const badge = isWorkday ? '<span class="workday-badge">補班</span>' : '';

    html += `<tr class="${rowClass}" data-holiday="${isHoliday && !isWorkday}">`;
    html += `<td style="text-align:center;font-weight:700;width:5%">${day}</td>`;
    html += `<td style="text-align:center;width:5%;${wdColor}">${WEEK_NAMES[wd]}${badge}</td>`;

    if (isHoliday && !isWorkday) {
      // 放假列：空白不可點擊格 + 假日名稱
      for (let i = 0; i < 5; i++) {
        html += `<td class="check-cell check-empty weekend-cell" data-readonly="1"></td>`;
      }
      const remarkText = hdata ? hdata[1] : '無上班';
      const remarkCls  = (isNatHol && hdata) ? 'holiday-remark' : 'off-remark';
      html += `<td class="remark-cell"><span class="${remarkCls}">${remarkText}</span></td>`;
    } else {
      // 工作列（含補班）：預設值可點擊格
      WEEKDAY_DEFAULTS.forEach(s => {
        html += `<td class="${STATES[s].cls}" data-state="${s}" onclick="toggleCheck(this)">${STATES[s].text}</td>`;
      });
      html += `<td class="remark-cell"><input type="text" class="remark-input" placeholder=""></td>`;
    }
    html += '</tr>';
  }
  tbody.innerHTML = html;
}

function toggleCheck(cell) {
  if (cell.dataset.readonly) return;
  let s = (parseInt(cell.dataset.state) + 1) % STATES.length;
  cell.dataset.state = s;
  cell.textContent = STATES[s].text;
  cell.className = STATES[s].cls;
}

function resetToDefaults() {
  if (!confirm('重設所有儲存格為預設值？（平日及補班日恢復預設，已填附記將清除）')) return;
  rebuildTable();
  document.querySelectorAll('#inspector, #area, .sig-input').forEach(i => i.value = '');
}

initYearSelector();
rebuildTable();
if (localStorage.getItem('portal-dark') === '1') document.body.classList.add('dark');
</script>
</body>
</html>
