<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職安工作中樞 | 大豐環保科技</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.39.0/lib/msal-browser.min.js"></script>
<style>
:root {
  --accent:    #15803d;
  --accent-h:  #14532d;
  --accent-bg: #f0fdf4;
  --accent-bd: #bbf7d0;
  --bg:     #f1f5f9;
  --card:   #ffffff;
  --border: #e2e8f0;
  --text:   #1e293b;
  --sub:    #64748b;
  --red:    #dc2626;
  --orange: #d97706;
  --blue:   #2563eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #431407 0%, #c2410c 50%, #f59840 100%);
  color: #fff; padding: 14px 24px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer;
  transition: background .15s; flex-shrink: 0;
  text-decoration: none; display: inline-block; font-family: inherit;
}
.hdr-btn:hover { background: rgba(255,255,255,.2); }
header h1 { font-size: 17px; font-weight: 700; }
.hdr-brand { display: flex; align-items: center; gap: 7px; margin-left: auto; flex-shrink: 0; }
.hdr-brand img  { height: 24px; object-fit: contain; }
.hdr-brand span { font-size: 12px; color: rgba(255,255,255,.65); font-weight: 600; white-space: nowrap; }

/* ── Main ── */
main { flex: 1; max-width: 900px; margin: 0 auto; width: 100%; padding: 28px 24px 60px; }

/* ── Stats ── */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border-radius: 12px; padding: 16px;
  text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  border: 1px solid var(--border); cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.1); }
.stat-num   { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 11px; color: var(--sub); margin-top: 5px; }

/* ── Filter bar ── */
.filter-bar {
  display: flex; gap: 10px; margin-bottom: 20px;
  flex-wrap: wrap; align-items: center;
}
.filter-bar input, .filter-bar select {
  padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: inherit;
  color: var(--text); background: var(--card); outline: none;
  transition: border-color .15s;
}
.filter-bar input { flex: 1; min-width: 160px; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.new-btn {
  padding: 8px 18px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
  white-space: nowrap; margin-left: auto;
}
.new-btn:hover { background: var(--accent-h); }

/* ── Section label ── */
.sec-label {
  font-size: 11px; font-weight: 700; color: var(--sub);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Task list ── */
.task-list { display: flex; flex-direction: column; gap: 10px; }

.task-card {
  background: var(--card); border-radius: 12px;
  padding: 16px 20px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  border: 1px solid var(--border); border-left: 3px solid transparent;
  display: flex; align-items: flex-start; gap: 14px;
  transition: box-shadow .15s;
}
.task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.task-card.is-done    { opacity: .55; }
.task-card.is-overdue { border-left-color: var(--red); }
.task-card.is-doing   { border-left-color: var(--blue); }
.task-card.is-waiting { border-left-color: var(--orange); }

.task-body  { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; word-break: break-word; }
.task-title.is-done { text-decoration: line-through; color: var(--sub); }
.task-meta  { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.task-desc  { font-size: 12px; color: var(--sub); margin-top: 7px; line-height: 1.6; word-break: break-word; }

.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.b-cat     { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-bd); }
.b-phi     { background: #fee2e2; color: #991b1b; }
.b-pmid    { background: #fff7ed; color: #92400e; }
.b-plow    { background: #f8fafc; color: var(--sub); border: 1px solid var(--border); }
.b-todo    { background: #f8fafc; color: var(--sub); border: 1px solid var(--border); }
.b-doing   { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.b-waiting { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
.b-done    { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-bd); }
.due-ok    { font-size: 12px; color: var(--sub); }
.due-over  { font-size: 12px; color: var(--red); font-weight: 600; }

.task-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.ta-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--card); font-size: 12px; cursor: pointer;
  font-family: inherit; color: var(--sub); transition: background .15s; white-space: nowrap;
}
.ta-btn:hover       { background: var(--bg); }
.ta-btn.btn-done    { color: var(--accent); border-color: var(--accent-bd); background: var(--accent-bg); }
.ta-btn.btn-done:hover { background: #dcfce7; }
.ta-btn.btn-del     { color: var(--red); }
.ta-btn.btn-del:hover  { background: #fef2f2; }

/* ── Side panel ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  z-index: 300; display: none;
}
.overlay.open { display: block; }

.side-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(440px, 100vw); background: var(--card);
  box-shadow: -4px 0 28px rgba(0,0,0,.18);
  z-index: 301; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.side-panel.open { transform: translateX(0); }

.panel-hdr {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.panel-hdr h3 { font-size: 16px; font-weight: 700; }
.panel-close {
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: var(--sub); line-height: 1;
}
.panel-close:hover { color: var(--text); }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }
.panel-foot {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; flex-shrink: 0;
}

.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: inherit; color: var(--text);
  background: #fff; outline: none; transition: border-color .15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(21,128,61,.08);
}
.field textarea { min-height: 80px; resize: vertical; }
.req { color: var(--red); margin-left: 2px; }

.btn-save {
  flex: 1; padding: 10px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.btn-save:hover    { background: var(--accent-h); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }
.btn-cancel {
  padding: 10px 20px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit;
}
.btn-cancel:hover { background: var(--bg); }

/* ── Grid view ── */
.task-list.grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.grid-view .task-card   { flex-direction: column; }
.grid-view .task-actions { flex-direction: row; flex-wrap: wrap; margin-top: 10px; }

/* ── View toggle ── */
.view-toggle { display: flex; gap: 4px; flex-shrink: 0; }
.vt-btn {
  padding: 7px 10px; border-radius: 7px;
  border: 1.5px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 15px; line-height: 1;
  color: var(--sub); transition: all .15s;
}
.vt-btn.active { background: var(--accent-bg); border-color: var(--accent-bd); color: var(--accent); }

/* ── Notification ── */
.notif-wrap { position: relative; flex-shrink: 0; }
.notif-btn {
  padding: 6px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.1);
  color: #fff; font-size: 16px; cursor: pointer;
  transition: background .15s; position: relative;
  font-family: inherit;
}
.notif-btn:hover { background: rgba(255,255,255,.2); }
.notif-badge {
  position: absolute; top: -5px; right: -5px;
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 700; border-radius: 10px;
  padding: 1px 5px; line-height: 1.4; display: none; pointer-events: none;
}
.notif-badge.show { display: block; }
.notif-drop {
  position: absolute; top: calc(100% + 10px); right: 0;
  width: 300px; background: var(--card); color: var(--text);
  border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,.18);
  border: 1px solid var(--border); z-index: 400;
  display: none; overflow: hidden;
}
.notif-drop.open { display: block; }
.notif-drop-hd   { padding: 12px 16px; font-size: 13px; font-weight: 700; border-bottom: 1px solid var(--border); }
.notif-items     { max-height: 300px; overflow-y: auto; }
.notif-row {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; cursor: pointer; transition: background .15s;
  display: flex; flex-direction: column; gap: 3px;
}
.notif-row:last-child { border-bottom: none; }
.notif-row:hover { background: var(--bg); }
.notif-row-title {
  font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}
.notif-row-sub   { color: var(--sub); font-size: 11px; }
.notif-empty     { padding: 24px; text-align: center; color: var(--sub); font-size: 13px; }

/* ── States ── */
.notice { border-radius: 10px; padding: 12px 16px; font-size: 13px; display: flex; gap: 8px; align-items: flex-start; margin-bottom: 16px; line-height: 1.6; }
.notice.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-icon  { font-size: 48px; margin-bottom: 12px; }
.loading     { text-align: center; padding: 48px; color: var(--sub); font-size: 14px; }

/* ── Footer ── */
footer { text-align: center; padding: 16px; font-size: 12px; color: var(--sub); border-top: 1px solid var(--border); }

/* ── Login page ── */
#login-page {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg); display: flex; flex-direction: column;
}
@media (min-width: 769px) {
  #login-page { left: 260px; }
}
.login-hdr {
  background: linear-gradient(135deg, #431407 0%, #c2410c 50%, #f59840 100%);
  color: #fff; padding: 14px 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
.login-hdr h1 { font-size: 17px; font-weight: 700; }
.login-wrap { display: flex; align-items: center; justify-content: center; flex: 1; padding: 24px; }
.login-card {
  background: #fff; border-radius: 16px; padding: 44px 36px 36px;
  box-shadow: 0 4px 32px rgba(0,0,0,.12); width: 100%; max-width: 360px; text-align: center;
}
.login-logo { margin-bottom: 14px; }
.login-logo img { height: 140px; object-fit: contain; }
.login-card h2 { font-size: 18px; color: var(--text); font-weight: 800; margin-bottom: 4px; }
.login-card > p { font-size: 12px; color: var(--sub); margin-bottom: 28px; line-height: 1.7; }
.login-err { color: var(--red); font-size: 13px; margin-bottom: 10px; display: none; line-height: 1.5; }
.login-btn {
  width: 100%; padding: 13px;
  background: #0078d4;
  color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: opacity .15s; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.login-btn:hover:not(:disabled) { opacity: .88; }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .new-btn   { margin-left: 0; width: 100%; }
  .task-card { flex-direction: column; }
  .task-actions { flex-direction: row; }
}
</style>
</head>
<body>

<header>
  <a href="../" class="hdr-btn">← 返回入口</a>
  <h1>✅ 職安工作中樞</h1>
  <div class="notif-wrap" style="margin-left:auto">
    <button class="notif-btn" onclick="toggleNotif(event)">
      🔔<span class="notif-badge" id="notif-badge"></span>
    </button>
    <div class="notif-drop" id="notif-drop">
      <div class="notif-drop-hd">⏰ 逾期 / 即將到期</div>
      <div class="notif-items" id="notif-items"></div>
    </div>
  </div>
  <span id="user-name" style="font-size:11px;color:rgba(255,255,255,.75);flex-shrink:0;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
  <button type="button" class="hdr-btn" id="logout-btn" onclick="doLogout()" style="display:none;flex-shrink:0">登出</button>
  <div class="hdr-brand" style="margin-left:0">
    <img src="../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<main>
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">—</div><div class="stat-label">全部任務</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">—</div><div class="stat-label">進行中</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">—</div><div class="stat-label">已逾期</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--sub)">—</div><div class="stat-label">已完成</div></div>
  </div>

  <div class="filter-bar">
    <input type="text" id="search" placeholder="搜尋任務標題…" oninput="renderList()">
    <select id="filter-cat" onchange="renderList()">
      <option value="">全部類別</option>
      <option>固定工作</option><option>法規符合</option><option>風險評估</option><option>教育訓練</option>
      <option>健康管理</option><option>設備巡檢</option><option>調查追蹤</option>
      <option>行政事務</option><option>其他</option>
    </select>
    <select id="filter-status" onchange="renderList()">
      <option value="">全部狀態</option>
      <option value="todo">待處理</option>
      <option value="doing">進行中</option>
      <option value="waiting">等待中</option>
      <option value="done">已完成</option>
    </select>
    <select id="sort-by" onchange="renderList()">
      <option value="due">按到期日</option>
      <option value="priority">按優先度</option>
      <option value="created">按建立時間</option>
    </select>
    <div class="view-toggle">
      <button type="button" class="vt-btn active" id="btn-list" onclick="setView('list')" title="列表">☰</button>
      <button type="button" class="vt-btn"        id="btn-grid" onclick="setView('grid')" title="格狀">⊞</button>
    </div>
    <button type="button" class="new-btn" onclick="openPanel()">＋ 新增任務</button>
  </div>

  <div class="sec-label">任務列表</div>
  <div id="task-list"><div class="loading">請先登入…</div></div>
</main>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統 &nbsp;·&nbsp; 職安工作中樞</footer>

<!-- ── Side panel ── -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="side-panel" id="side-panel">
  <div class="panel-hdr">
    <h3 id="panel-title">新增任務</h3>
    <button type="button" class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="field">
      <label>任務標題 <span class="req">*</span></label>
      <input type="text" id="f-title" placeholder="請輸入任務標題">
    </div>
    <div class="field">
      <label>類別 <span class="req">*</span></label>
      <select id="f-category">
        <option value="">請選擇類別</option>
        <option>固定工作</option><option>法規符合</option><option>風險評估</option><option>教育訓練</option>
        <option>健康管理</option><option>設備巡檢</option><option>調查追蹤</option>
        <option>行政事務</option><option>其他</option>
      </select>
    </div>
    <div class="field">
      <label>優先度 <span class="req">*</span></label>
      <select id="f-priority">
        <option value="高">🔴 高</option>
        <option value="中" selected>🟡 中</option>
        <option value="低">⚪ 低</option>
      </select>
    </div>
    <div class="field">
      <label>狀態 <span class="req">*</span></label>
      <select id="f-status">
        <option value="todo">待處理</option>
        <option value="doing">進行中</option>
        <option value="waiting">等待中</option>
        <option value="done">已完成</option>
      </select>
    </div>
    <div class="field">
      <label>截止日期</label>
      <input type="date" id="f-due">
      <div style="margin-top:8px">
        <label style="display:inline-flex;align-items:center;gap:7px;font-weight:400;cursor:pointer;font-size:13px">
          <input type="checkbox" id="f-no-due" onchange="toggleNoDue()">
          無截止日期
        </label>
      </div>
    </div>
    <div class="field">
      <label>重複週期</label>
      <select id="f-recur">
        <option value="">不重複（單次）</option>
        <option value="weekly">每週</option>
        <option value="biweekly">每兩週</option>
        <option value="monthly">每月</option>
        <option value="quarterly">每季（3個月）</option>
        <option value="biannual">每半年（6個月）</option>
        <option value="yearly">每年</option>
        <option value="daily">每日</option>
      </select>
    </div>
    <div class="field">
      <label>協作者</label>
      <input type="text" id="f-owner" placeholder="選填">
    </div>
    <div class="field">
      <label>備註說明</label>
      <textarea id="f-desc" placeholder="選填，可記錄任務背景或注意事項"></textarea>
    </div>
  </div>
  <div class="panel-foot">
    <button type="button" class="btn-cancel" onclick="closePanel()">取消</button>
    <button type="button" class="btn-save" id="btn-save" onclick="saveTask()">儲存</button>
  </div>
</div>

<!-- ── Login page ── -->
<div id="login-page">
  <div class="login-hdr">
    <a href="../" class="hdr-btn">← 系統入口</a>
    <h1>✅ 職安工作中樞</h1>
    <div class="hdr-brand">
      <img src="../dafon-logo.png" alt="大豐環保科技">
      <span>大豐環保科技</span>
    </div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="../contract/logo-login.png" alt="大豐環保科技">
      </div>
      <h2>職安工作中樞</h2>
      <p>大豐環保科技股份有限公司<br>請使用公司 Microsoft 帳號登入</p>
      <div class="login-err" id="login-err"></div>
      <button type="button" class="login-btn" id="login-btn" onclick="doLogin()">
        <svg width="20" height="20" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="10" height="10" fill="#F35325"/>
          <rect x="12" y="1" width="10" height="10" fill="#81BC06"/>
          <rect x="1" y="12" width="10" height="10" fill="#05A6F0"/>
          <rect x="12" y="12" width="10" height="10" fill="#FFBA08"/>
        </svg>
        使用 Microsoft 帳號登入
      </button>
      <p style="font-size:11px;color:var(--sub);margin-top:14px">資料安全儲存於公司 SharePoint</p>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// Microsoft Graph / MSAL 設定
// 完成 Azure AD 應用程式註冊後，填入以下佔位符：
// ══════════════════════════════════════════════════════════════════════════════
const MSAL_CONFIG = {
  auth: {
    clientId:    '4266a752-ec70-4996-afdd-614130df98dd',
    authority:   'https://login.microsoftonline.com/619dfe56-7cb7-4ff8-b015-1bf1e7632258',
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
};
const GRAPH_SCOPES = ['Sites.ReadWrite.All'];
const SP_HOSTNAME  = 'dfrecyclecom.sharepoint.com';
const SP_SITE_PATH = '/HR';
const LIST_NAME    = 'OHSTasks';

const msalClient   = new msal.PublicClientApplication(MSAL_CONFIG);
let currentAccount = null;
let graphToken     = null;
let graphIds       = null;   // { siteId, listId }
const spItemMap    = new Map();  // taskId (UUID) → SharePoint item id

// ── 現有常數（不變）──────────────────────────────────────────────────────────
const STATUS_LABEL = { todo:'待處理', doing:'進行中', waiting:'等待中', done:'已完成' };
const PRI_BADGE    = { '高':'b-phi', '中':'b-pmid', '低':'b-plow' };
const STA_BADGE    = { todo:'b-todo', doing:'b-doing', waiting:'b-waiting', done:'b-done' };
const RECUR_LABEL  = { daily:'每日', weekly:'每週', biweekly:'每兩週', monthly:'每月', quarterly:'每季', biannual:'每半年', yearly:'每年' };

let tasks     = [];
let editingId = null;
let saving    = false;
let viewMode  = 'list';

// ══ 登入 / 登出 ══════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  if (typeof msal === 'undefined') {
    showLoginPage('MSAL 函式庫載入失敗，請重新整理頁面');
    return;
  }
  await msalClient.handleRedirectPromise().catch(() => {});
  const accounts = msalClient.getAllAccounts();
  if (accounts.length > 0) {
    currentAccount = accounts[0];
    try {
      await refreshToken();
      await initGraph();
      hideLoginPage();
      await loadTasks();
    } catch (e) {
      showLoginPage(`自動登入失敗：${e.message || e}`);
    }
  } else {
    showLoginPage();
  }
});

async function doLogin() {
  const btn = V('login-btn');
  btn.textContent = '登入中…'; btn.disabled = true;
  V('login-err').style.display = 'none';
  try {
    const result = await msalClient.loginPopup({ scopes: GRAPH_SCOPES });
    currentAccount = result.account;
    graphToken = result.accessToken;
    await initGraph();
    hideLoginPage();
    await loadTasks();
  } catch (e) {
    const isCancel = e.errorCode === 'user_cancelled' || e.message?.includes('user_cancelled');
    const msg = isCancel ? '已取消登入' : `登入失敗：${e.message || e}`;
    const errEl = V('login-err');
    errEl.textContent = msg;
    errEl.style.display = 'block';
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="10" height="10" fill="#F35325"/><rect x="12" y="1" width="10" height="10" fill="#81BC06"/><rect x="1" y="12" width="10" height="10" fill="#05A6F0"/><rect x="12" y="12" width="10" height="10" fill="#FFBA08"/></svg> 使用 Microsoft 帳號登入';
    btn.disabled = false;
  }
}

async function doLogout() {
  try { await msalClient.logoutPopup({ account: currentAccount }); } catch {}
  currentAccount = null; graphToken = null; graphIds = null;
  spItemMap.clear(); tasks = [];
  V('user-name').textContent = '';
  V('logout-btn').style.display = 'none';
  showLoginPage();
}

async function refreshToken() {
  if (!currentAccount) throw new Error('未登入');
  try {
    const r = await msalClient.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: currentAccount });
    graphToken = r.accessToken;
  } catch {
    const r = await msalClient.loginPopup({ scopes: GRAPH_SCOPES });
    currentAccount = r.account;
    graphToken = r.accessToken;
  }
}

function hideLoginPage() {
  V('login-page').style.display = 'none';
  if (currentAccount) {
    V('user-name').textContent = currentAccount.name || currentAccount.username || '';
    V('logout-btn').style.display = '';
  }
}
function showLoginPage(errMsg) {
  V('login-page').style.display = '';
  if (errMsg) { const e = V('login-err'); e.textContent = errMsg; e.style.display = 'block'; }
  const btn = V('login-btn');
  btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="10" height="10" fill="#F35325"/><rect x="12" y="1" width="10" height="10" fill="#81BC06"/><rect x="1" y="12" width="10" height="10" fill="#05A6F0"/><rect x="12" y="12" width="10" height="10" fill="#FFBA08"/></svg> 使用 Microsoft 帳號登入';
  btn.disabled = false;
}

// ══ Graph 初始化（取得 siteId + listId）══════════════════════════════════════
async function initGraph() {
  await refreshToken();
  const h = graphHeaders();

  const siteRes = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${SP_HOSTNAME}:${SP_SITE_PATH}`,
    { headers: h }
  );
  if (!siteRes.ok) {
    const e = await siteRes.json().catch(() => ({}));
    throw new Error(`無法連接 SharePoint（${siteRes.status}）：${e.error?.message || ''}`);
  }
  const site = await siteRes.json();

  const listRes = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${site.id}/lists?$filter=displayName eq '${LIST_NAME}'`,
    { headers: h }
  );
  const lists = await listRes.json();
  if (!lists.value?.length) throw new Error(`找不到 SharePoint 清單「${LIST_NAME}」，請確認清單已建立且名稱正確`);
  graphIds = { siteId: site.id, listId: lists.value[0].id };
}

function graphHeaders() {
  return { Authorization: `Bearer ${graphToken}` };
}

// ══ 載入任務（Graph GET）══════════════════════════════════════════════════════
async function loadTasks() {
  setList('<div class="loading">載入中…</div>');
  try {
    await refreshToken();
    if (!graphIds) await initGraph();
    const items = await fetchAllItems(
      `https://graph.microsoft.com/v1.0/sites/${graphIds.siteId}/lists/${graphIds.listId}/items?expand=fields&$top=999`,
      graphHeaders()
    );
    spItemMap.clear();
    const seen = new Set();
    tasks = items
      .filter(item => {
        const id = item.fields?.taskId;
        if (!id || seen.has(id)) return false;
        seen.add(id); return true;
      })
      .map(item => {
        const f = item.fields;
        spItemMap.set(f.taskId, item.id);
        return {
          id:                  f.taskId              || '',
          title:               f.Title               || '',
          category:            f.category            || '',
          dueAt:               f.dueAt               || '',
          repeatRule:          f.repeatRule          || '',
          status:              f.taskStatus          || 'todo',
          priority:            f.priority            || '中',
          owner:               f.owner               || '',
          description:         f.description         || '',
          reminderDays:        Number(f.reminderDays) || 7,
          reminderTime:        f.reminderTime        || '',
          tags:                safeJson(f.tags,        []),
          documents:           safeJson(f.documents,   []),
          createdAt:           f.createdAt           || '',
          updatedAt:           f.updatedAt           || '',
          noDueDate:           !!f.noDueDate,
          repeatWeekday:       f.repeatWeekday       || '',
          repeatMonthDay:      f.repeatMonthDay      || '',
          repeatQuarterMonth:  f.repeatQuarterMonth  || '',
          repeatQuarterDay:    f.repeatQuarterDay    || '',
          repeatHalfYearMonth: f.repeatHalfYearMonth || '',
          repeatHalfYearDay:   f.repeatHalfYearDay   || '',
          repeatYearMonth:     f.repeatYearMonth     || '',
          repeatYearDay:       f.repeatYearDay       || '',
          repeatCustomText:    f.repeatCustomText    || ''
        };
      });
    renderAll();
  } catch(e) {
    setList(`<div class="notice err">❌ 載入失敗：${esc(e.message)}<br>
      <small>請確認 SharePoint 清單已建立，或重新整理頁面再試。</small></div>`);
  }
}

async function fetchAllItems(url, headers) {
  let items = [], nextUrl = url;
  while (nextUrl) {
    const res = await fetch(nextUrl, { headers });
    if (!res.ok) throw new Error(`Graph API 錯誤（${res.status}）`);
    const data = await res.json();
    items = items.concat(data.value || []);
    nextUrl = data['@odata.nextLink'] || null;
  }
  return items;
}

// ══ CRUD（Graph POST / PATCH / DELETE）═══════════════════════════════════════
async function apiPost(payload) {
  await refreshToken();
  if (!graphIds) await initGraph();
  const h = { ...graphHeaders(), 'Content-Type': 'application/json' };
  const base = `https://graph.microsoft.com/v1.0/sites/${graphIds.siteId}/lists/${graphIds.listId}/items`;

  if (payload.action === 'add') {
    const res = await fetch(base, {
      method: 'POST', headers: h,
      body: JSON.stringify({ fields: taskToFields(payload.task) })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `新增失敗（${res.status}）`);
    }
    const created = await res.json();
    spItemMap.set(payload.task.id, created.id);

  } else if (payload.action === 'update') {
    const spId = spItemMap.get(payload.task.id);
    if (!spId) throw new Error('找不到對應項目，請重新整理頁面');
    const res = await fetch(`${base}/${spId}`, {
      method: 'PATCH', headers: h,
      body: JSON.stringify({ fields: taskToFields(payload.task) })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `更新失敗（${res.status}）`);
    }

  } else if (payload.action === 'delete') {
    const spId = spItemMap.get(payload.id);
    if (!spId) throw new Error('找不到對應項目，請重新整理頁面');
    const res = await fetch(`${base}/${spId}`, { method: 'DELETE', headers: h });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `刪除失敗（${res.status}）`);
    }
    spItemMap.delete(payload.id);
  }
}

function taskToFields(task) {
  return {
    taskId:              task.id              || '',
    Title:               task.title           || '',
    category:            task.category        || '',
    dueAt:               task.dueAt           || '',
    repeatRule:          task.repeatRule      || '',
    taskStatus:          task.status          || 'todo',
    priority:            task.priority        || '中',
    owner:               task.owner           || '',
    description:         task.description     || '',
    reminderDays:        task.reminderDays    ?? 7,
    reminderTime:        task.reminderTime    || '',
    tags:                JSON.stringify(task.tags      || []),
    documents:           JSON.stringify(task.documents || []),
    createdAt:           task.createdAt       || '',
    updatedAt:           task.updatedAt       || '',
    noDueDate:           !!task.noDueDate,
    repeatWeekday:       task.repeatWeekday       || '',
    repeatMonthDay:      task.repeatMonthDay      || '',
    repeatQuarterMonth:  task.repeatQuarterMonth  || '',
    repeatQuarterDay:    task.repeatQuarterDay    || '',
    repeatHalfYearMonth: task.repeatHalfYearMonth || '',
    repeatHalfYearDay:   task.repeatHalfYearDay   || '',
    repeatYearMonth:     task.repeatYearMonth     || '',
    repeatYearDay:       task.repeatYearDay       || '',
    repeatCustomText:    task.repeatCustomText    || ''
  };
}

function safeJson(str, fallback) {
  if (!str) return fallback;
  try { return JSON.parse(str); } catch { return fallback; }
}

function genId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ══ View toggle ══════════════════════════════════════════════════════════════
function setView(mode) {
  viewMode = mode;
  V('btn-list').classList.toggle('active', mode === 'list');
  V('btn-grid').classList.toggle('active', mode === 'grid');
  renderList();
}

// ══ Render ═══════════════════════════════════════════════════════════════════
function renderAll() { renderStats(); renderList(); updateNotifBadge(); }

function renderStats() {
  const total = tasks.length;
  const open  = tasks.filter(t => t.status !== 'done').length;
  const over  = tasks.filter(isOverdue).length;
  const done  = tasks.filter(t => t.status === 'done').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card" onclick="setFilter('')">
      <div class="stat-num" style="color:var(--accent)">${total}</div>
      <div class="stat-label">全部任務</div>
    </div>
    <div class="stat-card" onclick="setFilter('open')">
      <div class="stat-num" style="color:var(--blue)">${open}</div>
      <div class="stat-label">進行中</div>
    </div>
    <div class="stat-card" onclick="setFilter('overdue')">
      <div class="stat-num" style="color:var(--red)">${over}</div>
      <div class="stat-label">已逾期</div>
    </div>
    <div class="stat-card" onclick="setFilter('done')">
      <div class="stat-num" style="color:var(--sub)">${done}</div>
      <div class="stat-label">已完成</div>
    </div>`;
}

function setFilter(type) {
  const ss = document.getElementById('filter-status');
  const sc = document.getElementById('filter-cat');
  if      (type === 'open')    ss.value = 'doing';
  else if (type === 'done')    ss.value = 'done';
  else { ss.value = ''; sc.value = ''; }
  renderList();
}

function filteredTasks() {
  const q      = document.getElementById('search').value.trim().toLowerCase();
  const cat    = document.getElementById('filter-cat').value;
  const sta    = document.getElementById('filter-status').value;
  const sortBy = document.getElementById('sort-by').value;
  const priOrder = { '高':0, '中':1, '低':2 };

  return tasks
    .filter(t => {
      if (q   && !t.title.toLowerCase().includes(q)) return false;
      if (cat && t.category !== cat) return false;
      if (sta && t.status   !== sta) return false;
      return true;
    })
    .sort((a, b) => {
      if (a.status === 'done' && b.status !== 'done') return 1;
      if (b.status === 'done' && a.status !== 'done') return -1;

      if (sortBy === 'priority') {
        const pd = (priOrder[a.priority] ?? 1) - (priOrder[b.priority] ?? 1);
        if (pd !== 0) return pd;
        if (a.dueAt && b.dueAt) return new Date(a.dueAt) - new Date(b.dueAt);
        return 0;
      }
      if (sortBy === 'created') {
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      }
      const ao = isOverdue(a), bo = isOverdue(b);
      if (ao && !bo) return -1;
      if (!ao && bo) return 1;
      const nda = isNoDue(a), ndb = isNoDue(b);
      if (nda && !ndb) return 1;
      if (!nda && ndb) return -1;
      if (a.dueAt && b.dueAt) return a.dueAt.localeCompare(b.dueAt);
      return (priOrder[a.priority] ?? 1) - (priOrder[b.priority] ?? 1);
    });
}

function renderList() {
  const list = filteredTasks();
  if (!list.length) {
    setList('<div class="empty-state"><div class="empty-icon">✅</div><p>沒有符合條件的任務</p></div>');
    return;
  }
  const cls      = viewMode === 'grid' ? 'task-list grid-view' : 'task-list';
  const activeDue = list.filter(t => t.status !== 'done' && !isNoDue(t) && t.dueAt);
  const noDueAct  = list.filter(t => t.status !== 'done' && (isNoDue(t) || !t.dueAt));
  const doneAll   = list.filter(t => t.status === 'done');

  let html = '';
  if (activeDue.length) {
    html += `<div class="${cls}">` + activeDue.map(taskCard).join('') + '</div>';
  }
  if (noDueAct.length) {
    html += `<div class="sec-label" style="margin-top:28px">隨時待辦（無截止日期）<span style="font-size:11px;font-weight:400;letter-spacing:0;margin-left:8px">${noDueAct.length} 項</span></div>`;
    html += `<div class="${cls}">` + noDueAct.map(taskCard).join('') + '</div>';
  }
  if (doneAll.length) {
    html += `<div class="sec-label" style="margin-top:28px">已完成<span style="font-size:11px;font-weight:400;letter-spacing:0;margin-left:8px">${doneAll.length} 項</span></div>`;
    html += `<div class="${cls}">` + doneAll.map(taskCard).join('') + '</div>';
  }
  if (!html) {
    html = '<div class="empty-state"><div class="empty-icon">✅</div><p>沒有符合條件的任務</p></div>';
  }
  setList(html);
}

function setList(html) { document.getElementById('task-list').innerHTML = html; }

function taskCard(t) {
  const over = isOverdue(t);
  const noDue = isNoDue(t);
  const done  = t.status === 'done';

  const cardCls = done ? 'is-done'
    : over             ? 'is-overdue'
    : t.status === 'doing'   ? 'is-doing'
    : t.status === 'waiting' ? 'is-waiting' : '';

  const dueHtml = noDue
    ? `<span class="due-ok">無截止日期</span>`
    : t.dueAt
      ? `<span class="${over ? 'due-over' : 'due-ok'}">${over ? '⚠ 逾期 · ' : ''}${t.dueAt.slice(0,10)}</span>`
      : '';

  const doneBtn = done ? ''
    : t.repeatRule
      ? `<button type="button" class="ta-btn btn-done" onclick="completeTask('${t.id}')">✓ 完成 🔄</button>`
      : `<button type="button" class="ta-btn btn-done" onclick="completeTask('${t.id}')">✓ 完成</button>`;

  return `
  <div class="task-card ${cardCls}">
    <div class="task-body">
      <div class="task-title${done ? ' is-done' : ''}">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="badge b-cat">${esc(t.category || '其他')}</span>
        <span class="badge ${PRI_BADGE[t.priority] || 'b-pmid'}">${esc(t.priority || '中')}</span>
        <span class="badge ${STA_BADGE[t.status]   || 'b-todo'}">${STATUS_LABEL[t.status] || t.status}</span>
        ${t.repeatRule ? `<span class="badge" style="background:#f3e8ff;color:#7c3aed;border:1px solid #ddd6fe">🔄 ${RECUR_LABEL[t.repeatRule] || t.repeatRule}</span>` : ''}
        ${t.owner ? `<span style="font-size:12px;color:var(--sub)">👤 ${esc(t.owner)}</span>` : ''}
        ${dueHtml}
      </div>
      ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
    </div>
    <div class="task-actions">
      ${doneBtn}
      <button type="button" class="ta-btn" onclick="openPanel('${t.id}')">編輯</button>
      <button type="button" class="ta-btn btn-del" onclick="deleteTask('${t.id}')">刪除</button>
    </div>
  </div>`;
}

// ══ Panel ═════════════════════════════════════════════════════════════════════
function openPanel(id) {
  editingId = id || null;
  V('panel-title').textContent = id ? '編輯任務' : '新增任務';

  if (id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    V('f-title').value    = t.title       || '';
    V('f-category').value = t.category    || '';
    V('f-priority').value = t.priority    || '中';
    V('f-status').value   = t.status      || 'todo';
    V('f-due').value      = t.dueAt       ? t.dueAt.slice(0,10) : '';
    V('f-no-due').checked = isNoDue(t);
    V('f-recur').value    = t.repeatRule  || '';
    V('f-owner').value    = t.owner       || '';
    V('f-desc').value     = t.description || '';
  } else {
    V('f-title').value    = '';
    V('f-category').value = '';
    V('f-priority').value = '中';
    V('f-status').value   = 'todo';
    V('f-due').value      = '';
    V('f-no-due').checked = false;
    V('f-recur').value    = '';
    V('f-owner').value    = '';
    V('f-desc').value     = '';
  }
  toggleNoDue();
  V('overlay').classList.add('open');
  V('side-panel').classList.add('open');
  setTimeout(() => V('f-title').focus(), 50);
}

function closePanel() {
  V('overlay').classList.remove('open');
  V('side-panel').classList.remove('open');
}

function toggleNoDue() {
  const checked = V('f-no-due').checked;
  V('f-due').disabled = checked;
  if (checked) V('f-due').value = '';
}

// ══ CRUD 呼叫（UI 層） ════════════════════════════════════════════════════════
async function saveTask() {
  if (saving) return;
  const title    = V('f-title').value.trim();
  const category = V('f-category').value;
  if (!title)    { V('f-title').focus();    alert('請輸入任務標題'); return; }
  if (!category) { V('f-category').focus(); alert('請選擇類別');     return; }

  const noDue = V('f-no-due').checked;
  const now   = new Date().toISOString();
  const task  = {
    id:          editingId || genId(),
    title,
    category,
    priority:    V('f-priority').value,
    status:      V('f-status').value,
    dueAt:       noDue ? '' : (V('f-due').value || ''),
    noDueDate:   noDue,
    repeatRule:  V('f-recur').value,
    owner:       V('f-owner').value.trim(),
    description: V('f-desc').value.trim(),
    updatedAt:   now,
    createdAt:   editingId
      ? (tasks.find(t => t.id === editingId)?.createdAt || now)
      : now
  };

  saving = true;
  const btn = V('btn-save');
  btn.textContent = '儲存中…'; btn.disabled = true;

  try {
    if (editingId) {
      await apiPost({ action: 'update', task });
      const idx = tasks.findIndex(t => t.id === editingId);
      if (idx >= 0) tasks[idx] = task; else tasks.push(task);
    } else {
      await apiPost({ action: 'add', task });
      tasks.unshift(task);
    }
    closePanel();
    renderAll();
  } catch(e) {
    alert('儲存失敗：' + e.message);
  } finally {
    saving = false;
    btn.textContent = '儲存'; btn.disabled = false;
  }
}

async function completeTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const recurVal = t.repeatRule;
  t.status = 'done'; t.updatedAt = new Date().toISOString();
  try {
    await apiPost({ action: 'update', task: t });
    if (recurVal) {
      const next = {
        ...t,
        id:        genId(),
        status:    'todo',
        dueAt:     calcNextDue(t.dueAt, recurVal),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
      await apiPost({ action: 'add', task: next });
      tasks.unshift(next);
    }
    renderAll();
  } catch(e) { alert('更新失敗：' + e.message); }
}

function calcNextDue(dueAt, recur) {
  const base = dueAt ? new Date(dueAt) : new Date();
  if (isNaN(base.getTime())) return localYMD(new Date());
  const DAYS = { daily: 1, weekly: 7, biweekly: 14 };
  if (DAYS[recur] != null) base.setDate(base.getDate() + DAYS[recur]);
  else if (recur === 'monthly')   base.setMonth(base.getMonth() + 1);
  else if (recur === 'quarterly') base.setMonth(base.getMonth() + 3);
  else if (recur === 'biannual')  base.setMonth(base.getMonth() + 6);
  else if (recur === 'yearly')    base.setFullYear(base.getFullYear() + 1);
  return localYMD(base);
}

function localYMD(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

async function deleteTask(id) {
  if (!confirm('確定要刪除此任務？此操作無法還原。')) return;
  try {
    await apiPost({ action: 'delete', id });
    tasks = tasks.filter(t => t.id !== id);
    renderAll();
  } catch(e) { alert('刪除失敗：' + e.message); }
}

// ══ Notifications ═════════════════════════════════════════════════════════════
function isDueSoon(t) {
  if (t.status === 'done' || isNoDue(t) || !t.dueAt) return false;
  const days = (new Date(t.dueAt) - new Date(new Date().toDateString())) / 86400000;
  return days >= 0 && days <= 3;
}

function updateNotifBadge() {
  const n = tasks.filter(t => isOverdue(t) || isDueSoon(t)).length;
  const el = V('notif-badge');
  el.textContent = n > 9 ? '9+' : n;
  el.classList.toggle('show', n > 0);
}

function toggleNotif(e) {
  e.stopPropagation();
  const dd = V('notif-drop');
  if (!dd.classList.contains('open')) renderNotifList();
  dd.classList.toggle('open');
}

function renderNotifList() {
  const urgent = tasks
    .filter(t => isOverdue(t) || isDueSoon(t))
    .sort((a, b) => {
      if (isOverdue(a) && !isOverdue(b)) return -1;
      if (!isOverdue(a) && isOverdue(b)) return 1;
      return new Date(a.dueAt || 0) - new Date(b.dueAt || 0);
    });
  const el = V('notif-items');
  if (!urgent.length) {
    el.innerHTML = '<div class="notif-empty">🎉 沒有逾期或即將到期的任務</div>';
    return;
  }
  el.innerHTML = urgent.map(t => `
    <div class="notif-row" onclick="V('notif-drop').classList.remove('open');openPanel('${t.id}')">
      <div class="notif-row-title">${esc(t.title) || '（無標題）'}</div>
      <div class="notif-row-sub">${isOverdue(t) ? '⚠ 已逾期' : '⏰ 3天內到期'} &nbsp;${formatDueDate(t.dueAt)} &nbsp;${esc(t.category || '')}</div>
    </div>`).join('');
}

document.addEventListener('click', () => {
  V('notif-drop')?.classList.remove('open');
});

// ══ Utils ═════════════════════════════════════════════════════════════════════
function isOverdue(t) {
  if (t.status === 'done' || isNoDue(t) || !t.dueAt) return false;
  return new Date(t.dueAt) < new Date(new Date().toDateString());
}
function isNoDue(t) {
  return t.noDueDate === true || t.noDueDate === 'TRUE' || t.noDueDate === 'true';
}
function formatDueDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return String(d).slice(0,10);
  return dt.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'});
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function V(id) { return document.getElementById(id); }
</script>
