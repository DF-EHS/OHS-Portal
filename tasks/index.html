<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>職安工作中樞自主管理版</title>
  <style>
    :root {
      --bg: #f5f7f2;
      --body-start: #fbfcf8;
      --body-halo-cyan: rgba(76, 135, 149, .13);
      --body-halo-green: rgba(63, 127, 95, .13);
      --surface: #ffffff;
      --surface-rgb: 255, 255, 255;
      --surface-2: #eef4ed;
      --ink: #23302b;
      --muted: #65736b;
      --line: #d8e1d6;
      --accent: #3f7f5f;
      --accent-soft: #dcefe4;
      --cyan: #4c8795;
      --cyan-soft: #dceef2;
      --amber: #a66a22;
      --amber-soft: #f6ead8;
      --red: #b0443c;
      --red-soft: #f5dfdc;
      --shadow: 0 16px 36px rgba(56, 74, 63, 0.12);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    html[data-theme="dark"] {
      --bg: #17201d;
      --body-start: #1f2a26;
      --body-halo-cyan: rgba(99, 170, 184, .12);
      --body-halo-green: rgba(111, 178, 139, .12);
      --surface: #26332e;
      --surface-rgb: 38, 51, 46;
      --surface-2: #202a26;
      --ink: #edf5ef;
      --muted: #aab8b0;
      --line: #3b4a43;
      --accent: #79b995;
      --accent-soft: #203c2d;
      --cyan: #82bfd0;
      --cyan-soft: #203943;
      --amber: #e5b268;
      --amber-soft: #493923;
      --red: #e28b84;
      --red-soft: #4c2b2d;
      --shadow: 0 18px 40px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 86% 10%, var(--body-halo-cyan), transparent 18rem),
        radial-gradient(circle at 9% 92%, var(--body-halo-green), transparent 22rem),
        linear-gradient(180deg, var(--body-start), var(--bg));
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      border-right: 1px solid var(--line);
      background: rgba(var(--surface-rgb), .88);
      backdrop-filter: blur(12px);
      overflow-y: auto;
    }

    .portal-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 16px;
      transition: background .15s, color .15s;
    }
    .portal-back:hover { background: var(--surface-2); color: var(--ink); }

    .brand {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      box-shadow: 0 12px 22px rgba(63, 127, 95, .22);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .nav button,
    .action,
    .icon-button,
    .segmented button {
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      transition: .16s ease;
    }

    .nav button {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 42px;
      padding: 9px 10px;
      text-align: left;
      font-weight: 800;
    }

    .nav button:hover,
    .nav button.active {
      border-color: var(--line);
      background: var(--surface-2);
    }

    .nav small {
      color: var(--muted);
      font-size: 12px;
    }

    .side-block {
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .side-block h2 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
    }

    .mini-stats {
      display: grid;
      gap: 0;
    }

    .mini-stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 2px;
      border-bottom: 1px dashed var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    .mini-stat:last-child { border-bottom: none; }

    .mini-stat strong {
      color: var(--accent);
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .notification-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .notification-card .action {
      width: 100%;
      min-height: 36px;
    }

    .notification-status {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      padding: 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .grid {
      display: grid;
      gap: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    input,
    select {
      min-height: 42px;
      padding: 0 11px;
    }

    input:disabled,
    select:disabled,
    textarea:disabled {
      color: var(--muted);
      background: var(--surface-2);
    }

    textarea {
      min-height: 96px;
      padding: 11px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(63, 127, 95, .12);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(var(--surface-rgb), .88);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
    }

    .panel-head h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .panel-body { padding: 16px; }

    .form-actions,
    .toolbar,
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .form-actions { justify-content: flex-end; }

    .action {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 12px;
      border-color: var(--line);
      background: var(--surface);
      font-weight: 800;
      text-decoration: none;
    }

    .action.primary {
      border-color: var(--accent);
      color: white;
      background: var(--accent);
    }

    .action.danger {
      border-color: rgba(176, 68, 60, .32);
      color: var(--red);
      background: var(--red-soft);
    }

    .action:hover {
      box-shadow: 0 8px 18px rgba(56, 74, 63, .12);
      transform: translateY(-1px);
    }

    .segmented {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .segmented button {
      min-height: 32px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .segmented button.active,
    .segmented button:hover {
      color: var(--ink);
      background: var(--accent-soft);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 180px 150px 160px;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task-list.grid-mode {
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      align-items: stretch;
    }

    .task-list.grid-mode .task-card {
      grid-template-columns: 1fr;
      align-content: start;
      min-height: 260px;
    }

    .task-list.grid-mode .row-actions {
      align-self: end;
      padding-top: 4px;
    }

    .task-list.grid-mode .task-card > div:first-child {
      min-width: 0;
      overflow: hidden;
    }

    .task-list.grid-mode .pill {
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .task-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 8px 18px rgba(56, 74, 63, .07);
    }

    .task-card.overdue { border-left-color: var(--red); }
    .task-card.soon { border-left-color: var(--amber); }
    .task-card.done { border-left-color: var(--accent); opacity: .78; }
    .task-card.generated {
      border-color: rgba(63, 127, 95, .55);
      background: var(--accent-soft);
      box-shadow: 0 12px 26px rgba(63, 127, 95, .16);
    }

    .task-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 7px;
    }

    .task-title strong {
      font-size: 16px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.status-todo { background: var(--surface-2); }
    .pill.status-doing { color: var(--cyan); background: var(--cyan-soft); border-color: transparent; }
    .pill.status-waiting { color: var(--amber); background: var(--amber-soft); border-color: transparent; }
    .pill.status-done { color: var(--accent); background: var(--accent-soft); border-color: transparent; }
    .pill.status-overdue { color: var(--red); background: var(--red-soft); border-color: transparent; }
    .pill.priority-high { color: var(--red); background: var(--red-soft); border-color: transparent; }
    .pill.priority-medium { color: var(--amber); background: var(--amber-soft); border-color: transparent; }
    .pill.priority-low { color: var(--accent); background: var(--accent-soft); border-color: transparent; }

    .task-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .check-row {
      display: flex;
      gap: 8px;
      align-items: center;
      min-height: 42px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .check-row input {
      width: 16px;
      min-height: auto;
      margin: 0;
      accent-color: var(--accent);
    }

    .list-section {
      display: grid;
      gap: 10px;
    }

    .list-section + .list-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .list-section-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .empty {
      padding: 30px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(var(--surface-rgb), .68);
      text-align: center;
      line-height: 1.6;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .hidden { display: none !important; }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 82px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid rgba(63, 127, 95, .35);
      border-radius: 8px;
      color: var(--ink);
      background: var(--surface);
      box-shadow: var(--shadow);
      line-height: 1.55;
      font-size: 13px;
      font-weight: 800;
    }

    .toast strong {
      color: var(--accent);
    }

    .utility-dock {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 21;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(var(--surface-rgb), .92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .utility-button {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--surface);
      font-size: 12px;
      font-weight: 900;
      transition: .16s ease;
    }

    .utility-button:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .utility-button .icon {
      width: 16px;
      height: 16px;
    }

    .repeat-detail {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .repeat-detail .repeat-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .repeat-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .form-grid,
      .filter-grid,
      .repeat-detail-grid {
        grid-template-columns: 1fr;
      }
      .task-card { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .main { padding: 16px; }
      .sidebar { padding: 18px 16px; }
      .nav { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr; }
    }

    /* ── 通知鈴鐺（嵌入 nav）──────────────────────────── */
    @keyframes bell-shake {
      0%,100% { transform: rotate(0); }
      15%      { transform: rotate(14deg); }
      35%      { transform: rotate(-11deg); }
      55%      { transform: rotate(8deg); }
      75%      { transform: rotate(-5deg); }
    }
    #notifTrigger.urgent .icon { animation: bell-shake .7s ease .4s both; }

    #notifTrigger small.notif-badge {
      color: var(--muted);
      font-size: 11px;
    }
    #notifTrigger small.notif-badge.has-urgent {
      background: var(--red);
      color: #fff;
      padding: 1px 6px;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 800;
    }
    #notifTrigger small.notif-badge.hidden { display: none; }

    /* ── 通知面板 ──────────────────────────────────────── */
    .notif-overlay {
      position: fixed;
      inset: 0;
      z-index: 910;
      background: rgba(0,0,0,.22);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }
    .notif-overlay.open { opacity: 1; pointer-events: auto; }

    .notif-panel {
      position: fixed;
      top: 0; right: 0;
      width: 320px;
      max-width: 100vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--line);
      box-shadow: -6px 0 30px rgba(0,0,0,.16);
      z-index: 920;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .22s ease;
    }
    .notif-panel.open { transform: translateX(0); }

    .notif-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .notif-head h3 { flex: 1; font-size: 15px; margin: 0; color: var(--ink); }
    .notif-close {
      width: 30px; height: 30px;
      border-radius: 6px; border: none;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .notif-close:hover { background: var(--surface-2); color: var(--ink); }

    .notif-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .notif-group-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 12px 4px 4px;
      text-transform: uppercase;
    }
    .notif-group-label:first-child { padding-top: 4px; }

    .notif-item {
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface-2);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s;
    }
    .notif-item:hover { background: var(--accent-soft); }
    .notif-item.ni-overdue { border-left-color: var(--red); }
    .notif-item.ni-today   { border-left-color: var(--amber); }
    .notif-item.ni-soon    { border-left-color: var(--cyan); }

    .notif-item-title { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; }
    .notif-item-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .notif-empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      font-size: 13px;
      line-height: 2;
    }

    /* ── 登入頁 ──────────────────────────────────────────── */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: linear-gradient(145deg, #111a16 0%, #1a2820 60%, #0f1a14 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 320px;
      background: var(--surface);
      border-radius: 18px;
      padding: 40px 32px 36px;
      text-align: center;
      box-shadow: 0 28px 64px rgba(0,0,0,.45);
      border: 1px solid rgba(121,185,149,.18);
    }
    .login-icon {
      font-size: 36px;
      margin-bottom: 14px;
      line-height: 1;
    }
    .login-box h2 {
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
      margin: 0 0 6px;
    }
    .login-box p {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 24px;
    }
    .login-pwd-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .login-pwd-wrap input {
      width: 100%;
      padding: 11px 40px 11px 14px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--surface-2);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .login-pwd-wrap input:focus { border-color: var(--accent); }
    .login-show-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px;
      font-size: 16px;
      line-height: 1;
    }
    .login-err {
      font-size: 12px;
      color: var(--red);
      margin: 0 0 10px;
      min-height: 18px;
    }

    function seed(title, category, dueAt, repeatRule, status, priority, owner, description) {
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : `task-${Date.now()}-${Math.random()}`,
        title, category, dueAt, repeatRule, status, priority, owner, description,
        ...repeatConfigFromDueAt(dueAt, repeatRule),

        reminderTime: dueAt && dueAt.includes("T") ? dueAt.slice(11, 16) : "",
        tags: [],
        documents: [],
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
    }

    function repeatConfigFromDueAt(dueAt, repeatRule) {
      const date = parseDate(dueAt);
      if (!date) return {};
      const weekday = date.getDay() === 0 ? "7" : String(date.getDay());
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const quarterMonth = ((month - 1) % 3) + 1;
      const halfYearMonth = ((month - 1) % 6) + 1;
      if (repeatRule === "weekly") return { repeatWeekday: weekday };
      if (repeatRule === "monthly") return { repeatMonthDay: day };
      if (repeatRule === "quarterly") return { repeatQuarterMonth: quarterMonth, repeatQuarterDay: day };
      if (repeatRule === "semiannual") return { repeatHalfYearMonth: halfYearMonth, repeatHalfYearDay: day };
      if (repeatRule === "yearly") return { repeatYearMonth: month, repeatYearDay: day };
      return {};
    }

        }
        return [...DEFAULT_CATEGORIES];
      } catch {
        return [...DEFAULT_CATEGORIES];
      }
    }

    }

    function applyTheme(theme) {

      document.documentElement.dataset.theme = nextTheme;

    function parseDate(value) {
      if (!value) return null;
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function daysUntil(value) {
      const date = parseDate(value);
      if (!date) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      date.setHours(0, 0, 0, 0);
      return Math.ceil((date - today) / 86400000);
    }

    function dueText(task) {
      if (isNoDueTask(task)) return "不定期／持續工作";
      const date = parseDate(task.dueAt);
      const diff = daysUntil(task.dueAt);
      const text = date ? `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}` : task.dueAt;
      if (diff === null) return text;
      if (diff < 0 && task.status !== "done") return `${text}｜已過 ${Math.abs(diff)} 天`;
      if (diff === 0) return `${text}｜今天`;
      return `${text}｜還有 ${diff} 天`;
    }

    function dateTimeText(date) {
      if (!date) return "";
      return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function isOverdue(task) {
      const diff = daysUntil(task.dueAt);
      return diff !== null && diff < 0 && task.status !== "done";
    }

    function isSoon(task) {
      const diff = daysUntil(task.dueAt);
      const reminder = Number(task.reminderDays ?? 7);
      return diff !== null && diff >= 0 && diff <= reminder && task.status !== "done";
    }

    function reminderText(task) {
      const parts = [];
      if (task.reminderTime) parts.push(`固定提醒 ${task.reminderTime}`);
      if (task.reminderDays !== undefined && task.reminderDays !== "" && Number(task.reminderDays) > 0) {
        parts.push(`提前 ${Number(task.reminderDays)} 天`);
      }
      return parts.length ? parts.join(" / ") : "未設定提醒";
    }

    function reminderDueAt(task) {
      const due = parseDate(task.dueAt);
      if (!due || task.status === "done" || isNoDueTask(task)) return null;
      const reminderDays = Math.max(0, Number(task.reminderDays ?? 7) || 0);
      const trigger = new Date(due);
      trigger.setDate(trigger.getDate() - reminderDays);
      const time = task.reminderTime || (task.dueAt && task.dueAt.includes("T") ? task.dueAt.slice(11, 16) : "");
      if (time) {
        const [hour, minute] = time.split(":").map(Number);
        trigger.setHours(Number.isFinite(hour) ? hour : due.getHours(), Number.isFinite(minute) ? minute : due.getMinutes(), 0, 0);
      } else {
        trigger.setHours(due.getHours(), due.getMinutes(), 0, 0);
      }
      return trigger;
    }

    function reminderKey(task) {
      const trigger = reminderDueAt(task);
      if (!trigger) return "";
      return [task.id, task.dueAt || "", task.reminderDays ?? "", task.reminderTime || "", trigger.toISOString()].join("|");
    }

    function reminderEntries() {
      return tasks
        .map((task) => ({ task, triggerAt: reminderDueAt(task), key: reminderKey(task) }))
        .filter((entry) => entry.triggerAt && entry.key)
        .sort((a, b) => a.triggerAt - b.triggerAt);
    }

    function nextReminderEntry() {
      const now = new Date();
      return reminderEntries().find((entry) => !notifiedReminders.includes(entry.key) && entry.triggerAt >= now)
        || reminderEntries().find((entry) => !notifiedReminders.includes(entry.key));
    }

    function isNoDueTask(task) {
      return Boolean(task.noDueDate) || !task.dueAt;
    }

    function repeatScheduleText(task) {
      const rule = task.repeatRule || "none";
      const inferred = repeatConfigFromDueAt(task.dueAt, rule);
      if (rule === "none") return "否";
      if (rule === "daily") return "每日";
      if (rule === "weekly") {
        const weekday = task.repeatWeekday || inferred.repeatWeekday;
        return weekday ? `每週${WEEKDAY_LABELS[weekday]}` : "每週（未指定星期）";
      }
      if (rule === "monthly") {
        const day = task.repeatMonthDay || inferred.repeatMonthDay;
        return day ? `每月 ${day} 日` : "每月（未指定日期）";
      }
      if (rule === "quarterly") {
        const quarterMonth = task.repeatQuarterMonth || inferred.repeatQuarterMonth;
        const quarterDay = task.repeatQuarterDay || inferred.repeatQuarterDay;
        const month = quarterMonth ? `第 ${quarterMonth} 個月` : "未指定月份";
        const day = quarterDay ? `${quarterDay} 日` : "未指定日期";
        return `每季${month} ${day}`;
      }
      if (rule === "semiannual") {
        const halfYearMonth = task.repeatHalfYearMonth || inferred.repeatHalfYearMonth;
        const halfYearDay = task.repeatHalfYearDay || inferred.repeatHalfYearDay;
        const month = halfYearMonth ? `第 ${halfYearMonth} 個月` : "未指定月份";
        const day = halfYearDay ? `${halfYearDay} 日` : "未指定日期";
        return `每半年${month} ${day}`;
      }
      if (rule === "yearly") {
        const yearMonth = task.repeatYearMonth || inferred.repeatYearMonth;
        const yearDay = task.repeatYearDay || inferred.repeatYearDay;
        const month = yearMonth ? `${yearMonth} 月` : "未指定月份";
        const day = yearDay ? `${yearDay} 日` : "未指定日期";
        return `每年 ${month} ${day}`;
      }
      if (rule === "custom") return task.repeatCustomText || "自訂";
      return REPEAT_LABELS[rule] || rule;
    }

      if (editingId) {

      } else {
        tasks.unshift({
          id: crypto.randomUUID ? crypto.randomUUID() : `task-${Date.now()}`,
          ...data,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      }
      saveTasks();
      resetForm();
      setView("list");

      toastTimer = setTimeout(() => toast.classList.add("hidden"), 5200);

    function setQuickFilter(value) {
      quickFilter = value;
      document.querySelectorAll("[data-status-filter]").forEach((item) => {
        item.classList.toggle("active", item.dataset.statusFilter === value);
      });
    }

    function revealGeneratedTask(task) {
      setView("list");
      setQuickFilter("open");
      byId("searchInput").value = "";
      byId("categoryFilter").value = "all";
      byId("statusFilter").value = "all";
      byId("sortBy").value = "createdDesc";
      renderAll();
      requestAnimationFrame(() => {
        document.querySelector(`[data-task-id="${task.id}"]`)?.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    }

    function revealTask(task) {
      highlightedTaskId = task.id;
      setView("list");
      setQuickFilter("open");
      byId("searchInput").value = "";
      byId("categoryFilter").value = "all";
      byId("statusFilter").value = "all";
      byId("sortBy").value = "dueAsc";
      renderAll();
      requestAnimationFrame(() => {
        document.querySelector(`[data-task-id="${task.id}"]`)?.scrollIntoView({ behavior: "smooth", block: "center" });
      });
    }

    function notificationSupported() {
      return "Notification" in window;
    }

    function notificationEnabled() {
      return notificationSupported() && Notification.permission === "granted";
    }

    function setNotificationEnabled(value) {
      localStorage.setItem(NOTIFICATION_ENABLED_KEY, value ? "true" : "false");
    }

    function updateNotificationStatus() {
      const button = byId("enableNotificationBtn");
      const testButton = byId("testNotificationBtn");
      const resetButton = byId("resetReminderLogBtn");
      const status = byId("notificationStatus");
      if (!button || !status) return;
      if (!notificationSupported()) {
        button.disabled = true;
        testButton?.classList.add("hidden");
        resetButton?.classList.add("hidden");
        status.textContent = "此瀏覽器不支援桌面通知。";
        return;
      }
      if (Notification.permission === "denied") {
        button.disabled = false;
        button.textContent = "通知已被封鎖";
        testButton?.classList.add("hidden");
        resetButton?.classList.remove("hidden");
        status.textContent = "系統通知已被瀏覽器封鎖。頁面開啟時仍會用右下角提示提醒。";
        return;
      }
      if (Notification.permission === "granted" && notificationEnabled()) {
        const next = nextReminderEntry();
        button.disabled = false;
        button.textContent = "通知已啟用";
        testButton?.classList.remove("hidden");
        resetButton?.classList.remove("hidden");
        status.textContent = next
          ? `頁面開啟時，每分鐘檢查一次提醒。下一次：${dateTimeText(next.triggerAt)}｜${next.task.title}`
          : "頁面開啟時，每分鐘檢查一次提醒。目前沒有可推算的下一個提醒。";
        return;
      }
      button.disabled = false;
      button.textContent = "啟用瀏覽器通知";
      testButton?.classList.add("hidden");
      resetButton?.classList.remove("hidden");
      status.textContent = Notification.permission === "granted"
        ? "瀏覽器已允許通知，頁面提醒已可使用。"
        : `系統通知尚未授權，目前權限：${Notification.permission}。頁面開啟時仍會用右下角提示提醒。`;
    }

    async function enableBrowserNotifications() {
      if (!notificationSupported()) {
        showToast("此瀏覽器不支援桌面通知。");
        updateNotificationStatus();
        return;
      }
      let permission = Notification.permission;
      try {
        if (permission === "default") permission = await Notification.requestPermission();
        permission = Notification.permission;
      } catch {
        showToast("瀏覽器通知權限請求失敗，請確認目前瀏覽器是否允許此頁使用通知。");
        updateNotificationStatus();
        return;
      }
      if (permission === "granted") {
        setNotificationEnabled(true);
        updateNotificationStatus();
        startReminderChecker();
        checkTaskReminders();
        showToast("瀏覽器通知已啟用。頁面開啟時會檢查提醒。");
      } else {
        setNotificationEnabled(false);
        updateNotificationStatus();
        startReminderChecker();
        showToast(`尚未取得系統通知權限（目前：${permission}）。頁面開啟時仍會用右下角提示提醒。`);
      }
    }

    function testBrowserNotification() {
      if (!notificationSupported() || Notification.permission !== "granted") {
        showToast(`目前通知權限是「${notificationSupported() ? Notification.permission : "unsupported"}」，請先啟用瀏覽器通知。`);
        updateNotificationStatus();
        return;
      }
      try {
        const notification = new Notification("職安工作中樞測試通知", {
          body: "如果你看到這則通知，代表頁面開啟時的提醒功能已可運作。",
          tag: "osh-notification-test"
        });
        notification.onclick = () => {
          window.focus();
          notification.close();
        };
        showToast("已送出測試通知。");
      } catch {
        showToast("測試通知送出失敗，請確認瀏覽器通知權限。");
      }
    }

    async function manualCheckReminders() {
      if (!notificationSupported()) {
        showToast("此瀏覽器不支援桌面通知。");
        updateNotificationStatus();
        return;
      }
      if (Notification.permission !== "granted") {
        await enableBrowserNotifications();
      }
      checkTaskReminders({ force: true, showIdle: true });
    }

    function resetReminderLog() {
      notifiedReminders = [];
      saveNotifiedReminders();
      updateNotificationStatus();
      showToast("提醒紀錄已重設，可重新測試同一筆工作的通知。");
    }

    function pruneNotifiedReminders() {
      const activeKeys = new Set(tasks.map(reminderKey).filter(Boolean));
      const next = notifiedReminders.filter((key) => activeKeys.has(key));
      if (next.length !== notifiedReminders.length) {
        notifiedReminders = next;
        saveNotifiedReminders();
      }
    }

    function sendTaskNotification(task, triggerAt) {
      const notification = new Notification(`職安工作提醒：${task.title}`, {
        body: `${dueText(task)}\n${task.category || "未分類"}｜${reminderText(task)}`,
        tag: `osh-task-${task.id}-${task.dueAt || triggerAt.toISOString()}`,
        requireInteraction: false
      });
      notification.onclick = () => {
        window.focus();
        revealTask(task);
        notification.close();
      };
    }

    function describeNextReminder() {
      const next = nextReminderEntry();
      return next
        ? `下一個提醒：${dateTimeText(next.triggerAt)}｜${escapeHtml(next.task.title)}`
        : "目前沒有可推算的下一個提醒。";
    }

    function checkTaskReminders(options = {}) {
      const force = Boolean(options.force);
      const showIdle = Boolean(options.showIdle);
      const systemNotificationReady = notificationSupported() && Notification.permission === "granted";
      const now = new Date();
      let changed = false;
      const triggered = [];
      pruneNotifiedReminders();
      reminderEntries().forEach(({ task, triggerAt, key }) => {
        if (!triggerAt || !key || triggerAt > now || notifiedReminders.includes(key)) return;
        if (systemNotificationReady) {
          try {
            sendTaskNotification(task, triggerAt);
          } catch {
            showToast("瀏覽器通知送出失敗，改用頁面內提示。");
          }
        }
        notifiedReminders.push(key);
        triggered.push(task);
        changed = true;
      });
      if (changed) saveNotifiedReminders();
      if (triggered.length) {
        const names = triggered.slice(0, 3).map((task) => escapeHtml(task.title)).join("、");
        const prefix = systemNotificationReady ? "提醒已觸發" : "頁面提醒已觸發";
        showToast(`${prefix}：<strong>${names}</strong>${triggered.length > 3 ? ` 等 ${triggered.length} 項` : ""}`);
      } else if (showIdle) {
        const permission = notificationSupported() ? Notification.permission : "unsupported";
        const suffix = systemNotificationReady ? "" : `<br>系統通知權限：${permission}，目前會使用頁面內提示。`;
        showToast(`${describeNextReminder()}${suffix}`);
      }
      updateNotificationStatus();
    }

    function startReminderChecker() {
      clearInterval(reminderTimer);
      updateNotificationStatus();
      checkTaskReminders();
      reminderTimer = setInterval(checkTaskReminders, 60000);
    }

    function formatDateTimeLocal(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}T${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function lastDayOfMonth(year, monthIndex) {
      return new Date(year, monthIndex + 1, 0).getDate();
    }

    function dateInMonthWithDay(source, year, monthIndex, day) {
      const result = new Date(source);
      const safeDay = Math.min(Math.max(Number(day) || source.getDate(), 1), lastDayOfMonth(year, monthIndex));
      result.setDate(1);
      result.setFullYear(year, monthIndex, safeDay);
      return result;
    }

    function nextPeriodDate(source, periodMonths, periodPosition, day) {
      const position = Math.min(Math.max(Number(periodPosition) || 1, 1), periodMonths);
      const startMonth = Math.floor(source.getMonth() / periodMonths) * periodMonths;
      let targetMonth = startMonth + position - 1;
      let targetYear = source.getFullYear();
      let candidate = dateInMonthWithDay(source, targetYear, targetMonth, day);
      if (candidate <= source) {
        targetMonth += periodMonths;
        targetYear += Math.floor(targetMonth / 12);
        targetMonth %= 12;
        candidate = dateInMonthWithDay(source, targetYear, targetMonth, day);
      }
      return candidate;
    }

    function nextRepeatDueAt(task) {
      const source = parseDate(task.dueAt);
      const rule = task.repeatRule || "none";
      const inferred = repeatConfigFromDueAt(task.dueAt, rule);
      if (!source || rule === "none" || rule === "custom") return "";
      if (rule === "daily") {
        const next = new Date(source);
        next.setDate(next.getDate() + 1);
        return formatDateTimeLocal(next);
      }
      if (rule === "weekly") {
        const targetWeekday = Number(task.repeatWeekday || inferred.repeatWeekday);
        if (!targetWeekday) return "";
        const currentWeekday = source.getDay() === 0 ? 7 : source.getDay();
        const diff = ((targetWeekday - currentWeekday + 7) % 7) || 7;
        const next = new Date(source);
        next.setDate(next.getDate() + diff);
        return formatDateTimeLocal(next);
      }
      if (rule === "monthly") {
        return formatDateTimeLocal(nextPeriodDate(source, 1, 1, task.repeatMonthDay || inferred.repeatMonthDay));
      }
      if (rule === "quarterly") {
        return formatDateTimeLocal(nextPeriodDate(source, 3, task.repeatQuarterMonth || inferred.repeatQuarterMonth, task.repeatQuarterDay || inferred.repeatQuarterDay));
      }
      if (rule === "semiannual") {
        return formatDateTimeLocal(nextPeriodDate(source, 6, task.repeatHalfYearMonth || inferred.repeatHalfYearMonth, task.repeatHalfYearDay || inferred.repeatHalfYearDay));
      }
      if (rule === "yearly") {
        const targetMonth = Number(task.repeatYearMonth || inferred.repeatYearMonth);
        if (!targetMonth) return "";
        let candidate = dateInMonthWithDay(source, source.getFullYear(), targetMonth - 1, task.repeatYearDay || inferred.repeatYearDay);
        if (candidate <= source) candidate = dateInMonthWithDay(source, source.getFullYear() + 1, targetMonth - 1, task.repeatYearDay || inferred.repeatYearDay);
        return formatDateTimeLocal(candidate);
      }
      return "";
    }

    function buildNextRepeatTask(task, now) {
      const nextDueAt = nextRepeatDueAt(task);
      if (!nextDueAt) return null;
      const duplicate = tasks.some((item) => {
        if (item.id === task.id) return false;
        return item.title === task.title
          && item.category === task.category
          && item.repeatRule === task.repeatRule
          && item.dueAt === nextDueAt;
      });
      if (duplicate) return null;
      return {
        ...task,
        id: newTaskId(),
        status: "todo",
        dueAt: nextDueAt,
        generatedFrom: task.id,
        previousTaskId: task.id,
        nextTaskId: "",
        completedAt: "",
        createdAt: now,
        updatedAt: now
      };
    }

    function completeTask(id) {
      const task = tasks.find((item) => item.id === id);
      if (!task || task.status === "done") return;
      const now = new Date().toISOString();
      const nextTask = buildNextRepeatTask(task, now);
      tasks = tasks.map((item) => item.id === id
        ? { ...item, status: "done", completedAt: now, nextTaskId: nextTask?.id || item.nextTaskId || "", updatedAt: now }
        : item);
      if (nextTask) tasks.unshift(nextTask);
      saveTasks();
      if (nextTask) {
        highlightedTaskId = nextTask.id;
        revealGeneratedTask(nextTask);
        showToast(`已完成 <strong>${escapeHtml(task.title)}</strong>，並建立下一期：<strong>${escapeHtml(dueText(nextTask))}</strong>`);
      } else {
        renderAll();
        const reason = task.repeatRule === "custom"
          ? "自訂重複規則不會自動產生下一期。"
          : task.repeatRule === "none"
            ? "此工作不是重複性工作。"
            : !task.dueAt
              ? "此工作未設定預計完成時間，無法推算下一期。"
              : "下一期可能已存在，未重複建立。";
        showToast(`已完成 <strong>${escapeHtml(task.title)}</strong>。${reason}`);
      }
    }

    function updateStatus(id, status) {
      tasks = tasks.map((task) => task.id === id ? { ...task, status, updatedAt: new Date().toISOString() } : task);
      saveTasks();
      renderAll();
    }

    function deleteTask(id) {
      const task = tasks.find((item) => item.id === id);
      if (!task || !confirm(`確定刪除「${task.title}」？`)) return;
      tasks = tasks.filter((item) => item.id !== id);
      saveTasks();
      renderAll();
    }

    function filteredTasks() {
      const keyword = byId("searchInput")?.value.trim().toLowerCase() || "";
      const category = byId("categoryFilter")?.value || "all";
      const status = byId("statusFilter")?.value || "all";
      const sortBy = byId("sortBy")?.value || "dueAsc";
      let list = tasks.filter((task) => {
        const text = [task.title, task.category, task.owner, task.description, ...(task.tags || [])].join(" ").toLowerCase();
        if (keyword && !text.includes(keyword)) return false;
        if (category !== "all" && task.category !== category) return false;
        if (status !== "all" && task.status !== status) return false;
        if (quickFilter === "open" && task.status === "done") return false;
        if (quickFilter === "soon" && !isSoon(task)) return false;
        if (quickFilter === "overdue" && !isOverdue(task)) return false;
        return true;
      });
      list.sort((a, b) => {
        if (sortBy === "createdDesc") return new Date(b.createdAt) - new Date(a.createdAt);
        if (sortBy === "priority") return priorityWeight(b.priority) - priorityWeight(a.priority);
        if (sortBy === "category") return a.category.localeCompare(b.category, "zh-Hant") || a.title.localeCompare(b.title, "zh-Hant");
        const ad = parseDate(a.dueAt)?.getTime() ?? Number.MAX_SAFE_INTEGER;
        const bd = parseDate(b.dueAt)?.getTime() ?? Number.MAX_SAFE_INTEGER;
        return ad - bd;
      });
      return list;
    }

    function priorityWeight(value) {
      return { high: 3, medium: 2, low: 1 }[value] || 0;
    }

    function taskStateClass(task) {
      if (task.status === "done") return "done";
      if (isOverdue(task)) return "overdue";
      if (isSoon(task)) return "soon";
      return "";
    }

    function taskCard(task) {
      const cardClass = `${taskStateClass(task)} ${task.id === highlightedTaskId ? "generated" : ""}`.trim();
      return `
        <article class="task-card ${cardClass}" data-task-id="${task.id}">
          <div>
            <div class="task-title">
              <strong>${escapeHtml(task.title)}</strong>
              <span class="pill status-${task.status}">${STATUS_LABELS[task.status] || task.status}</span>
              <span class="pill priority-${task.priority}">優先 ${PRIORITY_LABELS[task.priority] || task.priority}</span>
            </div>
            <div class="meta">
              <span class="pill">${escapeHtml(task.category)}</span>
              <span class="pill">${escapeHtml(dueText(task))}</span>
              <span class="pill">重複：${escapeHtml(repeatScheduleText(task))}</span>
              <span class="pill">${escapeHtml(reminderText(task))}</span>
              ${task.owner ? `<span class="pill">${escapeHtml(task.owner)}</span>` : ""}
            </div>
            ${task.description ? `<div class="task-note">${escapeHtml(task.description)}</div>` : ""}
            ${(task.tags || []).length ? `<div class="meta" style="margin-top:8px;">${task.tags.map((tag) => `<span class="pill">#${escapeHtml(tag)}</span>`).join("")}</div>` : ""}
          </div>
          <div class="row-actions">
            <button class="action" type="button" data-edit="${task.id}">${icon("edit")}編輯</button>
            ${task.status === "todo" ? `<button class="action" type="button" data-status-doing="${task.id}">${icon("play")}開始</button>` : ""}
            ${task.status !== "done" ? `<button class="action" type="button" data-done="${task.id}">${icon("check")}完成</button>` : `<button class="action" type="button" data-status-todo="${task.id}">重開</button>`}
            <button class="action danger" type="button" data-delete="${task.id}">${icon("trash")}刪除</button>
          </div>
        </article>
      `;
    }

    function renderList() {
      const list = filteredTasks();
      const taskList = byId("taskList");
      const sortBy = byId("sortBy")?.value || "dueAsc";
      if (!list.length) {
        taskList.classList.remove("grid-mode");
        taskList.innerHTML = `<div class="empty">目前沒有符合條件的工作。</div>`;
        return;
      }
      if (sortBy === "dueAsc") {
        const scheduled = list.filter((task) => !isNoDueTask(task));
        const noDue = list.filter(isNoDueTask);
        const sectionClass = `task-list ${listLayout === "grid" ? "grid-mode" : ""}`;
        taskList.classList.remove("grid-mode");
        taskList.innerHTML = [
          scheduled.length ? `
            <section class="list-section">
              <div class="list-section-title"><span>有期限工作</span><span>${scheduled.length} 項</span></div>
              <div class="${sectionClass}">${scheduled.map(taskCard).join("")}</div>
            </section>
          ` : "",
          noDue.length ? `
            <section class="list-section">
              <div class="list-section-title"><span>不定期／持續工作</span><span>${noDue.length} 項</span></div>
              <div class="${sectionClass}">${noDue.map(taskCard).join("")}</div>
            </section>
          ` : ""
        ].join("");
        return;
      }
      taskList.classList.toggle("grid-mode", listLayout === "grid");
      taskList.innerHTML = list.map(taskCard).join("");
    }

    function bindTaskActions() {
      document.querySelectorAll("[data-edit]").forEach((button) => button.addEventListener("click", () => editTask(button.dataset.edit)));
      document.querySelectorAll("[data-done]").forEach((button) => button.addEventListener("click", () => completeTask(button.dataset.done)));
      document.querySelectorAll("[data-status-doing]").forEach((button) => button.addEventListener("click", () => updateStatus(button.dataset.statusDoing, "doing")));
      document.querySelectorAll("[data-status-todo]").forEach((button) => button.addEventListener("click", () => updateStatus(button.dataset.statusTodo, "todo")));
      document.querySelectorAll("[data-delete]").forEach((button) => button.addEventListener("click", () => deleteTask(button.dataset.delete)));
    }

    function renderStats() {
      const open = tasks.filter((task) => task.status !== "done");
      const overdue = tasks.filter(isOverdue);
      byId("statTotal").textContent = tasks.length;
      byId("statOpen").textContent = open.length;
      byId("statOverdue").textContent = overdue.length;
      byId("listCount").textContent = tasks.length;
      byId("editingBadge").textContent = editingId ? "編輯" : "";
    }

    function renderAll() {
      renderCategories();
      renderStatusFilter();
      renderStats();
      renderList();
      bindTaskActions();
      checkTaskReminders();
    }

    function loadStarter() {
      if (tasks.length && !confirm("目前已有工作資料，是否以目前工作清單範例覆蓋？")) return;
      tasks = starterTasks.map((task) => ({ ...task, id: crypto.randomUUID ? crypto.randomUUID() : `task-${Date.now()}-${Math.random()}` }));
      saveTasks();
      renderAll();
      setView("list");
    }

    function exportTasks() {
      const payload = { exportedAt: new Date().toISOString(), tasks, categories };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "職安工作中樞_自主管理版備份.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function importTasks(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(reader.result);
          const imported = Array.isArray(payload) ? payload : payload.tasks;
          if (!Array.isArray(imported)) throw new Error("Invalid JSON");
          tasks = imported;
          if (Array.isArray(payload.categories)) categories = payload.categories;
          saveTasks();
          saveCategories();
          renderAll();
          setView("list");
        } catch {
          alert("匯入失敗，請確認 JSON 格式。");
        }
      };
      reader.readAsText(file, "utf-8");
    }

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });
    byId("taskForm").addEventListener("submit", saveTask);
    byId("resetFormBtn").addEventListener("click", resetForm);
    byId("cancelEditBtn").addEventListener("click", resetForm);
    byId("loadStarterBtn").addEventListener("click", loadStarter);
    byId("exportBtn").addEventListener("click", exportTasks);
    byId("importInput").addEventListener("change", (event) => importTasks(event.target.files[0]));
    byId("enableNotificationBtn").addEventListener("click", enableBrowserNotifications);
    byId("testNotificationBtn").addEventListener("click", testBrowserNotification);
    byId("checkReminderBtn").addEventListener("click", manualCheckReminders);
    byId("resetReminderLogBtn").addEventListener("click", resetReminderLog);
    byId("themeToggleBtn").addEventListener("click", toggleTheme);
    byId("scrollTopBtn").addEventListener("click", scrollToTop);
    byId("noDueDate").addEventListener("change", updateDueDateMode);
    byId("repeatRule").addEventListener("change", updateRepeatFields);
    ["searchInput", "categoryFilter", "statusFilter", "sortBy"].forEach((id) => byId(id).addEventListener("input", renderAll));
    document.querySelectorAll("[data-status-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        quickFilter = button.dataset.statusFilter;
        document.querySelectorAll("[data-status-filter]").forEach((item) => item.classList.toggle("active", item === button));
        renderAll();
      });
    });
    document.querySelectorAll("[data-layout]").forEach((button) => {
      button.addEventListener("click", () => {
        listLayout = button.dataset.layout;
        document.querySelectorAll("[data-layout]").forEach((item) => item.classList.toggle("active", item === button));
        renderAll();
      });
    });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) checkTaskReminders();
    });
    window.addEventListener("focus", checkTaskReminders);

    applyTheme(preferredTheme());
    renderCategories();
    renderStatusFilter();
    resetForm();
    renderAll();
    updateNotificationStatus();
    startReminderChecker();

    // ── 登入驗證 ──────────────────────────────────────────────────
    const AUTH_KEY  = 'osh-tasks-auth-v1';
    const AUTH_HASH = 'f695f6db85ce1d2a06c220ce4ba2739b567603fdb6c0c003787fc9633cf17c90';
    const AUTH_TTL  = 24 * 60 * 60 * 1000; // 24 小時

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function isAuthenticated() {
      try {
        const s = JSON.parse(localStorage.getItem(AUTH_KEY));
        return s && (Date.now() - s.ts < AUTH_TTL);
      } catch { return false; }
    }

    function setAuthenticated() {
      localStorage.setItem(AUTH_KEY, JSON.stringify({ ts: Date.now() }));
    }

    function togglePwdVisible() {
      const inp = document.getElementById('login-pwd');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    async function tryLogin(event) {
      event.preventDefault();
      const pwd  = document.getElementById('login-pwd').value;
      const hash = await sha256(pwd);
      const err  = document.getElementById('login-err');
      const box  = document.getElementById('login-box');
      if (hash === AUTH_HASH) {
        setAuthenticated();
        document.getElementById('login-overlay').style.display = 'none';
        loadFromCloud();
      } else {
        if (err) err.classList.remove('hidden');
        if (box) {
          box.classList.remove('shake');
          void box.offsetWidth; // reflow to restart animation
          box.classList.add('shake');
        }
        document.getElementById('login-pwd').value = '';
        document.getElementById('login-pwd').focus();
      }
    }

    // ── Google Sheets 後端整合 ─────────────────────────────────────
    const GS_API = 'https://script.google.com/macros/s/AKfycbzkDcRv1jwyvIXGJ0Y07oOULXv0hhNx78501Z1EjJUOBo766ZAq_Rh4DGzFVwCY3wFW/exec';

    function showLoader(v) {
      const el = document.getElementById('gs-loader');
      if (el) el.style.display = v ? 'flex' : 'none';
    }

    async function apiPost(payload) {
      const resp = await fetch(GS_API, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      return resp.json();
    }

    async function loadFromCloud() {
      showLoader(true);
      try {
        const resp = await fetch(GS_API + '?t=' + Date.now(), { redirect: 'follow' });
        const data = await resp.json();
        if (Array.isArray(data.tasks)) {
          if (data.tasks.length > 0) {
            tasks = data.tasks;
          } else {
            // 初次使用：以範例工作初始化並寫入雲端
            tasks = starterTasks.map(t => ({ ...t }));
            apiPost({ action: 'bulkWrite', tasks }).catch(() => {});
          }
        }
      } catch(err) {
        console.warn('無法從雲端載入工作清單，使用本機資料', err);
      }
      showLoader(false);
      setView('list');
      renderAll();
      updateNotifBadge();
      // 載入完成：若有逾期或今天到期的工作，顯示提示 toast
      const _ng = buildNotifItems();
      if (_ng.overdue.length > 0 || _ng.today.length > 0) {
        const parts = [];
        if (_ng.overdue.length) parts.push(`<strong>${_ng.overdue.length}</strong> 項已逾期`);
        if (_ng.today.length)   parts.push(`<strong>${_ng.today.length}</strong> 項今天到期`);
        showToast(`⚠️ ${parts.join('，')}，點選右上角 🔔 查看詳情。`);
      }
    }

    // 覆寫：每次變更後全量同步至雲端（fire-and-forget）
    function saveTasks() {
      updateNotifBadge();
      apiPost({ action: 'bulkWrite', tasks }).catch(e => console.warn('雲端同步失敗', e));
    }

    // ── 通知中心 ──────────────────────────────────────────────────
    function buildNotifItems() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const g = { overdue: [], today: [], soon: [] };
      tasks.forEach(task => {
        if (task.status === 'done' || !task.dueAt) return;
        const due = parseDate(task.dueAt);
        if (!due) return;
        const dueDay = new Date(due);
        dueDay.setHours(0, 0, 0, 0);
        const diff = Math.ceil((dueDay - today) / 86400000);
        const rd = Number(task.reminderDays ?? 7);
        if (diff < 0)            g.overdue.push({ task, diff });
        else if (diff === 0)     g.today.push({ task, diff });
        else if (diff <= rd)     g.soon.push({ task, diff });
      });
      g.overdue.sort((a, b) => a.diff - b.diff);
      g.soon.sort((a, b) => a.diff - b.diff);
      return g;
    }

    function updateNotifBadge() {
      const g = buildNotifItems();
      const urgent = g.overdue.length + g.today.length;
      const total  = urgent + g.soon.length;
      const badge   = document.getElementById('notifBadge');
      const trigger = document.getElementById('notifTrigger');
      if (badge) {
        badge.textContent = urgent > 0 ? urgent : total;
        badge.classList.toggle('hidden', total === 0);
        badge.classList.toggle('has-urgent', urgent > 0);
      }
      if (trigger) trigger.classList.toggle('urgent', urgent > 0);
    }

    function renderNotifScroll() {
      const el = document.getElementById('notifScroll');
      if (!el) return;
      const g = buildNotifItems();
      const total = g.overdue.length + g.today.length + g.soon.length;
      if (total === 0) {
        el.innerHTML = '<div class="notif-empty">🎉<br>目前沒有待處理通知<br><small>所有工作皆在掌控中</small></div>';
        return;
      }
      const itemHtml = (entry, cls) => {
        const sub = entry.diff < 0  ? `已逾期 ${Math.abs(entry.diff)} 天`
                  : entry.diff === 0 ? '今天到期'
                  : `還有 ${entry.diff} 天`;
        return `<div class="notif-item ${cls}" data-task-id="${entry.task.id}" onclick="notifGoto(this.dataset.taskId)">
          <div class="notif-item-title">${escapeHtml(entry.task.title)}</div>
          <div class="notif-item-sub">${sub}・${escapeHtml(entry.task.category)}</div>
        </div>`;
      };
      let html = '';
      if (g.overdue.length) {
        html += `<div class="notif-group-label">🔴 已逾期（${g.overdue.length}）</div>`;
        html += g.overdue.map(e => itemHtml(e, 'ni-overdue')).join('');
      }
      if (g.today.length) {
        html += `<div class="notif-group-label">🟠 今天到期（${g.today.length}）</div>`;
        html += g.today.map(e => itemHtml(e, 'ni-today')).join('');
      }
      if (g.soon.length) {
        html += `<div class="notif-group-label">🔵 即將到期（${g.soon.length}）</div>`;
        html += g.soon.map(e => itemHtml(e, 'ni-soon')).join('');
      }
      el.innerHTML = html;
    }

    function toggleNotifPanel() {
      const panel = document.getElementById('notifPanel');
      if (!panel) return;
      if (panel.classList.contains('open')) { closeNotifPanel(); return; }
      renderNotifScroll();
      panel.classList.add('open');
      document.getElementById('notifOverlay')?.classList.add('open');
    }

    function closeNotifPanel() {
      document.getElementById('notifPanel')?.classList.remove('open');
      document.getElementById('notifOverlay')?.classList.remove('open');
    }

    function notifGoto(id) {
      closeNotifPanel();
      highlightedTaskId = id;
      setView('list');
      setQuickFilter('open');
      byId('searchInput').value = '';
      byId('categoryFilter').value = 'all';
      byId('statusFilter').value = 'all';
      byId('sortBy').value = 'dueAsc';
      renderAll();
      requestAnimationFrame(() => {
        document.querySelector(`[data-task-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    // 覆寫 filteredTasks：補充「已完成」快篩邏輯
    function filteredTasks() {
      const keyword  = byId("searchInput")?.value.trim().toLowerCase() || "";
      const category = byId("categoryFilter")?.value || "all";
      const status   = byId("statusFilter")?.value   || "all";
      const sortBy   = byId("sortBy")?.value          || "dueAsc";
      let list = tasks.filter(task => {
        const text = [task.title, task.category, task.owner, task.description, ...(task.tags || [])].join(" ").toLowerCase();
        if (keyword && !text.includes(keyword)) return false;
        if (category !== "all" && task.category !== category) return false;
        if (status   !== "all" && task.status   !== status)   return false;
        if (quickFilter === "open"    && task.status === "done") return false;
        if (quickFilter === "soon"    && !isSoon(task))          return false;
        if (quickFilter === "overdue" && !isOverdue(task))       return false;
        if (quickFilter === "done"    && task.status !== "done") return false;
        return true;
      });
      list.sort((a, b) => {
        if (sortBy === "createdDesc") return new Date(b.createdAt) - new Date(a.createdAt);
        if (sortBy === "priority")    return priorityWeight(b.priority) - priorityWeight(a.priority);
        if (sortBy === "category")    return a.category.localeCompare(b.category, "zh-Hant") || a.title.localeCompare(b.title, "zh-Hant");
        const ad = parseDate(a.dueAt)?.getTime() ?? Number.MAX_SAFE_INTEGER;
        const bd = parseDate(b.dueAt)?.getTime() ?? Number.MAX_SAFE_INTEGER;
        return ad - bd;
      });
      return list;
    }

    // 頁面載入時：已驗證直接進入，否則顯示登入頁
    if (isAuthenticated()) {
      document.getElementById('login-overlay').style.display = 'none';
      loadFromCloud();
    }
    // else：login-overlay 保持顯示，等待使用者輸入密碼
  </script>
</body>
</html>
