    <filter id="softShadow" x="-16" y="-10" width="96" height="90" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="2.4" flood-color="#7c3f0a" flood-opacity=".28"/>
