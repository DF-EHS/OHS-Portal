<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">職安守護盾牌 Favicon</title>
  <desc id="desc">透明背景上的橘色安全盾牌與白色確認勾勾。</desc>
  <defs>
    <linearGradient id="shieldFill" x1="16" y1="8" x2="50" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f9ad5a"/>
      <stop offset=".48" stop-color="#f59840"/>
      <stop offset="1" stop-color="#e8821a"/>
    </linearGradient>
    <linearGradient id="shieldEdge" x1="14" y1="9" x2="52" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd29a"/>
      <stop offset="1" stop-color="#c96a10"/>
