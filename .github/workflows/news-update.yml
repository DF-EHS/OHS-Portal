name: OHS News Intelligence Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'news/fetch_news.py'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Fetch news and generate HTML
        run: python news/fetch_news.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/index.html news/cache.json
          git diff --staged --quiet || git commit -m "chore: auto-update OHS news [skip ci]"
          git pull --rebase origin main
          git push
