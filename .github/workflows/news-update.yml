name: OHS News Intelligence Update

on:
  schedule:
    # 工作日每四小時執行一次 (UTC 0,4,8,12 = 台灣時間 8,12,16,20 點)
    - cron: '0 0,4,8,12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch news and generate HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news/fetch_news.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/index.html news/cache.json
          git diff --staged --quiet || git commit -m "chore: auto-update OHS news [skip ci]"
          git push
