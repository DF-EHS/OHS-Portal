<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>復工評估表 | 大豐環保科技</title>
<style>
:root {
  --accent:      #0d9488;
  --accent-dk:   #0f766e;
  --accent-soft: #ccfbf1;
  --navy: #1e3a5f; --bg: #f1f5f9; --card: #fff;
  --border: #e2e8f0; --text: #1e293b; --sub: #64748b;
  --green: #16a34a; --red: #dc2626; --orange: #d97706;
}
body.dark {
  --bg: #0f172a; --card: #1e293b; --border: #334155;
  --text: #e2e8f0; --sub: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px;
  display: flex; flex-direction: column; min-height: 100vh;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #021a18 0%, #134e4a 50%, #0d9488 100%); color: #fff;
  padding: 14px 24px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
header h1 { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.hdr-btn:hover { background: rgba(255,255,255,.25); }
.hdr-brand { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.hdr-brand img  { height: 24px; object-fit: contain; }
.hdr-brand span { font-size: 12px; color: rgba(255,255,255,.75); font-weight: 600; white-space: nowrap; }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.toolbar input, .toolbar select {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; outline: none;
  background: var(--bg); font-family: inherit; color: var(--text);
}
.toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
#search { min-width: 200px; }
.filter-sep { width: 1px; height: 20px; background: var(--border); }
.add-btn {
  margin-left: auto; padding: 7px 18px; border-radius: 8px;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; font-family: inherit; transition: background .15s;
}
.add-btn:hover { background: var(--accent-dk); }

/* ── Stats bar ── */
.stats-bar {
  padding: 14px 20px; display: flex; gap: 12px; flex-wrap: wrap;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 22px;
  display: flex; flex-direction: column; align-items: center;
  min-width: 95px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.stat-num { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--sub); margin-top: 5px; white-space: nowrap; }

/* ── Cards grid ── */
.cards-wrap {
  flex: 1; padding: 0 20px 40px; overflow-y: auto;
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px; margin-top: 16px;
}

.eval-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
  transition: box-shadow .15s, transform .15s;
  display: flex; flex-direction: column;
}
.eval-card:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,.10);
  transform: translateY(-2px);
}
.card-top {
  background: linear-gradient(135deg, #f0fdfa 0%, #e6fdf9 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
body.dark .card-top { background: linear-gradient(135deg, #0f2d2a 0%, #123330 100%); }
.card-name { font-size: 16px; font-weight: 700; }
.card-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
.card-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
.card-row {
  display: flex; justify-content: space-between;
  font-size: 12px; gap: 8px;
}
.card-lbl { color: var(--sub); flex-shrink: 0; }
.card-val { font-weight: 600; text-align: right; }
.card-foot {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}
.act-btn {
  padding: 4px 11px; border-radius: 5px; border: none; cursor: pointer;
  font-size: 12px; font-family: inherit; transition: background .12s;
}
.act-edit { background: var(--accent-soft); color: var(--accent-dk); }
.act-edit:hover { background: #99f6e4; }
.act-del  { background: #fee2e2; color: #b91c1c; }
.act-del:hover  { background: #fecaca; }

/* ── Badges ── */
.badge {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.bd-green  { background: #dcfce7; color: #15803d; }
.bd-red    { background: #fee2e2; color: #b91c1c; }
.bd-orange { background: #ffedd5; color: #c2410c; }
.bd-yellow { background: #fef9c3; color: #854d0e; }
.bd-blue   { background: #dbeafe; color: #1d4ed8; }
.bd-gray   { background: #f1f5f9; color: #64748b; }
.bd-teal   { background: var(--accent-soft); color: var(--accent-dk); }

/* ── State screens ── */
.state-box {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center;
  color: var(--sub); gap: 12px;
}
.state-icon { font-size: 40px; opacity: .4; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 500; display: none; align-items: flex-start;
  justify-content: center; padding: 40px 16px; overflow-y: auto;
}
.modal-mask.show { display: flex; }
.modal {
  background: var(--card); border-radius: 16px;
  width: 100%; max-width: 680px;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden;
}
.modal-hdr {
  background: var(--accent); color: #fff;
  padding: 16px 22px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.modal-hdr h2 { font-size: 16px; font-weight: 700; flex: 1; }
.modal-close {
  background: rgba(255,255,255,.15); border: none;
  color: #fff; width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; font-size: 14px; display: inline-flex;
  align-items: center; justify-content: center; font-family: inherit;
}
.modal-close:hover { background: rgba(255,255,255,.3); }
.modal-body {
  padding: 22px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  overflow-y: auto; max-height: 72vh;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1 / -1; }
.field label {
  font-size: 11px; font-weight: 700; color: var(--sub);
  letter-spacing: .5px; text-transform: uppercase;
}
.field input, .field select, .field textarea {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; font-size: 13px; outline: none;
  font-family: inherit; background: var(--bg); color: var(--text);
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent); background: var(--card);
}
.field textarea { resize: vertical; min-height: 80px; }
.field input[readonly] { color: var(--sub); cursor: default; }

/* ── Divider within modal ── */
.form-divider {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 700; color: var(--sub);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin: 4px 0;
}
.form-divider::before, .form-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── AI area ── */
.ai-area {
  grid-column: 1 / -1;
  background: #f0fdfa; border: 1px solid #99f6e4;
  border-radius: 10px; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
body.dark .ai-area { background: #0c2320; border-color: #0d9488; }
.ai-area-title {
  font-size: 12px; font-weight: 700; color: var(--accent-dk);
  display: flex; align-items: center; gap: 6px;
}
.ai-row-btns { display: flex; gap: 8px; align-items: center; }
.ai-gen-btn {
  padding: 6px 14px; border-radius: 6px; border: none;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background .15s; white-space: nowrap;
}
.ai-gen-btn:hover    { background: var(--accent-dk); }
.ai-gen-btn:disabled { opacity: .6; cursor: not-allowed; }
.ai-status { font-size: 12px; }
.ai-status.loading { color: var(--accent); }
.ai-status.error   { color: var(--red); }

.modal-foot {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0;
}
.btn-cancel {
  padding: 8px 20px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-save {
  padding: 8px 20px; border-radius: 8px;
  background: var(--accent); color: #fff; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.btn-save:hover  { background: var(--accent-dk); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: #fff; padding: 10px 22px;
  border-radius: 10px; font-size: 13px; font-weight: 600;
  z-index: 999; opacity: 0; transition: opacity .25s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

footer {
  text-align: center; padding: 12px; font-size: 12px; color: var(--sub);
  border-top: 1px solid var(--border); background: var(--card);
}

/* ── Checklist modal ── */
#cl-mask { z-index: 600; }
.cl-modal { max-width: 760px; }
.cl-tabs { display: flex; border-bottom: 2px solid var(--border); background: var(--bg); flex-shrink: 0; }
.cl-tab {
  padding: 11px 24px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: none; background: none; font-family: inherit;
  color: var(--sub); border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: color .15s;
}
.cl-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.cl-body { padding: 18px 22px; overflow-y: auto; max-height: 62vh; }
.cl-section { margin-bottom: 18px; }
.cl-sec-title {
  font-size: 12px; font-weight: 800; color: #0f766e;
  background: var(--accent-soft); padding: 5px 12px; border-radius: 6px;
  margin-bottom: 10px; letter-spacing: .5px;
}
body.dark .cl-sec-title { background: #0c2320; }
.cl-sub-label {
  font-size: 11px; font-weight: 700; color: var(--sub);
  border-left: 3px solid var(--accent); padding-left: 8px;
  margin: 8px 0 5px;
}
.cl-item {
  padding: 7px 10px; border-radius: 7px;
  border: 1px solid transparent; margin-bottom: 5px;
}
.cl-item:hover { background: var(--bg); }
.cl-item.checked { background: #f0fdf4; border-color: #bbf7d0; }
body.dark .cl-item.checked { background: #052e16; border-color: #166534; }
.cl-row1 { display: flex; align-items: flex-start; gap: 8px; }
.cl-cb { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
.cl-text { font-size: 13px; line-height: 1.5; flex: 1; }
.cl-text.done { text-decoration: line-through; color: var(--sub); }
.cl-extras { padding-left: 23px; margin-top: 5px; display: flex; flex-direction: column; gap: 5px; }
.cl-date-row { display: flex; align-items: center; gap: 8px; }
.cl-date-lbl { font-size: 11px; color: var(--sub); white-space: nowrap; }
.cl-date-inp {
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; font-size: 12px; font-family: inherit;
  background: var(--card); color: var(--text); outline: none;
}
.cl-date-inp:focus { border-color: var(--accent); }
.cl-yn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cl-yn-lbl { font-size: 12px; color: var(--sub); }
.cl-yn-opts { display: flex; gap: 10px; }
.cl-yn-opts label { font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.cl-yn-opts input[type=radio] { accent-color: var(--accent); }
.cl-sub-item { padding: 4px 0; font-size: 12px; }
.cl-sub-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cl-note { font-size: 11px; color: var(--sub); margin-left: 4px; }
.cl-info-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; display: grid; grid-template-columns: max-content 1fr;
  gap: 5px 16px; font-size: 13px; margin-bottom: 10px;
}
.cl-info-lbl { color: var(--sub); }
.cl-info-val { font-weight: 600; }
.cl-progress {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: var(--bg); border-radius: 8px; margin-bottom: 14px;
}
.cl-prog-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.cl-prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.cl-prog-text { font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap; }
</style>
</head>
<body>

<header>
  <button class="hdr-btn" onclick="location.href='./'">← 職護主頁</button>
  <h1>🏃 復工評估表</h1>
  <div class="hdr-brand">
    <img src="../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="🔍  搜尋姓名、員工編號、診斷…">
  <div class="filter-sep"></div>
  <select id="f-dept">
    <option value="">全部廠區</option>
    <option value="全興廠">全興廠</option>
    <option value="台中總部">台中總部</option>
    <option value="五股">五股</option>
  </select>
  <select id="f-leave">
    <option value="">全部假別</option>
    <option value="普通病假">普通病假</option>
    <option value="傷病假">傷病假</option>
    <option value="職業傷害假">職業傷害假</option>
    <option value="生理假">生理假</option>
    <option value="其他">其他</option>
  </select>
  <select id="f-status">
    <option value="">全部狀態</option>
    <option value="評估中">評估中</option>
    <option value="已復工">已復工</option>
    <option value="追蹤中">追蹤中</option>
  </select>
  <button class="add-btn" onclick="openModal()">＋ 新增評估</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="cards-wrap">
  <div id="cards-area">
    <div class="state-box"><div class="spinner"></div><div>資料載入中…</div></div>
  </div>
</div>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統</footer>

<!-- Modal -->
<div class="modal-mask" id="modal-mask" onclick="maskClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-title">新增復工評估</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="save-btn" onclick="saveRecord()">儲存</button>
    </div>
  </div>
</div>

<!-- Checklist Modal -->
<div class="modal-mask" id="cl-mask" onclick="clMaskClick(event)">
  <div class="modal cl-modal">
    <div class="modal-hdr">
      <h2 id="cl-title">復工管理檢核表</h2>
      <button class="hdr-btn" onclick="printChecklist()" style="margin-right:6px">🖨️ 列印</button>
      <button class="modal-close" onclick="closeChecklist()">✕</button>
    </div>
    <div class="cl-tabs">
      <button class="cl-tab active" id="cl-tab-w" onclick="switchClTab('w')">👷 勞工版</button>
      <button class="cl-tab" id="cl-tab-e" onclick="switchClTab('e')">🏢 雇主版</button>
    </div>
    <div class="cl-body" id="cl-body"></div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeChecklist()">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──
// Replace with your deployed GAS Web App URL
const GAS_URL    = 'YOUR_RETURN_TO_WORK_GAS_URL_HERE';
const AI_URL     = 'https://ohs-law-chatbot.df-hr-openai.workers.dev';
const CACHE_KEY  = 'nurse-return-to-work';

let allData = [];
let editId  = null;

// ── Dark mode ──
if (localStorage.getItem('portal-dark') === '1') document.body.classList.add('dark');

// ── Demo data ──
const DEMO_DATA = [
  {
    id: 'r1', createdAt: '2025-06-01',
    name: '許志遠', empId: 'F012', dept: '全興廠', jobTitle: '機台操作員',
    leaveType: '職業傷害假',
    leaveStart: '2025-05-01', leaveEnd: '2025-05-31', leaveDays: 31,
    diagnosis: '右手腕扭傷（工作中搬運受傷）',
    returnDate: '2025-06-01',
    hasRestriction: '有',
    restrictionNote: '避免提重物超過3公斤，禁止使用震動工具',
    recommendation: '• 建議安排輕量工作3週，避免使用右手腕施力\n• 每週追蹤復原狀況，建議持續物理治療\n• 注意事項：若疼痛加劇應立即回診，告知主管調整工作內容',
    followUpPlan: '每週一職護電話追蹤，第3週安排職醫面談評估',
    evaluator: '陳護理師', evalDate: '2025-05-30',
    status: '追蹤中'
  },
  {
    id: 'r2', createdAt: '2025-07-10',
    name: '劉淑芬', empId: 'T031', dept: '台中總部', jobTitle: '行政助理',
    leaveType: '普通病假',
    leaveStart: '2025-07-01', leaveEnd: '2025-07-09', leaveDays: 9,
    diagnosis: '急性腸胃炎',
    returnDate: '2025-07-10',
    hasRestriction: '無',
    restrictionNote: '',
    recommendation: '• 飲食宜清淡，避免辛辣刺激食物\n• 注意補充水分，返工後觀察體力狀況\n• 注意事項：若持續腹瀉或發燒請立即就醫',
    followUpPlan: '返工一週內由職護電話關懷確認',
    evaluator: '陳護理師', evalDate: '2025-07-09',
    status: '已復工'
  },
  {
    id: 'r3', createdAt: '2025-08-05',
    name: '吳建國', empId: 'F018', dept: '全興廠', jobTitle: '廢棄物分類員',
    leaveType: '傷病假',
    leaveStart: '2025-07-20', leaveEnd: '2025-08-03', leaveDays: 15,
    diagnosis: '腰椎椎間盤突出（L4-L5）',
    returnDate: '2025-08-04',
    hasRestriction: '有',
    restrictionNote: '禁止彎腰搬重物，避免長時間站立，每45分鐘需休息10分鐘',
    recommendation: '',
    followUpPlan: '',
    evaluator: '', evalDate: '',
    status: '評估中'
  }
];

// ── localStorage helpers ──
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '[]'); } catch { return []; }
}
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch {}
}

// ── Bootstrap ──
async function init() {
  if (GAS_URL === 'YOUR_RETURN_TO_WORK_GAS_URL_HERE') {
    const cached = loadCache();
    allData = cached.length ? cached : [...DEMO_DATA];
    if (!cached.length) saveCache(allData);
  } else {
    try {
      const res = await fetch(`${GAS_URL}?action=getAll`);
      const json = await res.json();
      allData = json.success ? json.records : loadCache();
      saveCache(allData);
    } catch {
      allData = loadCache().length ? loadCache() : [...DEMO_DATA];
    }
  }
  renderStats();
  renderCards();
  bindFilters();
}

// ── Filters ──
function getFiltered() {
  const q     = document.getElementById('search').value.trim().toLowerCase();
  const dept  = document.getElementById('f-dept').value;
  const leave = document.getElementById('f-leave').value;
  const stat  = document.getElementById('f-status').value;

  return allData.filter(r => {
    if (q && !r.name.toLowerCase().includes(q) &&
             !r.empId.toLowerCase().includes(q) &&
             !(r.diagnosis||'').toLowerCase().includes(q)) return false;
    if (dept  && r.dept !== dept)       return false;
    if (leave && r.leaveType !== leave) return false;
    if (stat  && r.status !== stat)     return false;
    return true;
  });
}

function bindFilters() {
  ['search','f-dept','f-leave','f-status'].forEach(id => {
    document.getElementById(id).addEventListener('input',  () => { renderStats(); renderCards(); });
    document.getElementById(id).addEventListener('change', () => { renderStats(); renderCards(); });
  });
}

// ── Stats ──
function renderStats() {
  const f = getFiltered();
  const assessing = f.filter(r => r.status === '評估中').length;
  const returned  = f.filter(r => r.status === '已復工').length;
  const tracking  = f.filter(r => r.status === '追蹤中').length;

  const chips = [
    { num: f.length,    lbl: '評估總數', color: 'var(--accent)' },
    { num: assessing,   lbl: '評估中',   color: 'var(--orange)' },
    { num: returned,    lbl: '已復工',   color: 'var(--green)' },
    { num: tracking,    lbl: '追蹤中',   color: '#1d4ed8' },
  ];

  document.getElementById('stats-bar').innerHTML = chips.map(c =>
    `<div class="stat-chip">
      <div class="stat-num" style="color:${c.color}">${c.num}</div>
      <div class="stat-lbl">${c.lbl}</div>
    </div>`
  ).join('');
}

// ── Badge helpers ──
function statusBadge(s) {
  const map = { '評估中': 'bd-orange', '已復工': 'bd-green', '追蹤中': 'bd-blue' };
  return `<span class="badge ${map[s] || 'bd-gray'}">${s || '—'}</span>`;
}
function leaveBadge(t) {
  const map = {
    '普通病假': 'bd-gray', '傷病假': 'bd-yellow',
    '職業傷害假': 'bd-red', '生理假': 'bd-teal', '其他': 'bd-gray'
  };
  return `<span class="badge ${map[t] || 'bd-gray'}">${t}</span>`;
}
function restrBadge(h) {
  return h === '有'
    ? `<span class="badge bd-orange">有工作限制</span>`
    : `<span class="badge bd-green">無限制</span>`;
}

  document.getElementById('modal-mask').classList.remove('show');

}
function maskClick(e) {
  if (e.target === document.getElementById('modal-mask')) closeModal();
}

function toggleRestrNote() {
  const show = document.getElementById('f-restr').value === '有';
  document.getElementById('restr-note-field').style.display = show ? '' : 'none';
}

function calcDays() {
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  if (s && e) {
    const diff = Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1;
    document.getElementById('f-days').value = diff > 0 ? diff : '';
  }
}

// ── AI generation ──
async function generateAI() {
  const leaveType = document.getElementById('f-leave2').value;
  const diagnosis = document.getElementById('f-diag').value.trim();
  const leaveDays = document.getElementById('f-days').value || '?';
  const hasRestr  = document.getElementById('f-restr').value;
  const restrNote = document.getElementById('f-restr-note')?.value.trim() || '';

  if (!diagnosis) { showToast('請先填寫傷病診斷', true); return; }

  const prompt = `請根據以下員工傷病資訊，提供復工評估建議（包含：工作調整建議、追蹤頻率、注意事項）：\n假別：${leaveType}\n傷病診斷：${diagnosis}\n請假天數：${leaveDays}天\n工作限制：${hasRestr === '有' ? restrNote || '有限制（詳情未填）' : '無'}\n請以條列式繁體中文回覆，每項建議前加「• 」`;

  const btn = document.getElementById('ai-btn');
  const statusEl = document.getElementById('ai-status');
  btn.disabled = true;
  statusEl.textContent = '生成中…';
  statusEl.className = 'ai-status loading';

  try {
    const res = await fetch(AI_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: prompt })
    });
    const json = await res.json();
    const text = json?.data?.data || json?.data || '';
    if (text) {
      document.getElementById('f-rec').value = text;
      statusEl.textContent = '✓ 已生成';
      statusEl.className = 'ai-status';
      statusEl.style.color = 'var(--green)';
    } else {
      throw new Error('empty');
    }
  } catch {
    statusEl.textContent = '生成失敗，請手動填寫';
    statusEl.className = 'ai-status error';
  } finally {
    btn.disabled = false;
  }
}

// ── Save ──
async function saveRecord() {
  const btn  = document.getElementById('save-btn');
  const name  = document.getElementById('f-name').value.trim();
  const empId = document.getElementById('f-empId').value.trim();
  if (!name || !empId) { showToast('請填寫姓名與員工編號', true); return; }

  const leaveStart = document.getElementById('f-start').value;
  const leaveEnd   = document.getElementById('f-end').value;
  let   leaveDays  = parseInt(document.getElementById('f-days').value) || 0;
  if (!leaveDays && leaveStart && leaveEnd) {
    leaveDays = Math.ceil((new Date(leaveEnd) - new Date(leaveStart)) / 86400000) + 1;
  }

  const rec = {
    id:            editId || ('ev' + Date.now()),
    createdAt:     editId ? (allData.find(r=>r.id===editId)?.createdAt || today()) : today(),
    name, empId,
    dept:          document.getElementById('f-dept2').value,
    jobTitle:      document.getElementById('f-job').value.trim(),
    leaveType:     document.getElementById('f-leave2').value,
    leaveStart, leaveEnd, leaveDays,
    diagnosis:     document.getElementById('f-diag').value.trim(),
    returnDate:    document.getElementById('f-return').value,
    hasRestriction: document.getElementById('f-restr').value,
    restrictionNote: document.getElementById('f-restr-note')?.value.trim() || '',
    recommendation:  document.getElementById('f-rec').value.trim(),
    followUpPlan:    document.getElementById('f-plan').value.trim(),
    evaluator:       document.getElementById('f-evaluator').value.trim(),
    evalDate:        document.getElementById('f-evaldate').value,
    status:          document.getElementById('f-stat2').value,
  };

  btn.disabled = true;

  if (GAS_URL !== 'YOUR_RETURN_TO_WORK_GAS_URL_HERE') {
    try {
      const action = editId ? 'update' : 'add';
      await fetch(GAS_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action, record: rec })
      });
    } catch {}
  }

  if (editId) {
    const idx = allData.findIndex(r => r.id === editId);
    if (idx >= 0) allData[idx] = rec;
  } else {
    allData.unshift(rec);
  }
  saveCache(allData);
  btn.disabled = false;
  closeModal();
  renderStats();
  renderCards();
  showToast(editId ? '已更新評估' : '已新增評估');
}

// ── Delete ──
async function deleteRecord(id) {
  if (!confirm('確定要刪除這筆評估記錄嗎？')) return;

  if (GAS_URL !== 'YOUR_RETURN_TO_WORK_GAS_URL_HERE') {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action: 'delete', id })
      });
    } catch {}
  }

  allData = allData.filter(r => r.id !== id);
  saveCache(allData);
  renderStats();
  renderCards();
  showToast('已刪除評估記錄');
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ── Toast ──
let _tTimer;
function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#dc2626' : '#1e293b';
  t.classList.add('show');
  clearTimeout(_tTimer);
  _tTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

        { id:'e37', text:'同意參與復工計畫會議，在復工計畫中簽名，並保持記錄。', date:'日期' },
      ]
    },
    {
      title: '四、監測和評估',
      items: [
        { id:'e41', text:'與職能復健機構個案管理師保持聯繫，瞭解復工計畫執行狀況，並記錄聯繫內容。' },
        { id:'e42', text:'配合復工計畫，善盡職務調整及安置義務（含漸進式復工、職務再設計等）。' },
        { id:'e43', text:'勞工健康服務醫護人員定期至職場關懷勞工，解決復工計畫執行時所出現的問題。' },
        { id:'e44', text:'每周/每月（定期）與職災勞工聯繫，並記錄每次聯繫內容，以及後續協處事項。' },
      ]
    },
    {
      title: '五、結束復工計畫及後續管理', type: 'ending',
      items: [
        { id:'e5a', text:'職災勞工重返原工作，原職務、原工時。', date:'日期' },
        { id:'e5b', text:'職災勞工重返原工作，工時或職務永久性調整。', date:'日期' },
        { id:'e5c', text:'職災勞工工作能力無法符合事業單位需求，經評估及協商後，需要其他專業服務人員提供協助，或進行資源連結。' },
      ]
    }
  ]
};

let clRecId = null, clTab = 'w', clSt = {};

function openChecklist(id) {
  const rec = allData.find(r => r.id === id);
  if (!rec) return;
  clRecId = id;
  clTab = 'w';
  try { clSt = JSON.parse(localStorage.getItem('nurse-rtw-cl-' + id) || '{}'); } catch { clSt = {}; }
  document.getElementById('cl-title').textContent = `復工管理檢核表 — ${rec.name}`;
  document.getElementById('cl-mask').classList.add('show');
  switchClTab('w');
}
function closeChecklist() {
  document.getElementById('cl-mask').classList.remove('show');
  clRecId = null;
}
function clMaskClick(e) {
  if (e.target.id === 'cl-mask') closeChecklist();
}
function switchClTab(t) {
  clTab = t;
  document.getElementById('cl-tab-w').classList.toggle('active', t === 'w');
  document.getElementById('cl-tab-e').classList.toggle('active', t === 'e');
  renderChecklist();
}
function saveCl() {
  if (clRecId) localStorage.setItem('nurse-rtw-cl-' + clRecId, JSON.stringify(clSt));
}
function clGet(id, field) { return (clSt[id] || {})[field]; }
function clSet(id, field, val) {
  clSt[id] = clSt[id] || {};
  clSt[id][field] = val;
  saveCl();
}

function collectClItems(def) {
  const ids = [];
  def.forEach(sec => {
    if (sec.type === 'info') return;
    const push = it => { ids.push(it.id); if (it.subs) it.subs.forEach(s => ids.push(s.id)); };
    if (sec.subsections) sec.subsections.forEach(sub => sub.items.forEach(push));
    else (sec.items || []).forEach(push);
  });
  return ids;
}

function renderClItem(it, num) {
  const ck  = clGet(it.id, 'checked') || false;
  const dt  = clGet(it.id, 'date')    || '';
  const yn  = clGet(it.id, 'yn')      || '';
  const ynd = clGet(it.id, 'ynDate')  || '';
  const showYnDate = it.ynDate && yn === (it.ynTrigger || '是');

  let html = `<div class="cl-item${ck ? ' checked' : ''}" id="cli-${it.id}">
    <div class="cl-row1">
      <input type="checkbox" class="cl-cb" ${ck ? 'checked' : ''}
        onchange="clSetItem('${it.id}','checked',this.checked)">
      <span class="cl-text${ck ? ' done' : ''}">${num}. ${it.text}${it.note ? `<span class="cl-note">${it.note}</span>` : ''}</span>
    </div>
    <div class="cl-extras">`;

  if (it.date) {
    html += `<div class="cl-date-row">
      <span class="cl-date-lbl">${it.date}：</span>
      <input type="date" class="cl-date-inp" value="${dt}"
        onchange="clSet('${it.id}','date',this.value)">
    </div>`;
  }

  if (it.yn) {
    html += `<div class="cl-yn-row"><span class="cl-yn-lbl">選擇：</span><div class="cl-yn-opts">`;
    it.yn.forEach(o => {
      html += `<label><input type="radio" name="yn-${it.id}" value="${o}" ${yn===o?'checked':''}
        onchange="clSetYN('${it.id}','${o}','${it.ynTrigger||''}','${it.ynDate||''}')">${o}</label>`;
    });
    html += `</div></div>`;
    if (it.ynDate) {
      html += `<div class="cl-date-row" id="yd-${it.id}" style="${showYnDate?'':'display:none'}">
        <span class="cl-date-lbl">${it.ynDate}：</span>
        <input type="date" class="cl-date-inp" value="${ynd}"
          onchange="clSet('${it.id}','ynDate',this.value)">
      </div>`;
    }
  }

  if (it.subs) {
    it.subs.forEach(sub => {
      const sv = clGet(sub.id, 'yn') || '';
      html += `<div class="cl-sub-item">
        <div class="cl-sub-row">
          <span class="cl-yn-lbl">${sub.text}</span>
          <div class="cl-yn-opts">
            <label><input type="radio" name="yn-${sub.id}" value="是" ${sv==='是'?'checked':''}
              onchange="clSet('${sub.id}','yn','是')">是</label>
            <label><input type="radio" name="yn-${sub.id}" value="否" ${sv==='否'?'checked':''}
              onchange="clSet('${sub.id}','yn','否')">否</label>
          </div>
        </div>
      </div>`;
    });
  }

  html += `</div></div>`;
  return html;
}

function renderChecklist() {
  const rec = allData.find(r => r.id === clRecId);
  const def = CL_DEF[clTab];
  let html = '';

  if (rec) {
    html += `<div class="cl-info-box">
      <span class="cl-info-lbl">勞工姓名</span><span class="cl-info-val">${rec.name}（${rec.empId}）</span>
      <span class="cl-info-lbl">廠區／職稱</span><span class="cl-info-val">${rec.dept} ${rec.jobTitle}</span>
      <span class="cl-info-lbl">職災診斷</span><span class="cl-info-val">${rec.diagnosis || '—'}</span>
      <span class="cl-info-lbl">復工日期</span><span class="cl-info-val">${rec.returnDate || '—'}</span>
    </div>`;
  }

  const allItems = collectClItems(def);
  const checked  = allItems.filter(id => clGet(id, 'checked')).length;
  const pct = allItems.length ? Math.round(checked / allItems.length * 100) : 0;
  html += `<div class="cl-progress" id="cl-progress">
    <div class="cl-prog-bar"><div class="cl-prog-fill" style="width:${pct}%"></div></div>
    <span class="cl-prog-text">${checked}/${allItems.length} 項已確認 (${pct}%)</span>
  </div>`;

  def.forEach(sec => {
    if (sec.type === 'info') return;
    html += `<div class="cl-section"><div class="cl-sec-title">${sec.title}</div>`;
    if (sec.subsections) {
      sec.subsections.forEach(sub => {
        if (sub.label) html += `<div class="cl-sub-label">${sub.label}</div>`;
        sub.items.forEach((it, i) => { html += renderClItem(it, i + 1); });
      });
    } else {
      (sec.items || []).forEach((it, i) => { html += renderClItem(it, i + 1); });
    }
    html += `</div>`;
  });

  document.getElementById('cl-body').innerHTML = html;
}

function clSetItem(id, field, val) {
  clSet(id, field, val);
  const el = document.getElementById('cli-' + id);
  if (el) {
    el.classList.toggle('checked', val);
    const txt = el.querySelector('.cl-text');
    if (txt) txt.classList.toggle('done', val);
  }
  const def = CL_DEF[clTab];
  const allItems = collectClItems(def);
  const checked  = allItems.filter(i => clGet(i, 'checked')).length;
  const pct = allItems.length ? Math.round(checked / allItems.length * 100) : 0;
  const fill = document.querySelector('#cl-progress .cl-prog-fill');
  const text = document.querySelector('#cl-progress .cl-prog-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = `${checked}/${allItems.length} 項已確認 (${pct}%)`;
}

function clSetYN(id, val, trigger, ynDateLabel) {
  clSet(id, 'yn', val);
  if (ynDateLabel) {
    const ydEl = document.getElementById('yd-' + id);
    if (ydEl) ydEl.style.display = (val === trigger) ? '' : 'none';
  }
}

function printChecklist() {
  const content = document.getElementById('cl-body').innerHTML;
  const tabName = clTab === 'w' ? '勞工版' : '雇主版';
  const rec = allData.find(r => r.id === clRecId);
  const win = window.open('', '_blank', 'width=800,height=700');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>復工管理檢核表（${tabName}）</title>
    <style>
      body { font-family:"Microsoft JhengHei",sans-serif; font-size:13px; padding:24px; }
      h2 { text-align:center; margin-bottom:16px; font-size:16px; }
      .cl-info-box { display:grid; grid-template-columns:max-content 1fr; gap:5px 16px; border:1px solid #e2e8f0; border-radius:6px; padding:10px 14px; margin-bottom:12px; }
      .cl-info-lbl { color:#64748b; } .cl-info-val { font-weight:600; }
      .cl-progress { display:none; }
      .cl-section { margin-bottom:14px; }
      .cl-sec-title { background:#f0fdfa; padding:4px 10px; border-radius:4px; font-weight:800; font-size:12px; margin-bottom:8px; }
      .cl-sub-label { font-size:11px; font-weight:700; color:#64748b; border-left:3px solid #0d9488; padding-left:8px; margin:6px 0 4px; }
      .cl-item { padding:5px 8px; margin-bottom:4px; }
      .cl-item.checked { background:#f0fdf4; }
      .cl-row1 { display:flex; align-items:flex-start; gap:6px; }
      .cl-cb { flex-shrink:0; } .cl-text { flex:1; line-height:1.5; }
      .cl-text.done { text-decoration:line-through; color:#64748b; }
      .cl-extras { padding-left:20px; margin-top:4px; display:flex; flex-direction:column; gap:4px; }
      .cl-date-row { display:flex; align-items:center; gap:6px; font-size:12px; }
      .cl-date-lbl { color:#64748b; }
      .cl-yn-row { display:flex; align-items:center; gap:8px; font-size:12px; flex-wrap:wrap; }
      .cl-yn-lbl { color:#64748b; } .cl-yn-opts { display:flex; gap:8px; }
      .cl-yn-opts label { display:flex; align-items:center; gap:3px; }
      .cl-sub-item { padding:3px 0 3px 0; font-size:12px; }
      .cl-sub-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
      .cl-note { color:#64748b; font-size:11px; margin-left:4px; }
    </style>
  </head><body>
    <h2>財團法人職業災害預防及重建中心<br>復工管理檢核表（${tabName}）</h2>
    ${content}
    <p style="text-align:right;color:#64748b;font-size:11px;margin-top:16px">列印日期：${today()}</p>
  </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 300);
}

init();
</script>
