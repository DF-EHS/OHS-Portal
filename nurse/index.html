<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職護臨場服務 | 大豐環保科技</title>
<style>
:root {
  --accent:      #0d9488;
  --accent-dk:   #0f766e;
  --accent-soft: #ccfbf1;
  --navy: #1e3a5f; --bg: #f1f5f9; --card: #fff;
  --border: #e2e8f0; --text: #1e293b; --sub: #64748b;
  --green: #16a34a; --red: #dc2626; --orange: #d97706;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #021a18 0%, #134e4a 50%, #0d9488 100%); color: #fff;
  padding: 14px 24px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 16px rgba(0,0,0,.35);
}
header h1 { font-size: 17px; font-weight: 700; flex: 1; }
.hdr-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1);
  color: #fff; font-size: 12px; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.hdr-btn:hover { background: rgba(255,255,255,.25); }
.hdr-brand { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.hdr-brand img  { height: 24px; object-fit: contain; }
.hdr-brand span { font-size: 12px; color: rgba(255,255,255,.75); font-weight: 600; white-space: nowrap; }

/* ── Filter bar ── */
.filter-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center; flex-shrink: 0;
}
.filter-bar input, .filter-bar select {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; outline: none;
  background: var(--bg); font-family: inherit;
}
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
#search { min-width: 220px; }
.filter-sep { width: 1px; height: 20px; background: var(--border); }
.add-btn {
  margin-left: auto; padding: 7px 18px; border-radius: 8px;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; font-family: inherit; transition: background .15s;
}
.add-btn:hover { background: var(--accent-dk); }

/* ── Stats ── */
.stats-bar {
  padding: 16px 20px; display: flex; gap: 14px;
  flex-wrap: wrap; flex-shrink: 0; justify-content: center;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 32px;
  display: flex; flex-direction: column; align-items: center;
  min-width: 110px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.stat-num { font-size: 36px; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--sub); margin-top: 7px; white-space: nowrap; }

/* ── Main layout ── */
.main-wrap {
  position: relative; display: flex; flex: 1; overflow: hidden;
}

/* ── Table area ── */
.table-wrap { flex: 1; overflow-y: auto; padding: 16px 20px 40px; }

.table-container {
  border-radius: 12px;
  overflow: clip;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
}
table {
  width: 100%; border-collapse: collapse;
  background: var(--card);
}
thead { background: #f8fafc; position: sticky; top: 0; z-index: 2; }
th {
  padding: 10px 14px; font-size: 11px; font-weight: 700;
  color: var(--sub); text-align: left; letter-spacing: .5px;
  text-transform: uppercase; white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 9px 14px; font-size: 13px;
  border-bottom: 1px solid #f1f5f9; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background .1s; }
tbody tr:hover  { background: #f8fafc; }
tbody tr.active { background: var(--accent-soft); }

/* ── Badges ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.bd-green  { background: #dcfce7; color: #15803d; }
.bd-red    { background: #fee2e2; color: #b91c1c; }
.bd-orange { background: #ffedd5; color: #c2410c; }
.bd-yellow { background: #fef9c3; color: #854d0e; }
.bd-teal   { background: var(--accent-soft); color: var(--accent-dk); }
.bd-gray   { background: #f1f5f9; color: #64748b; }
.bd-none   { background: #f8fafc; color: #94a3b8; font-style: italic; font-weight: 400; }

/* ── Detail panel ── */
.detail-panel {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 360px; background: var(--card);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  z-index: 50; box-shadow: -4px 0 20px rgba(0,0,0,.08);
}
.detail-panel.open { transform: translateX(0); }

.dp-head {
  background: var(--accent); color: #fff;
  padding: 16px 18px; flex-shrink: 0;
}
.dp-name { font-size: 18px; font-weight: 700; }
.dp-meta { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 4px; }
.dp-close {
  float: right; background: rgba(255,255,255,.15); border: none;
  color: #fff; width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; font-size: 14px; margin: -2px 0 0 8px;
  display: inline-flex; align-items: center; justify-content: center;
}
.dp-close:hover { background: rgba(255,255,255,.3); }

.dp-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.dp-section { margin-bottom: 18px; }
.dp-sec-title {
  font-size: 10px; font-weight: 700; color: var(--sub);
  letter-spacing: 2px; text-transform: uppercase;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.dp-row {
  display: flex; justify-content: space-between;
  align-items: center; padding: 4px 0; font-size: 13px;
}
.dp-lbl  { color: var(--sub); flex-shrink: 0; margin-right: 8px; }
.dp-val  { font-weight: 600; text-align: right; }
.dp-val.empty { color: #94a3b8; font-weight: 400; font-style: italic; }

.dp-foot {
  padding: 12px 18px; border-top: 1px solid var(--border);
  flex-shrink: 0; display: flex; gap: 8px;
}
.dp-edit-btn {
  flex: 1; padding: 9px; border-radius: 8px;
  background: var(--accent); color: #fff; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.dp-edit-btn:hover { background: var(--accent-dk); }
.dp-del-btn {
  padding: 9px 14px; border-radius: 8px;
  background: #fee2e2; color: var(--red); border: 1px solid #fecaca;
  font-size: 14px; cursor: pointer; font-family: inherit;
  transition: background .15s, color .15s;
}
.dp-del-btn:hover { background: var(--red); color: #fff; }

/* ── State screens ── */
.state-box {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center;
  color: var(--sub); gap: 12px;
}
.state-icon { font-size: 40px; opacity: .4; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 500; display: none; align-items: flex-start;
  justify-content: center; padding: 40px 16px; overflow-y: auto;
}
.modal-mask.show { display: flex; }
.modal {
  background: var(--card); border-radius: 16px;
  width: 100%; max-width: 600px;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden;
}
.modal-hdr {
  background: var(--accent); color: #fff;
  padding: 16px 22px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.modal-hdr h2 { font-size: 16px; font-weight: 700; flex: 1; }
.modal-body {
  padding: 22px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .5px; text-transform: uppercase; }
.field input, .field select {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; font-size: 13px; outline: none;
  font-family: inherit; background: var(--bg);
}
.field input:focus, .field select:focus { border-color: var(--accent); background: #fff; }
.modal-foot {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0;
}
.btn-cancel {
  padding: 8px 20px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-save {
  padding: 8px 20px; border-radius: 8px;
  background: var(--accent); color: #fff; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.btn-save:hover  { background: var(--accent-dk); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }

/* ── AI Upload section ── */
.ai-section {
  grid-column: 1 / -1;
  background: #f0fdfa; border: 1px solid #99f6e4;
  border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.ai-sec-title { font-size: 12px; font-weight: 700; color: var(--accent-dk); display: flex; align-items: center; gap: 6px; }
.drop-zone {
  border: 2px dashed var(--accent); border-radius: 8px;
  padding: 20px 16px; text-align: center; cursor: pointer;
  background: #fff; transition: background .15s, border-color .15s;
  user-select: none;
}
.drop-zone:hover, .drop-zone.drag-over { background: var(--accent-soft); border-color: var(--accent-dk); }
.drop-icon { font-size: 28px; margin-bottom: 6px; }
.drop-text { font-size: 13px; font-weight: 600; color: var(--accent-dk); }
.drop-hint { font-size: 11px; color: var(--sub); margin-top: 3px; }
.file-list { display: flex; flex-direction: column; gap: 6px; }
.file-item {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
}
.file-item-name { flex: 1; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-list-actions { display: flex; justify-content: flex-end; margin-top: 2px; }
.ai-parse-btn {
  padding: 6px 14px; border-radius: 6px; border: none;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
  font-family: inherit; transition: background .15s;
}
.ai-parse-btn:hover    { background: var(--accent-dk); }
.ai-parse-btn:disabled { opacity: .6; cursor: not-allowed; }
.ai-clear-btn { background: none; border: none; color: var(--sub); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
.ai-clear-btn:hover { color: var(--red); }
.ai-status { font-size: 12px; text-align: center; min-height: 18px; }
.ai-status.loading { color: var(--accent); }
.ai-status.success { color: var(--green); }
.ai-status.error   { color: var(--red); }
.ai-result-box {
  background: #fff; border: 1px solid #99f6e4; border-radius: 8px;
  padding: 10px 14px; font-size: 12px; display: flex; flex-direction: column; gap: 4px;
}
.ai-result-box .ai-row { display: flex; gap: 8px; }
.ai-result-box .ai-lbl { color: var(--sub); flex-shrink: 0; }
.ai-result-box .ai-val { font-weight: 600; }
.field.ai-filled input, .field.ai-filled select { border-color: var(--accent); background: #f0fdfa; }

/* ── Module nav ── */
.mod-nav {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; gap: 0; flex-shrink: 0;
}
.mod-tab {
  padding: 12px 20px; border: none; background: none;
  font-size: 13px; font-weight: 600; color: var(--sub);
  cursor: pointer; border-bottom: 3px solid transparent;
  font-family: inherit; transition: all .15s;
}
.mod-tab:hover { color: var(--text); }
.mod-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Service log module ── */
.svc-outer { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.svc-ctrl {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap; flex-shrink: 0;
}
.svc-ctrl label { font-size: 12px; font-weight: 700; color: var(--sub); }
.svc-ctrl select { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: inherit; background: var(--bg); outline: none; }
.svc-ctrl select:focus { border-color: var(--accent); }
.month-tabs-wrap {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0;
}
.month-tab {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); font-size: 12px; font-weight: 600; color: var(--sub);
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.month-tab:hover { border-color: var(--accent); color: var(--accent); }
.month-tab.has-data { border-color: var(--accent); color: var(--accent); }
.month-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.svc-wrap { flex: 1; overflow-y: auto; padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 12px; }
.svc-month-hd {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border-radius: 12px; padding: 14px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.svc-month-title { font-size: 15px; font-weight: 700; }
.svc-add-btn {
  padding: 7px 16px; border-radius: 8px; background: var(--accent); color: #fff;
  border: none; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background .15s;
}
.svc-add-btn:hover { background: var(--accent-dk); }
.svc-card {
  background: var(--card); border-radius: 12px; padding: 16px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); border-left: 4px solid var(--accent);
}
.svc-card-hd { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.svc-card-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
.svc-card-title { font-size: 14px; font-weight: 700; }
.svc-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.svc-edit-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--sub); background: none; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
.svc-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
.svc-del-btn { padding: 4px 8px; border-radius: 6px; border: 1px solid #fecaca; color: var(--red); background: none; font-size: 12px; cursor: pointer; font-family: inherit; }
.svc-tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.svc-tag { padding: 2px 8px; border-radius: 12px; background: var(--accent-soft); color: var(--accent-dk); font-size: 11px; font-weight: 600; }
.svc-info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; margin-top: 10px; }
.svc-info-cell { font-size: 12px; color: var(--sub); }
.svc-info-cell span { font-weight: 600; color: var(--text); }
.svc-summary-row { margin-top: 10px; font-size: 13px; border-top: 1px solid var(--border); padding-top: 10px; }
.svc-summary-lbl { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 3px; }
.svc-empty { text-align: center; padding: 48px 20px; color: var(--sub); background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.svc-empty-icon { font-size: 36px; margin-bottom: 8px; opacity: .35; }

/* svc modal */
.svc-modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.svc-modal-mask.show { display: flex; }
.svc-modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 660px; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
.svc-modal-hd { background: var(--accent); color: #fff; padding: 16px 22px; display: flex; align-items: center; gap: 10px; }
.svc-modal-hd h2 { font-size: 16px; font-weight: 700; flex: 1; }
.svc-modal-body { padding: 20px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.svc-modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
.svc-chk-group { display: flex; flex-wrap: wrap; gap: 6px; }
.svc-chk-label { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); transition: all .15s; }
.svc-chk-label:hover { border-color: var(--accent); }
.svc-chk-label input { accent-color: var(--accent); }
.svc-field { display: flex; flex-direction: column; gap: 5px; }
.svc-field.full { grid-column: 1 / -1; }
.svc-field label { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .5px; text-transform: uppercase; }
.svc-field input, .svc-field select, .svc-field textarea { border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; font-family: inherit; background: var(--bg); }
.svc-field input:focus, .svc-field select:focus, .svc-field textarea:focus { border-color: var(--accent); background: #fff; }
.svc-field textarea { resize: vertical; min-height: 68px; }

/* ── Svc AI upload zone ── */
.svc-ai-section {
  grid-column: 1 / -1; background: #f0fdfa; border: 1px solid #99f6e4;
  border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
}
.svc-ai-sec-title { font-size: 12px; font-weight: 700; color: var(--accent-dk); display: flex; align-items: center; gap: 6px; }
.svc-upload-zone {
  border: 2.5px dashed var(--accent); border-radius: 8px;
  padding: 20px 16px; text-align: center; cursor: pointer;
  background: #fff; transition: background .15s, border-color .15s; user-select: none;
}
.svc-upload-zone:hover, .svc-upload-zone.dragover { background: var(--accent-soft); border-color: var(--accent-dk); }
.svc-upload-zone-icon { font-size: 28px; margin-bottom: 5px; }
.svc-upload-zone-text { font-size: 13px; font-weight: 600; color: var(--accent-dk); }
.svc-upload-zone-hint { font-size: 11px; color: var(--sub); margin-top: 3px; }
.svc-file-row {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
}
.svc-file-row-name { flex: 1; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.svc-file-clear { background: none; border: none; color: var(--sub); cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; }
.svc-file-clear:hover { color: var(--red); }
.svc-ai-run-btn {
  width: 100%; padding: 9px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.svc-ai-run-btn:hover:not(:disabled) { background: var(--accent-dk); }
.svc-ai-run-btn:disabled { opacity: .5; cursor: not-allowed; }
.svc-ai-result-card {
  background: #e0f9f5; border: 1px solid #5eead4; border-radius: 10px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
}
.svc-ai-result-title { font-size: 12px; font-weight: 800; color: var(--accent-dk); }
.svc-ai-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.svc-ai-result-row { font-size: 12px; display: flex; gap: 6px; }
.svc-ai-result-lbl { color: var(--sub); flex-shrink: 0; }
.svc-ai-result-val { font-weight: 600; }
.svc-ai-confirm-btn {
  width: 100%; padding: 9px; border-radius: 8px; border: none;
  background: #15803d; color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.svc-ai-confirm-btn:hover { background: #166534; }
.svc-ai-spin {
  width: 16px; height: 16px; border: 2px solid var(--accent);
  border-top-color: transparent; border-radius: 50%;
  animation: spin .8s linear infinite; flex-shrink: 0;
}

/* ── Sub-module dashboard ── */
.dash-outer { flex: 1; overflow-y: auto; padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 20px; }

.dash-section { background: var(--card); border-radius: 12px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.dash-section-title { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

/* ── Login overlay ── */

<script>
const API = 'https://script.google.com/macros/s/AKfycbx1shNheNSSfVvmeAcyXQMAhupTLYeNtMUYsCGh_j5ZvL7LZ-hMX1VreF-MSFOpufak/exec';
const CACHE_KEY = 'nurse-data';

let allData    = [];
let filtered   = [];
let currentPerson = null;

// ── localStorage 快取 ──
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '[]'); } catch { return []; }
}
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch {}
}

// ── Badge renderers ──
const B = {
  status(v)  { return v==='已離職' ? b('bd-gray','已離職') : b('bd-teal','在職'); },
  meta(v)    { return !v ? b('bd-none','—') : ({代謝症候群:b('bd-orange','代謝症候群'), 高危險群:b('bd-red','高危險群'), 正常:b('bd-green','正常')}[v] || b('bd-gray',v)); },
  workload(v){ return !v ? b('bd-none','—') : ({建議面談:b('bd-red','建議面談'), 不需面談:b('bd-gray','不需面談')}[v] || b('bd-gray',v)); },
  load(v)    { return !v ? b('bd-none','—') : ({高負荷:b('bd-red','高負荷'), 中負荷:b('bd-yellow','中負荷'), 低負荷:b('bd-teal','低負荷')}[v] || b('bd-gray',v)); },
  yin(v)     { return !v ? b('bd-none','未評估') : ({疑似有危害:b('bd-red','疑似有危害'), 有症狀但無危害:b('bd-orange','有症狀但無危害'), 無症狀:b('bd-green','無症狀')}[v] || b('bd-gray',v)); },
  risk(v)    { return !v ? b('bd-none','—') : ({高風險:b('bd-red','高風險'), 中風險:b('bd-orange','中風險'), 低風險:b('bd-green','低風險')}[v] || b('bd-gray',v)); },
};
function b(cls, txt) { return `<span class="badge ${cls}">${txt}</span>`; }

// ── Fetch（雙層：先快取即時顯示，背景更新 GAS）──
async function loadData() {
  // 第一層：localStorage 快取 → 立即渲染
  const cached = loadCache();
  if (cached.length > 0) {
    allData = cached;
    buildDeptFilter();
    renderStats();
    applyFilters();
  }

  // 第二層：GAS 最新資料 → 背景更新
  try {
    const res  = await fetch(API + '?action=list&t=' + Date.now(), { redirect: 'follow' });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    allData = json.data;
    saveCache(allData);
    buildDeptFilter();
    renderStats();
    applyFilters();
  } catch(e) {
    if (allData.length === 0) {
      document.getElementById('table-area').innerHTML =
        `<div class="state-box"><div class="state-icon">⚠️</div><div>資料載入失敗<br><small style="color:#94a3b8">${e.message}</small></div></div>`;
    } else {
      showToast('⚠️ 網路不佳，顯示快取資料');
    }
  }
}

// ── Department filter ──
function buildDeptFilter() {
  const depts = [...new Set(allData.map(r => r.部門).filter(Boolean))].sort();
  const sel   = document.getElementById('f-dept');
  while (sel.options.length > 1) sel.remove(1); // 清除舊選項，保留「全部部門」
  depts.forEach(d => { const o = document.createElement('option'); o.value = o.textContent = d; sel.appendChild(o); });
}

// ── Stats ──
function renderStats() {
  const total   = allData.length;
  const active  = allData.filter(r => r.狀態==='在職').length;
  const suggest = allData.filter(r => r.異常工作負荷結果==='建議面談').length;
  const pending = allData.filter(r => r.狀態==='在職' && (!r.人因 || !r.工作負荷程度)).length;
  const resigned= allData.filter(r => r.狀態==='已離職').length;
  document.getElementById('stats-bar').innerHTML = [
    chip(total,   '總人數',   'var(--accent)'),
    chip(active,  '在職',     'var(--accent)'),
    chip(suggest, '建議面談', 'var(--red)'),
    chip(pending, '評估未完整','var(--orange)'),
    chip(resigned,'已離職',   'var(--sub)'),
  ].join('');
}
function chip(n, lbl, col) {
  return `<div class="stat-chip"><div class="stat-num" style="color:${col}">${n}</div><div class="stat-lbl">${lbl}</div></div>`;
}

// ── Filters ──
function applyFilters() {
  const kw  = document.getElementById('search').value.toLowerCase();
  const st  = document.getElementById('f-status').value;
  const dp  = document.getElementById('f-dept').value;
  const mt  = document.getElementById('f-meta').value;
  const wl  = document.getElementById('f-workload').value;

  filtered = allData.filter(r => {
    if (st && r.狀態             !== st) return false;
    if (dp && r.部門             !== dp) return false;
    if (mt && r.代謝症候群       !== mt) return false;
    if (wl && r.異常工作負荷結果 !== wl) return false;
    if (kw) {
      const hay = (r.姓名 + r.員工編號 + r.部門).toLowerCase();
      if (!hay.includes(kw)) return false;
    }
    return true;
  });
  renderTable();
}
['search','f-status','f-dept','f-meta','f-workload'].forEach(
  id => document.getElementById(id).addEventListener('input', applyFilters)
);

// ── Table ──
function renderTable() {
  if (!filtered.length) {
    document.getElementById('table-area').innerHTML =
      `<div class="state-box"><div class="state-icon">🔍</div><div>沒有符合條件的人員</div></div>`;
    return;
  }
  const rows = filtered.map(r => `
    <tr data-row="${r._row}" onclick="showDetail(${r._row})"
        class="${currentPerson?._row === r._row ? 'active' : ''}">
      <td>
        <div style="font-weight:700">${r.姓名}</div>
        <div style="font-size:11px;color:var(--sub)">${r.員工編號 || '—'}</div>
      </td>
      <td>${r.部門 || '—'}</td>
      <td style="white-space:nowrap">${r.性別||'—'} / ${r.年齡!=null ? r.年齡+'歲' : '—'}</td>
      <td>${B.meta(r.代謝症候群)}</td>
      <td>${B.load(r.工作負荷程度)}</td>
      <td>${B.workload(r.異常工作負荷結果)}</td>
      <td style="font-size:12px;color:var(--sub)">${r.面談日期||'—'}</td>

// ── AI Upload ──
let selectedFiles = [];

function parseFilename(filename) {
  const base = filename.replace(/\.[^.]+$/, '');   // 去副檔名
  const idx  = base.indexOf('-');
  if (idx <= 0) return null;
  return { empNo: base.slice(0, idx).trim(), name: base.slice(idx + 1).trim() };
}

function addFiles(fileList) {
  const allowed = ['application/pdf', 'image/jpeg', 'image/png'];
  const wasEmpty = selectedFiles.length === 0;
  for (const f of fileList) {
    if (allowed.includes(f.type)) selectedFiles.push(f);
  }

  // 第一次加入檔案時，從檔名解析員工編號與姓名直接填入表單
  if (wasEmpty && selectedFiles.length > 0) {
    const info = parseFilename(selectedFiles[0].name);
    if (info) {
      const body = document.getElementById('modal-body');
      if (body) {
        const nameEl = body.querySelector('[name="姓名"]');
        const empEl  = body.querySelector('[name="員工編號"]');
        if (nameEl && !nameEl.value) { nameEl.value = info.name;  nameEl.closest('.field')?.classList.add('ai-filled'); }
        if (empEl)                   { empEl.value  = info.empNo; empEl.closest('.field')?.classList.add('ai-filled'); }
      }
    }
  }

  renderFileList();
  document.getElementById('ai-status').textContent = '';
  document.getElementById('ai-status').className = 'ai-status';
  document.getElementById('ai-result-box').style.display = 'none';
}

function removeFile(idx) {
  selectedFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  const list = document.getElementById('file-list');
  if (!list) return;
  if (!selectedFiles.length) { list.innerHTML = ''; return; }
  const items = selectedFiles.map((f, i) => `
    <div class="file-item">
      <span>${f.type === 'application/pdf' ? '📄' : '🖼️'}</span>
      <span class="file-item-name">${escHtml(f.name)}</span>
      <button class="ai-clear-btn" onclick="removeFile(${i})" title="移除">✕</button>
    </div>`).join('');
  const label = selectedFiles.length > 1 ? `AI 判讀（${selectedFiles.length} 張）` : 'AI 判讀';
  list.innerHTML = items + `<div class="file-list-actions"><button class="ai-parse-btn" id="ai-parse-btn" onclick="runAIParse()">${label}</button></div>`;
}

function dropFile(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
}

function clearFile() {
  selectedFiles = [];
  const fi = document.getElementById('file-input');
  if (fi) fi.value = '';
  renderFileList();
  document.getElementById('ai-status').textContent = '';
  document.getElementById('ai-status').className = 'ai-status';
  document.getElementById('ai-result-box').style.display = 'none';
}

async function runAIParse() {
  if (!selectedFiles.length) return;
  const btn    = document.getElementById('ai-parse-btn');
  const status = document.getElementById('ai-status');
  if (btn) btn.disabled = true;
  status.className = 'ai-status';
  status.textContent = `⏳ AI 判讀中（${selectedFiles.length} 張）…`;

  try {
    const files = await Promise.all(selectedFiles.map(f => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve({ fileData: e.target.result.split(',')[1], fileType: f.type, fileName: f.name });
      reader.onerror = reject;
      reader.readAsDataURL(f);
    })));

    const fnInfo = selectedFiles.length ? parseFilename(selectedFiles[0].name) : null;
    const res  = await fetch(API, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'ai-parse', files, ...(fnInfo || {}) }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);

    applyAIResult(json.result);
    status.className = 'ai-status success';
    status.textContent = '✅ 判讀完成，欄位已自動填入';
  } catch(e) {
    status.className = 'ai-status error';
    status.textContent = '❌ 判讀失敗：' + e.message;
  } finally {
    if (btn) btn.disabled = false;
  }
}

function normalizeRiskPct(v) {
  const s = String(v || '').trim();
  if (!s) return '';
  const hasPct = s.includes('%');
  const num = parseFloat(s);
  if (isNaN(num)) return s;
  // 若是小數（0.05）且無 % 符號，乘以 100 換算為百分比
  const pct = (!hasPct && num > 0 && num < 1) ? num * 100 : num;
  const rounded = Math.round(pct * 10) / 10;
  return (Number.isInteger(rounded) ? rounded : rounded) + '%';
}

function applyAIResult(result) {
  const body      = document.getElementById('modal-body');
  const resultBox = document.getElementById('ai-result-box');
  const rows = [];

  // 填入 AI 判讀欄位（年齡由生日推算，不直接採用 AI 值）
  const fields = ['姓名','生日','性別','人因','缺血風險數值','缺血風險等級','工作負荷程度','異常工作負荷結果','代謝症候群'];
  fields.forEach(key => {
    let val = result[key];
    if (val == null || val === '') return;

    // 缺血風險數值統一轉為百分比格式
    if (key === '缺血風險數值') val = normalizeRiskPct(val);

    const el = body.querySelector(`[name="${key}"]`);
    if (!el) return;

    if (el.type === 'date' && typeof val === 'string') val = val.replace(/\//g, '-');
    el.value = val;
    el.closest('.field')?.classList.add('ai-filled');

    rows.push(`<div class="ai-row"><span class="ai-lbl">${key}</span><span class="ai-val">${result[key]}</span></div>`);
  });

  // 從生日計算正確年齡
  const birthStr = result['生日'];
  if (birthStr) {
    const birth = new Date(birthStr.replace(/\//g, '-'));
    if (!isNaN(birth.getTime())) {
      const today = new Date();
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      if (age > 0 && age < 120) {
        const ageEl = body.querySelector('[name="年齡"]');
        if (ageEl) { ageEl.value = age; ageEl.closest('.field')?.classList.add('ai-filled'); }
        rows.push(`<div class="ai-row"><span class="ai-lbl">年齡（計算）</span><span class="ai-val">${age}</span></div>`);
      }
    }
  }

  if (rows.length) {
    resultBox.innerHTML = rows.join('');
    resultBox.style.cssText = 'display:flex;flex-direction:column';
  }
}

async function saveRecord() {
  const inputs = document.getElementById('modal-body').querySelectorAll('input,select');
  const data = {};
  inputs.forEach(el => { if (el.name) data[el.name] = el.value; });

  if (!data.姓名.trim()) { showToast('請填寫姓名'); return; }

  // Convert date inputs (yyyy-MM-dd → yyyy/MM/dd)
  ['生日','面談日期','第一次面談','第二次面談'].forEach(k => {
    if (data[k]) data[k] = data[k].replace(/-/g, '/');
  });
  if (data._row) data._row = Number(data._row);

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  try {
    const action = data._row ? 'update' : 'add';
    const res  = await fetch(API, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body:   JSON.stringify({ action, data }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    showToast(data._row ? '已更新' : '已新增');
    closeModal();
    const wasRow = data._row;
    await loadData();
    if (wasRow) showDetail(wasRow);
  } catch(e) {
    showToast('❌ 儲存失敗：' + e.message, 4000);
  } finally {
    btn.disabled = false; btn.textContent = '儲存';
  }
}

  res.rows.forEach(row => {

    const idx = svcReports.findIndex(x => x.year === year && x.month === month && x.location === location);

  const input = prompt('請輸入要新增的民國年度（例如：117）');
  if (!input) return;
  const roc = parseInt(input.trim(), 10);
  if (!roc || roc < 100 || roc > 200) { alert('請輸入有效的民國年度（100～200）'); return; }
  const sel = document.getElementById('svc-year');
  if (Array.from(sel.options).some(o => parseInt(o.value) === roc)) {
    sel.value = roc; svcYear = roc; renderSvcModule(); return;
  }
  const ad  = roc + 1911;
  const opt = document.createElement('option');
  opt.value = roc; opt.textContent = `${roc} 年度（${ad}）`;
  // insert in numeric order
  const after = Array.from(sel.options).find(o => parseInt(o.value) > roc);
  after ? sel.insertBefore(opt, after) : sel.appendChild(opt);
  sel.value = roc; svcYear = roc; renderSvcModule();
  showToast(`✅ 已新增 ${roc} 年度`);
}

function selectMonth(m) {

}

function saveSvcRecord() {
  const dateVal = document.getElementById('sf-date').value;
  if (!dateVal) { showToast('請選擇服務日期'); return; }

  const locVal  = document.getElementById('sf-loc').value;
  // derive year/month from date (民國 = AD - 1911)
  const d = new Date(dateVal);
  const yearAD  = d.getFullYear();
  const yearROC = yearAD - 1911;
  const monthNum = d.getMonth() + 1;

  const services = Array.from(document.querySelectorAll('#sf-services input[type=checkbox]:checked')).map(c => c.value);

  const rec = {
    id:           _editSvcId || (Date.now().toString(36) + Math.random().toString(36).slice(2,6)),
    year:         yearROC,
    month:        monthNum,
    date:         dateVal,
    location:     locVal,
    timeIn:       document.getElementById('sf-timein').value,
    timeOut:      document.getElementById('sf-timeout').value,
    consultCount: parseInt(document.getElementById('sf-consult').value, 10) || 0,
    recorder:     document.getElementById('sf-recorder').value.trim(),
    services,
    summary:      document.getElementById('sf-summary').value.trim(),
    followUp:     document.getElementById('sf-followup').value.trim(),
  };

  if (_editSvcId) {
    const idx = svcLogs.findIndex(x => x.id === _editSvcId);
    if (idx >= 0) svcLogs[idx] = rec;
  } else {
    svcLogs.push(rec);
  }

  saveSvcLogs();
  closeSvcModal();

  // switch view to the month of saved record
  svcYear  = yearROC;
  svcLoc   = locVal;
  svcMonth = monthNum;
  document.getElementById('svc-year').value = svcYear;
  document.getElementById('svc-loc').value  = svcLoc;
  renderSvcModule();
  showToast(_editSvcId ? '✅ 已更新' : '✅ 已新增');
}

function deleteSvcRecord(id) {
  const r = svcLogs.find(x => x.id === id);
  if (!r) return;
  if (!confirm(`確定刪除 ${r.date} 的紀錄？`)) return;
  svcLogs = svcLogs.filter(x => x.id !== id);
  saveSvcLogs();
  renderSvcModule();
  showToast('已刪除');
}

// 臨場服務紀錄 AI 上傳判讀
// ═══════════════════════════════════════════════════════
const SVC_WORKER = 'https://ohs-law-chatbot.df-hr-openai.workers.dev';
let _svcUploadFile = null;
let _svcAIData = null;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function svcPdfToImages(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = Math.min(pdf.numPages, 10);
  const imgs = [];
  for (let p = 1; p <= pages; p++) {
    const page = await pdf.getPage(p);
    const vp   = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    imgs.push(canvas.toDataURL('image/jpeg', 0.85));
  }
  return imgs;
}

async function svcImgToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => resolve(e.target.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function handleSvcFile(f) {
  if (!f) return;
  _svcUploadFile = f;
  _svcAIData = null;
  document.getElementById('svc-file-name').textContent = f.name;
  document.getElementById('svc-file-row').style.display = '';
  document.getElementById('svc-upload-zone').style.display = 'none';
  document.getElementById('svc-ai-run-btn').disabled = false;
  document.getElementById('svc-ai-result-area').innerHTML = '';
}
function handleSvcDrop(e) {
  e.preventDefault();
  document.getElementById('svc-upload-zone').classList.remove('dragover');
  handleSvcFile(e.dataTransfer.files[0]);
}
function clearSvcFile() {
  _svcUploadFile = null;
  _svcAIData = null;
  document.getElementById('svc-file-input').value = '';
  document.getElementById('svc-file-row').style.display = 'none';
  document.getElementById('svc-upload-zone').style.display = '';
  document.getElementById('svc-ai-run-btn').disabled = true;
  document.getElementById('svc-ai-result-area').innerHTML = '';
}

async function runSvcAI() {
  if (!_svcUploadFile) return;
  const btn    = document.getElementById('svc-ai-run-btn');
  const result = document.getElementById('svc-ai-result-area');
  btn.disabled = true; btn.textContent = '判讀中…';
  const spin = `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--sub)"><div class="svc-ai-spin"></div><span style="font-size:13px" id="svc-ai-status">PDF 轉圖中，請稍候…</span></div>`;
  result.innerHTML = spin;

  try {
    const isPdf = _svcUploadFile.type === 'application/pdf';
    let images;
    if (isPdf) {
      images = await svcPdfToImages(_svcUploadFile);
      const st = document.getElementById('svc-ai-status');
      if (st) st.textContent = `AI 正在分析 ${images.length} 頁紀錄表，請稍候…`;
    } else {
      const b64 = await svcImgToBase64(_svcUploadFile);
      images = [b64];
      const st = document.getElementById('svc-ai-status');
      if (st) st.textContent = 'AI 正在分析紀錄表，請稍候…';
    }

    const prompt = `你是職護助理，請仔細分析這份職護臨場服務執行紀錄表，以繁體中文回答，並嚴格按照以下 JSON 格式輸出（不要輸出 JSON 以外的任何文字）：
{
  "date": "服務日期（格式 YYYY-MM-DD，如 2026-07-14）",
  "location": "服務地點，只能是「台中總部」或「全興廠」",
  "timeIn": "進場時間（格式 HH:MM，如 09:00）",
  "timeOut": "離場時間（格式 HH:MM，如 17:00）",
  "consultCount": 諮詢人數（整數，規則見下方說明）,
  "recorder": "紀錄人姓名",
  "services": ["服務項目1", "服務項目2"],
  "summary": "本次服務摘要（100字以內，條列重點）",
  "followUp": "待追蹤事項（若無則填空字串）"
}

【consultCount 判讀規則 — 請依序嘗試以下方法】
1. 在摘要段落或備註欄中搜尋以下任一句型，取出其中的整數：
   - 「共服務 X 人次」「服務 X 人次」「共 X 人次」「X 人次」
   - 「諮詢 X 人」「服務 X 人」「X 位員工」「共 X 位」
   - 「本次提供服務 X 人」「計 X 人」
2. 若有表格欄位標示「諮詢人數」「服務人次」「件數」「人次」，直接取該格填寫的數字。
3. 若文件為雙面或含有兩份紀錄，只讀取第一份（第一頁）的數字，不要加總兩份。
4. 若上述皆找不到，填 0。
重要：只取「本次服務的人數總計」這一個整數，不要合計多個子項目。

services 請從以下選項中選填（可複選）：個人健康諮詢、異常工作負荷評估、人因危害評估、健康促進活動、職業病預防衛教、急救技能訓練、環境巡視、特殊健檢追蹤、復工評估、其他`;

    const res = await fetch(SVC_WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: prompt, images })
    });
    const rawText = await res.text();
    let d = {};
    try { d = JSON.parse(rawText); } catch {}
    const raw = (d.reply || d.response || d.message || d.text || d.content || d.result || d.data || '').trim();
    let parsed = null;
    try { const m = raw.match(/\{[\s\S]*\}/); parsed = m ? JSON.parse(m[0]) : null; } catch {}

    if (parsed) {
      _svcAIData = parsed;
      renderSvcAIResult(parsed);
    } else {
      result.innerHTML = `<div style="color:var(--red);font-size:12px;padding:8px 0">⚠️ 無法解析 AI 回應，請手動填寫欄位。<br><small style="color:var(--sub)">${rawText.slice(0,200)}</small></div>`;
    }
  } catch(e) {
    result.innerHTML = `<div style="color:var(--red);font-size:12px;padding:8px 0">❌ AI 判讀失敗：${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = '📎 上傳報告';
}

const SVC_ITEMS_ALL = ['個人健康諮詢','異常工作負荷評估','人因危害評估','健康促進活動','職業病預防衛教','急救技能訓練','環境巡視','特殊健檢追蹤','復工評估','其他'];

function renderSvcAIResult(d) {
  const svcTags = (d.services || []).map(s => `<span style="padding:2px 7px;border-radius:10px;background:var(--accent-soft);color:var(--accent-dk);font-size:11px;font-weight:600">${s}</span>`).join(' ');
  document.getElementById('svc-ai-result-area').innerHTML = `
    <div class="svc-ai-result-card">
      <div class="svc-ai-result-title">✨ AI 判讀結果</div>
      <div class="svc-ai-result-grid">
        <div class="svc-ai-result-row"><span class="svc-ai-result-lbl">日期</span><span class="svc-ai-result-val">${d.date||'—'}</span></div>
        <div class="svc-ai-result-row"><span class="svc-ai-result-lbl">地點</span><span class="svc-ai-result-val">${d.location||'—'}</span></div>
        <div class="svc-ai-result-row"><span class="svc-ai-result-lbl">進場</span><span class="svc-ai-result-val">${d.timeIn||'—'}</span></div>
        <div class="svc-ai-result-row"><span class="svc-ai-result-lbl">離場</span><span class="svc-ai-result-val">${d.timeOut||'—'}</span></div>
        <div class="svc-ai-result-row"><span class="svc-ai-result-lbl">諮詢人數</span><span class="svc-ai-result-val">${d.consultCount ?? '—'} 人</span></div>
        <div class="svc-ai-result-row"><span class="svc-ai-result-lbl">紀錄人</span><span class="svc-ai-result-val">${d.recorder||'—'}</span></div>
      </div>
      ${svcTags ? `<div style="display:flex;flex-wrap:wrap;gap:4px">${svcTags}</div>` : ''}
      ${d.summary ? `<div style="font-size:12px;color:var(--text)">${d.summary}</div>` : ''}
      ${d.followUp ? `<div style="font-size:12px;color:var(--orange)">⏳ 待追蹤：${d.followUp}</div>` : ''}
      <button class="svc-ai-confirm-btn" onclick="applySvcAI()">✅ 確認並填入欄位</button>
    </div>`;
}

function applySvcAI() {
  if (!_svcAIData) return;
  const d = _svcAIData;
  if (d.date)         document.getElementById('sf-date').value     = d.date;
  if (d.location && ['台中總部','全興廠'].includes(d.location))
                      document.getElementById('sf-loc').value      = d.location;
  if (d.timeIn)       document.getElementById('sf-timein').value   = d.timeIn;
  if (d.timeOut)      document.getElementById('sf-timeout').value  = d.timeOut;
  if (d.consultCount != null) document.getElementById('sf-consult').value = d.consultCount;
  if (d.recorder)     document.getElementById('sf-recorder').value = d.recorder;
  if (d.summary)      document.getElementById('sf-summary').value  = d.summary;
  if (d.followUp)     document.getElementById('sf-followup').value = d.followUp;

  // 勾選對應服務項目
  document.querySelectorAll('#sf-services input[type=checkbox]').forEach(cb => {
    if ((d.services || []).includes(cb.value)) cb.checked = true;
  });

  // 收起 AI 區，顯示成功提示
  document.getElementById('svc-ai-result-area').innerHTML =
    `<div style="font-size:12px;color:var(--green);font-weight:600">✅ 已填入欄位，請確認後儲存</div>`;
}
</script>
