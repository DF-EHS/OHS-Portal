<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法規更新與職災情報 — 大豐環保科技</title>
<style>
:root{--navy:#1e3a5f;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:700;flex:1}
.hdr-btn{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer;transition:background .15s;font-family:inherit}
.hdr-btn:hover{background:rgba(255,255,255,.2)}
.hdr-brand{display:flex;align-items:center;gap:7px;flex-shrink:0}
.hdr-brand img{height:24px;object-fit:contain}
.hdr-brand span{font-size:12px;color:#94a3b8;font-weight:600;white-space:nowrap}
main{flex:1;max-width:900px;margin:0 auto;width:100%;padding:32px 20px 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.init-icon{font-size:56px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.init-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:10px}
.init-sub{font-size:14px;color:var(--sub);line-height:1.7;max-width:480px}
.init-badge{display:inline-block;margin-top:18px;padding:6px 16px;border-radius:20px;background:#fff;border:1px solid var(--border);font-size:12px;color:var(--sub)}
footer{text-align:center;padding:18px 24px;font-size:12px;color:var(--sub);border-top:1px solid var(--border);background:var(--card)}
</style>
</head>
<body>

<header>
  <button class="hdr-btn" onclick="location.href='../'" title="回到系統入口">← 系統入口</button>
  <h1>📰 法規更新與職災情報</h1>
  <div class="hdr-brand">
    <img src="../dafon-logo.png" alt="大豐環保科技">
    <span>大豐環保科技</span>
  </div>
</header>

<main>
  <div class="init-icon">⚙️</div>
  <div class="init-title">系統初始化中</div>
  <div class="init-sub">
    此頁面由 GitHub Actions 自動生成。<br>
    工作日每四小時自動抓取職安署公告、重大職災新聞及法規更新，並由 Claude AI 生成摘要。<br><br>
    首次部署後，請等待下一個排程時間（工作日 08:00 / 12:00 / 16:00 / 20:00 台灣時間）即可看到內容。
  </div>
  <div class="init-badge">⏳ 等待首次自動更新</div>
</main>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統</footer>

</body>
</html>
