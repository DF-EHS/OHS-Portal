<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件自動派送系統 | 大豐環保科技</title>
<style>
  :root {
    --dispatch:       #374151;
    --dispatch-dark:  #1f2937;
    --dispatch-light: #f3f4f6;
    --dispatch-border:#d1d5db;
    --bg:     #f1f5f9;
    --card:   #ffffff;
    --border: #e2e8f0;
    --text:   #1e293b;
    --sub:    #64748b;
    --green:  #16a34a;
    --orange: #d97706;
    --red:    #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

  /* ── Topbar ── */
  header.topbar {
    background: var(--dispatch);
    padding: 0 28px;
    height: 54px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  header.topbar h2 { font-size: 15px; font-weight: 700; color: #fff; }
  .topbar-sub { font-size: 12px; color: rgba(255,255,255,.6); margin-left: 4px; }

  /* ── Main ── */
  main { max-width: 1060px; margin: 0 auto; width: 100%; padding: 32px 28px 52px; }
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--sub);
    letter-spacing: 4px; text-transform: uppercase;
    margin-top: 40px; margin-bottom: 22px;
    display: flex; align-items: center; gap: 12px;
  }
  main > .section-label:first-child { margin-top: 0; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  footer {
    text-align: center; padding: 18px 24px;
    font-size: 12px; color: var(--sub);
    border-top: 1px solid var(--border);
    background: var(--card);
  }

  /* ── Dispatch Rule Cards ── */
  .rule-list { display: flex; flex-direction: column; gap: 16px; }
  .rule-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: box-shadow .2s, border-color .2s;
    cursor: pointer; text-decoration: none; color: inherit; display: block;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
  }
  .rule-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.1); border-color: #9ca3af; }
  .rule-card.warning-active { border-color: #fca5a5; box-shadow: 0 2px 16px rgba(220,38,38,.12); }
  .rule-card.placeholder { border-style: dashed; border-color: var(--border); background: var(--bg); cursor: default; }
  .rule-card.placeholder:hover { box-shadow: none; border-color: var(--border); }
  .rule-body { display: flex; align-items: stretch; }
  .rule-icon-col {
    width: 72px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 32px;
    background: var(--dispatch-light); border-right: 1px solid var(--dispatch-border);
  }
  .rule-card.warning-active .rule-icon-col { background: #fef2f2; border-color: #fecaca; }
  .rule-card.placeholder .rule-icon-col { background: var(--bg); border-color: var(--border); }
  .rule-main { flex: 1; padding: 18px 22px; }
  .rule-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .rule-trigger { font-size: 12px; color: var(--sub); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .rule-trigger::before { content: "⚡"; font-size: 11px; }
  .rule-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .meta-chip {
    font-size: 11.5px; padding: 3px 10px; border-radius: 20px;
    background: var(--dispatch-light); color: var(--sub);
    border: 1px solid var(--dispatch-border);
    display: flex; align-items: center; gap: 5px;
  }
  .meta-chip .chip-label { font-weight: 600; color: var(--dispatch); margin-right: 2px; }
  .rule-footer { display: flex; align-items: center; justify-content: space-between; }
  .rule-status { display: flex; align-items: center; gap: 7px; font-size: 12.5px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(22,163,74,.15);
    animation: pulse 2s infinite;
  }
  .status-dot.warning { background: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,.15); }
  @keyframes pulse {
    0%,100%{ box-shadow:0 0 0 3px rgba(22,163,74,.15) }
    50%    { box-shadow:0 0 0 6px rgba(22,163,74,.05) }
  }
  .rule-btn {
    padding: 7px 18px; border-radius: 8px;
    background: var(--dispatch); color: #fff;
    font-size: 12.5px; font-weight: 600;
    border: none; cursor: pointer; transition: background .15s;
    font-family: inherit; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .rule-btn:hover { background: var(--dispatch-dark); }
  .rule-card.warning-active .rule-btn { background: var(--red); }
  .rule-card.warning-active .rule-btn:hover { background: #b91c1c; }
  .warning-banner {
    display: none; align-items: center; gap: 10px;
    background: #fef2f2; border-top: 1px solid #fecaca;
    padding: 10px 20px; font-size: 12.5px; color: #7f1d1d;
  }
  .warning-banner.show { display: flex; }
  .placeholder-inner { padding: 28px; text-align: center; color: var(--sub); font-size: 13px; width: 100%; }
  .placeholder-inner .ph-icon { font-size: 28px; margin-bottom: 8px; opacity: .4; }

  /* ── Dark mode ── */
  body.dark {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #f1f5f9; --sub: #94a3b8;
    --dispatch-light: #1e293b; --dispatch-border: #374151;
  }
  body.dark header.topbar { background: #1f2937; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
  body.dark .rule-card { box-shadow: 0 2px 10px rgba(0,0,0,.3); }
  body.dark .rule-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.4); }
  body.dark .meta-chip { background: #263249; }
  body.dark .rule-card.placeholder { background: #0f172a; }
  body.dark .rule-card.placeholder .rule-icon-col { background: #0f172a; }
  body.dark .rule-btn { background: #4b5563; }
  body.dark .rule-btn:hover { background: #374151; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    header.topbar { padding: 0 16px; }
    main { padding: 20px 16px 40px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <h2>📤 文件自動派送系統</h2>
  <span class="topbar-sub">— 依條件自動觸發，產生 Outlook 草稿供確認後送出</span>
</header>

<main>
  <div class="section-label">派送規則</div>
  <div class="rule-list">

    <a class="rule-card" id="typhoon-card" href="../typhoon/">
      <div class="rule-body">
        <div class="rule-icon-col" id="typhoon-icon">🌀</div>
        <div class="rule-main">
          <div class="rule-title">颱風陸上警報派送</div>
          <div class="rule-trigger">台中市或彰化縣發布陸上颱風警報時觸發</div>
          <div class="rule-meta">
            <span class="meta-chip"><span class="chip-label">附件</span>災前及災後檢核表.doc</span>
            <span class="meta-chip"><span class="chip-label">收件</span>神岡站・再生處理 窗口</span>
            <span class="meta-chip"><span class="chip-label">副本</span>神岡站主任・再生處理經理</span>
            <span class="meta-chip"><span class="chip-label">排程</span>每 30 分鐘自動偵測</span>
          </div>
          <div class="rule-footer">
            <div class="rule-status">
              <span class="status-dot" id="typhoon-dot"></span>
              <span id="typhoon-status-text">查詢警報狀態中...</span>
            </div>
            <span class="rule-btn" onclick="event.preventDefault();location.href='../typhoon/'">查看詳情 ›</span>
          </div>
        </div>
      </div>
      <div class="warning-banner" id="typhoon-banner">
        🚨 <strong id="typhoon-banner-text">陸上颱風警報生效中</strong> — 請確認工作排程器是否正在執行
      </div>
    </a>

    <div class="rule-card placeholder">
      <div class="rule-body">
        <div class="rule-icon-col">＋</div>
        <div class="placeholder-inner">
          <div style="font-weight:600;font-size:14px;margin-bottom:6px">預留擴充</div>
          <div style="font-size:12px">未來可在此新增其他自動派送規則，例如：節日宣導文件、法規更新通知等</div>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>大豐環保科技股份有限公司 &nbsp;·&nbsp; 職業安全衛生管理系統</footer>

<script>
/* ── 颱風警報狀態 ── */
(async function(){
  const KEY='CWA-6A18801C-3D96-4113-93F6-8198BD0712F2';
  const API='https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0034-001?Authorization='+KEY+'&format=JSON';
  try{
    const r=await fetch(API),j=await r.json();
    const entries=j.records?.info||[];
    const landAreas=new Set();let typhoonName='';
    for(const e of(Array.isArray(entries)?entries:[entries])){
      if(e.urgency==='Past')continue;
      if(!(e.headline||'').includes('陸上'))continue;
      typhoonName=e.cwa_typhoon_name||e.typhoon_name||typhoonName;
      (e.areaDesc||'').replace(/[、,]/g,' ').split(/\s+/).forEach(t=>t&&landAreas.add(t));
    }
    const matched=['台中市','彰化縣'].filter(a=>landAreas.has(a));
    const hasWarning=matched.length>0;
    const dot=document.getElementById('typhoon-dot');
    const txt=document.getElementById('typhoon-status-text');
    const banner=document.getElementById('typhoon-banner');
    const bannerTxt=document.getElementById('typhoon-banner-text');
    const icon=document.getElementById('typhoon-icon');
    const card=document.getElementById('typhoon-card');
    if(hasWarning){
      card.classList.add('warning-active');
      dot.classList.add('warning');
      txt.textContent='⚠️ '+(typhoonName||'颱風')+' 陸上警報生效中（'+matched.join('、')+'）';
      banner.classList.add('show');
      bannerTxt.textContent=(typhoonName||'颱風')+' 陸上警報生效中（'+matched.join('、')+'）';
      icon.textContent='🚨';
    }else{
      txt.textContent='目前無陸上颱風警報';
    }
  }catch(e){document.getElementById('typhoon-status-text').textContent='API 連線失敗';}
})();
</script>
<script src="../shared/sidebar.js"></script>
</body>
</html>
